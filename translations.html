<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的译制作品">
    <title>译制 · Jillax</title>

    <link rel="stylesheet" href="css/main.css">

    <style>
        /* ===== Filter ===== */
        .filter-tabs {
            display: flex; gap: 4px; margin-bottom: 36px; flex-wrap: wrap;
        }
        .filter-tab {
            padding: 6px 16px; font-size: 0.78rem;
            color: var(--text-muted); border: 1px solid var(--border);
            background: none; cursor: pointer;
            transition: all 0.3s ease; font-family: var(--font-body);
        }
        .filter-tab:hover { border-color: var(--gold-dim); color: var(--gold); }
        .filter-tab.active { border-color: var(--gold-dim); background: var(--gold-dim); color: var(--gold); }

        /* ===== Translation Cards ===== */
        .trans-list { display: flex; flex-direction: column; gap: 16px; }
        .trans-card {
            display: flex; gap: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .trans-card:hover { border-color: var(--gold-dim); }
        .trans-cover {
            width: 120px;
            height: 75px;
            flex-shrink: 0;
            background: var(--border-light);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .trans-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .trans-cover .placeholder {
            font-size: 1.5rem;
            color: var(--text-faint);
        }
        .trans-body { flex: 1; min-width: 0; }
        .trans-title {
            font-family: var(--font-chinese);
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 2px;
        }
        .trans-original {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 8px;
            font-weight: 300;
        }
        .trans-meta {
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        }
        .trans-status {
            font-size: 0.65rem;
            padding: 2px 8px;
            border: 1px solid var(--border);
            color: var(--text-soft);
            letter-spacing: 0.5px;
        }
        .trans-status.done { border-color: rgba(122, 139, 110, 0.3); color: var(--olive, #7a8b6e); }
        .trans-status.ongoing { border-color: var(--gold-dim); color: var(--gold-soft); }
        .trans-source {
            font-size: 0.7rem;
            color: var(--text-faint);
        }
        .trans-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 10px;
            font-weight: 300;
            line-height: 1.7;
        }
        .trans-links {
            margin-top: 10px;
            display: flex; gap: 12px;
        }
        .trans-link {
            font-size: 0.72rem;
            color: var(--gold-soft);
            transition: color 0.3s ease;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .trans-link:hover { color: var(--gold); }

        /* ===== Empty ===== */
        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--text-faint); font-size: 0.85rem;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .trans-card { padding: 18px; flex-direction: column; gap: 12px; }
            .trans-cover { width: 100%; height: 160px; }
        }
    </style>
</head>
<body>

    <!-- ===== Nav ===== -->
    <nav>
        <div class="container">
            <a href="index.html" class="nav-logo">Jillax</a>
            <div class="nav-links">
                <a href="about.html">关于</a>
                <a href="portfolio.html">投资</a>
                <a href="contact.html">联系</a>
                <a href="share.html">分享</a>
                <a href="translations.html" class="current">译制</a>
                <a href="bookshelf.html">书影音</a>
                <a href="blog.html">随笔</a>
                <button class="theme-toggle" id="themeToggle" title="切换主题">☀</button>
            </div>
        </div>
    </nav>

    <!-- ===== Header ===== -->
    <div class="container">
        <div class="page-header">
            <a href="index.html" class="back-home">← 返回主页</a>
            <h1>🎬 译制作品</h1>
            <p>搬运与翻译感兴趣的外语视频</p>
        </div>

        <!-- ===== Filter ===== -->
        <div class="filter-tabs" id="filterTabs">
            <button class="filter-tab active" data-filter="all">全部</button>
            <button class="filter-tab" data-filter="已完成">已完成</button>
            <button class="filter-tab" data-filter="译制中">译制中</button>
        </div>

        <!-- ===== List ===== -->
        <div class="trans-list" id="transList"></div>
        <div class="empty-state" id="emptyState" style="display:none">没有符合条件的作品</div>
    </div>

    <!-- ===== Footer ===== -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Jillax</p>
        </div>
    </footer>

    <!-- ===== Translations ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const list = document.getElementById('transList');
            const empty = document.getElementById('emptyState');
            const tabs = document.querySelectorAll('.filter-tab');
            let allItems = [];
            let currentFilter = 'all';

            const statusLabels = { '已完成': 'done', '译制中': 'ongoing' };

            function renderItems(filter) {
                const filtered = filter === 'all'
                    ? allItems
                    : allItems.filter(item => item.status === filter);

                if (filtered.length === 0) {
                    list.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';

                list.innerHTML = filtered.map(item => {
                    const sClass = statusLabels[item.status] || '';
                    const hasBili = item.bvid && item.bvid.trim();
                    const hasCover = item.cover && item.cover.trim();
                    const initial = item.title ? item.title.charAt(0) : '?';

                    function formatPlay(n) {
                        if (!n && n !== 0) return '';
                        if (n > 10000) return (n / 10000).toFixed(1) + '万播放';
                        return n + '播放';
                    }
                    return `
                        <div class="trans-card">
                            <div class="trans-cover">
                                ${hasCover
                                    ? `<img src="${item.cover}" alt="${item.title}" loading="lazy" referrerpolicy="no-referrer" onerror="this.parentElement.innerHTML='<span class=placeholder>${initial}</span>'">`
                                    : `<span class="placeholder">${initial}</span>`
                                }
                            </div>
                            <div class="trans-body">
                                <div class="trans-title">${item.title}</div>
                                <div class="trans-original">${item.play !== undefined ? formatPlay(item.play) : ''}</div>
                                <div class="trans-meta">
                                    <span class="trans-status ${sClass}">${item.status}</span>
                                    <span class="trans-source">${item.source}</span>
                                </div>
                                ${item.description ? `<div class="trans-desc">${item.description}</div>` : ''}
                                <div class="trans-links">
                                    ${hasBili ? `<a href="https://www.bilibili.com/video/${item.bvid}" target="_blank" class="trans-link">▶ 在B站观看</a>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            fetch('data/translations.json')
                .then(r => r.json())
                .then(data => {
                    allItems = data.items || data;
                    renderItems(currentFilter);
                })
                .catch(() => {
                    list.innerHTML = '<div class="empty-state">加载失败</div>';
                });

            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    tabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderItems(currentFilter);
                });
            });
        });
    </script>

    <script src="js/main.js"></script>

</body>
</html>
