<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的译制作品">
    <title>译制 · Jillax</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/translations.css">
</head>
<body data-page="translations">

    <div class="container">
        <div class="page-header">
            <a href="index.html" class="back-home" data-i18n="home.back">← 返回主页</a>
            <h1 data-i18n="page.translations.title">🎬 译制作品</h1>
            <p data-i18n="page.translations.desc">搬运与翻译感兴趣的外语视频</p>
        </div>

        <!-- ===== Stats ===== -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-num" id="statTotal">--</div>
                <span class="stat-label">总作品数</span>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="statPlays">--</div>
                <span class="stat-label">总播放量</span>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="statAvg">--</div>
                <span class="stat-label">平均播放</span>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="statPublished">--</div>
                <span class="stat-label">已发布</span>
            </div>
        </div>

        <!-- ===== Search ===== -->
        <div class="search-wrap">
            <input class="search-input" id="searchInput" type="text" placeholder="搜索标题、描述…" autocomplete="off">
        </div>

        <!-- ===== Filter: Status ===== -->
        <div class="filter-bar" id="statusBar">
            <span class="filter-label">状态</span>
            <button class="filter-tab active" data-filter="all">全部 <span class="count" id="countAll"></span></button>
            <button class="filter-tab" data-filter="已完成">已完成 <span class="count" id="countDone"></span></button>
            <button class="filter-tab" data-filter="译制中">译制中 <span class="count" id="countOngoing"></span></button>
        </div>

        <!-- ===== Filter: Tags ===== -->
        <div class="filter-bar" id="tagBar" style="margin-bottom:12px">
            <span class="filter-label">分类</span>
            <button class="filter-tab tag active" data-tag="all">全部</button>
        </div>

        <!-- ===== Sort ===== -->
        <div class="sort-bar">
            <span class="filter-label">排序</span>
            <button class="sort-btn active" data-sort="date">按时间</button>
            <button class="sort-btn" data-sort="plays">按播放量</button>
        </div>

        <div class="result-count" id="resultCount"></div>
        <div class="trans-list" id="transList"></div>
        <div class="empty-state" id="emptyState" style="display:none">没有符合条件的作品</div>
    </div>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
    <script src="js/translations.js"></script>

</body>
</html>
