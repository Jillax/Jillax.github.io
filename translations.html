<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的译制作品 — 搬运与翻译感兴趣的外语视频。">
    <meta name="author" content="Jillax">
    <meta property="og:title" content="译制 · Jillax">
    <meta property="og:description" content="搬运与翻译感兴趣的外语视频。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jillax.github.io/translations.html">
    <meta name="twitter:card" content="summary">
    <link rel="canonical" href="https://jillax.github.io/translations.html">
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <title>译制 · Jillax</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/translations.css">
</head>
<body data-page="translations">
    <noscript>
        <div style="text-align:center;padding:60px 20px;font-family:monospace;color:#b47aff;background:#0d0a1a">
            <h1>译制作品</h1>
            <p>搬运与翻译感兴趣的外语视频</p>
            <p style="margin-top:20px;font-size:0.9rem;color:#6b5a8a">// 此网站需要 JavaScript 才能正常浏览。</p>
        </div>
    </noscript>

    <main>
    <div class="container">
        <div class="page-header">
            <a href="index.html" class="back-home">← 返回主页</a>
            <h1>译制作品</h1>
            <p style="font-family:var(--font-mono);font-size:0.7rem;color:var(--neon-cyan);letter-spacing:3px;text-transform:uppercase">TRANSLATIONS · 搬运与翻译感兴趣的外语视频</p>
        </div>

        <!-- ===== Stats ===== -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-num" id="statTotal">--</div>
                <span class="stat-label">总作品数</span>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="statPlays">--</div>
                <span class="stat-label">总播放量</span>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="statAvg">--</div>
                <span class="stat-label">平均播放</span>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="statPublished">--</div>
                <span class="stat-label">已发布</span>
            </div>
        </div>

        <!-- ===== Search ===== -->
        <div class="search-wrap">
            <input class="search-input" id="searchInput" type="text" placeholder="搜索标题、描述…" autocomplete="off">
        </div>

        <!-- ===== Filter: Tags ===== -->
        <div class="filter-bar" id="tagBar" style="margin-bottom:12px">
            <span class="filter-label">分类</span>
            <button class="filter-tab tag active" data-tag="all">全部</button>
        </div>

        <!-- ===== Sort ===== -->
        <div class="sort-bar">
            <span class="filter-label">排序</span>
            <button class="sort-btn active" data-sort="date">按时间</button>
            <button class="sort-btn" data-sort="plays">按播放量</button>
        </div>

        <div class="result-count" id="resultCount"></div>
        <div class="trans-list" id="transList"></div>
        <div class="empty-state" id="emptyState" style="display:none">没有符合条件的作品</div>
    </div>

    </main>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
    <script src="js/translations.js"></script>

</body>
</html>
