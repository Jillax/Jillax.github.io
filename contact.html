    <style>
        :root {
            --bg: #181410;
            --bg-nav: rgba(24, 20, 16, 0.82);
            --text: #e4dbcc;
            --text-soft: rgba(228, 219, 204, 0.55);
            --text-muted: rgba(228, 219, 204, 0.28);
            --text-faint: rgba(228, 219, 204, 0.12);
            --gold: #c4a35a;
            --gold-soft: rgba(196, 163, 90, 0.35);
            --gold-dim: rgba(196, 163, 90, 0.12);
            --border: rgba(228, 219, 204, 0.06);
            --border-light: rgba(228, 219, 204, 0.03);
            --container: 680px;
            --font-display: 'Fraunces', 'Noto Serif SC', serif;
            --font-body: 'Spectral', 'Noto Serif SC', serif;
            --font-chinese: 'Noto Serif SC', serif;
        }

        [data-theme="light"] {
            --bg: #f5f0e8;
            --bg-nav: rgba(245, 240, 232, 0.85);
            --text: #2c2824;
            --text-soft: rgba(44, 40, 36, 0.6);
            --text-muted: rgba(44, 40, 36, 0.35);
            --text-faint: rgba(44, 40, 36, 0.12);
            --gold: #c4a35a;
            --gold-soft: rgba(196, 163, 90, 0.5);
            --gold-dim: rgba(196, 163, 90, 0.15);
            --border: rgba(44, 40, 36, 0.08);
            --border-light: rgba(44, 40, 36, 0.04);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            font-weight: 400;
        }
        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }

        .container {
            max-width: var(--container);
            margin: 0 auto;
            padding: 0 32px;
            position: relative;
            z-index: 1;
        }

        /* ===== Nav ===== */
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100; padding: 20px 0;
            background: var(--bg-nav);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light);
        }
        nav .container {
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo {
            font-family: var(--font-display); font-weight: 600;
            font-size: 1.1rem; color: var(--text);
            letter-spacing: 0.5px;
            font-variation-settings: 'SOFT' 80, 'WONK' 0;
        }
        .nav-links {
            display: flex; gap: 20px;
            font-size: 0.78rem; color: var(--text-muted);
            font-family: var(--font-body);
        }
        .nav-links a {
            transition: color 0.4s ease; letter-spacing: 0.5px; position: relative;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 0; height: 1px; background: var(--gold);
            transition: width 0.4s ease;
        }
        .nav-links a:hover { color: var(--text); }
        .nav-links a:hover::after { width: 100%; }
        .nav-links .current { color: var(--text-soft); }
        .nav-links .current::after { width: 100%; }
        .theme-toggle {
            background: none; border: none;
            color: var(--text-muted); cursor: pointer;
            font-size: 0.85rem; padding: 0;
            transition: color 0.4s ease;
            font-family: var(--font-body); line-height: 1;
        }
        .theme-toggle:hover { color: var(--gold); }

        /* ===== Page Header ===== */
        .page-header {
            padding: 100px 0 40px;
        }
        .page-header .back-home {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.78rem;
            color: var(--text-faint);
            margin-bottom: 16px;
            transition: color 0.3s ease;
            font-family: var(--font-body);
        }
        .page-header .back-home:hover { color: var(--gold); }
        .page-header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 3vw, 2.4rem);
            font-weight: 600; color: var(--text);
            letter-spacing: -0.3px;
            font-variation-settings: 'SOFT' 60, 'WONK' 0;
        }
        .page-header p {
            font-size: 0.82rem; color: var(--text-muted);
            margin-top: 8px; font-weight: 300;
        }

        /* ===== Contact ===== */
        .contact-intro {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            font-weight: 300;
            letter-spacing: 0.2px;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            max-width: 500px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            color: var(--text-soft);
            font-size: 0.85rem;
            font-weight: 400;
            transition: all 0.3s ease;
            border: 1px solid var(--border-light);
            margin: -0.5px;
            font-family: var(--font-body);
        }
        .contact-item:hover {
            color: var(--gold);
            border-color: var(--gold-dim);
            background: var(--gold-dim);
            z-index: 1;
            position: relative;
        }
        .contact-item svg {
            width: 15px; height: 15px;
            opacity: 0.5; flex-shrink: 0;
            transition: opacity 0.3s ease;
        }
        .contact-item:hover svg { opacity: 0.9; }
        .contact-item .contact-sub {
            font-size: 0.65rem;
            color: var(--text-faint);
            margin-left: auto;
            font-family: var(--font-display);
            font-style: italic;
            font-variation-settings: 'SOFT' 100, 'WONK' 1;
            letter-spacing: 0.5px;
        }

        /* ===== Footer ===== */
        footer {
            padding: 48px 0; margin-top: 80px;
            border-top: 1px solid var(--border-light);
            text-align: center; color: var(--text-faint);
            font-size: 0.75rem;
            font-family: var(--font-display); font-style: italic;
            font-variation-settings: 'SOFT' 100, 'WONK' 1;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            nav { padding: 16px 0; }
            .nav-links { gap: 14px; font-size: 0.75rem; }
            .nav-links a:nth-child(5),
            .nav-links a:nth-child(6),
            .nav-links a:nth-child(7),
            .nav-links a:nth-child(8) { display: none; }
            .container { padding: 0 24px; }
            .page-header { padding: 80px 0 28px; }
            .contact-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .nav-links a:nth-child(4),
            .nav-links a:nth-child(5),
            .nav-links a:nth-child(6),
            .nav-links a:nth-child(7),
            .nav-links a:nth-child(8) { display: none; }
            .contact-item { padding: 12px 14px; }
        }
    </style>
</head>

    <!-- ===== Theme Toggle ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                html.setAttribute('data-theme', 'light');
                toggle.textContent = '☾';
            } else if (saved === 'dark') {
                html.removeAttribute('data-theme');
                toggle.textContent = '☀';
            }
            toggle.addEventListener('click', function() {
                const isLight = html.hasAttribute('data-theme');
                if (isLight) {
                    html.removeAttribute('data-theme');
                    toggle.textContent = '☀';
                    localStorage.setItem('theme', 'dark');
                } else {
                    html.setAttribute('data-theme', 'light');
                    toggle.textContent = '☾';
                    localStorage.setItem('theme', 'light');
                }
            });
        });
    </script>
