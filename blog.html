<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的文本存档 — 文章、知乎想法、知乎文章、AI 文本、AI 摘录、文案。">
    <meta name="author" content="Jillax">
    <meta property="og:title" content="文本 · Jillax">
    <meta property="og:description" content="文章、知乎想法、知乎文章、AI 文本、AI 摘录、文案。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jillax.github.io/blog.html">
    <meta name="twitter:card" content="summary">
    <link rel="canonical" href="https://jillax.github.io/blog.html">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>文本 · Jillax</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/blog.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
</head>
<body data-page="blog">
    <noscript>
        <div style="text-align:center;padding:60px 20px;font-family:serif;color:#ddd3c4;background:#1a1714">
            <h1>📝 文本</h1>
            <p>文章 · 文案 · 笔记</p>
            <p style="margin-top:20px;font-size:0.9rem;color:#888">此网站需要 JavaScript 才能正常浏览。</p>
        </div>
    </noscript>

    <main>
    <!-- ===== Reading Progress Bar ===== -->
    <div class="reading-progress" id="readingProgress"></div>

    <!-- ===== Header ===== -->
    <div class="container">
        <div class="page-header">
            <a href="index.html" class="back-home">← 返回主页</a>
            <h1>📝 文本</h1>
            <p>文章 · 文案 · 笔记</p>
        </div>

        <!-- ===== Search ===== -->
        <input class="blog-search" id="blogSearch" type="text" placeholder="搜索文章、想法、内容…">

        <!-- ===== Tabs ===== -->
        <div class="blog-tabs">
            <button class="blog-tab active" data-tab="posts"><span>文章</span> <span class="count" id="postCount"></span></button>
            <button class="blog-tab" data-tab="pins"><span>知乎想法</span> <span class="count" id="pinCount"></span></button>
            <button class="blog-tab" data-tab="articles"><span>知乎文章</span> <span class="count" id="articleCount"></span></button>
            <button class="blog-tab" data-tab="thesis">AI 文本 <span class="count" id="thesisCount"></span></button>
            <button class="blog-tab" data-tab="excerpts">AI 摘录 <span class="count" id="excerptCount"></span></button>
            <button class="blog-tab" data-tab="copywriting">文案 <span class="count" id="copywritingCount"></span></button>
        </div>

        <!-- ===== Posts Section ===== -->
        <div id="postsSection">
            <div class="post-list" id="postList"></div>
            <div class="empty-state" id="emptyState" style="display:none">还没有文章</div>

            <!-- ===== Article View ===== -->
            <div class="article-view" id="articleView">
                <button class="article-back" id="articleBack">← 返回列表</button>
                <div class="article-header">
                    <h1 id="articleTitle"></h1>
                    <div class="article-meta" id="articleMeta"></div>
                </div>
                <div class="article-content" id="articleContent"></div>
            </div>
        </div>

        <!-- ===== Pins Section ===== -->
        <div id="pinsSection" style="display:none">
            <div class="feed" id="feed"></div>
            <div class="empty-state" id="pinsEmpty" style="display:none">
                <p>知乎想法会在推送后自动同步</p>
            </div>
            <div class="pin-source">
                <span>同步自知乎</span> ·
                <a href="https://www.zhihu.com/people/yi-ban-tong-guo-63/pins" target="_blank">知乎主页</a>
            </div>
        </div>

        <!-- ===== Zhihu Article Viewer ===== -->
        <div id="zhArticleView" style="display:none">
            <button class="article-back" id="zhArtBack">← 返回列表</button>
            <div id="zhArtTitle" style="font-family:var(--font-display);font-size:1.3rem;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.4"></div>
            <div id="zhArtMeta" style="font-size:0.75rem;color:var(--text-faint);margin-bottom:20px"></div>
            <div id="zhArtBody" class="article-content"></div>
        </div>

        <!-- ===== Articles Section ===== -->
        <div id="articlesSection" style="display:none">
            <div class="article-list" id="articleList"></div>
            <div class="empty-state" id="articlesEmpty" style="display:none">
                <p>知乎文章会在推送后自动同步</p>
            </div>
            <div class="pin-source">
                <span>同步自知乎</span> ·
                <a href="https://www.zhihu.com/people/yi-ban-tong-guo-63/posts" target="_blank">知乎文章</a>
            </div>
        </div>

        <!-- ===== Thesis Section ===== -->
        <div id="thesisSection" style="display:none">
            <div class="post-list" id="thesisList"></div>
            <div class="empty-state" id="thesisEmpty" style="display:none">还没有 AI 文本</div>

            <div class="article-view" id="thesisArticleView">
                <button class="article-back" id="thesisArticleBack">← 返回列表</button>
                <div class="article-header">
                    <h1 id="thesisArticleTitle"></h1>
                    <div class="article-meta" id="thesisArticleMeta"></div>
                </div>
                <div class="article-content" id="thesisArticleContent"></div>
            </div>
        </div>

        <!-- ===== Excerpts Section ===== -->
        <div id="excerptsSection" style="display:none">
            <div class="post-list" id="excerptList"></div>
            <div class="empty-state" id="excerptsEmpty" style="display:none">还没有 AI 摘录</div>

            <div class="article-view" id="excerptArticleView">
                <button class="article-back" id="excerptArticleBack">← 返回列表</button>
                <div class="article-header">
                    <div class="excerpt-source-badge" id="excerptSourceBadge"></div>
                    <h1 id="excerptArticleTitle"></h1>
                    <div class="article-meta" id="excerptArticleMeta"></div>
                </div>
                <div class="article-content" id="excerptArticleContent"></div>
            </div>
        </div>

        <!-- ===== Copywriting Section ===== -->
        <div id="copywritingSection" style="display:none">
            <div class="post-list" id="copywritingList"></div>
            <div class="empty-state" id="copywritingEmpty" style="display:none">还没有文案</div>

            <div class="article-view" id="copywritingArticleView">
                <button class="article-back" id="copywritingArticleBack">← 返回列表</button>
                <div class="article-header">
                    <h1 id="copywritingArticleTitle"></h1>
                    <div class="article-meta" id="copywritingArticleMeta"></div>
                </div>
                <div class="article-content" id="copywritingArticleContent"></div>
            </div>
        </div>

        <!-- ===== Lightbox ===== -->
        <div class="lightbox" id="lightbox">
            <button class="lightbox-close" id="lightboxClose">✕</button>
            <img id="lightboxImg" src="" alt="">
        </div>
    </div>

    </main>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
    <script src="js/blog.js"></script>

</body>
</html>
