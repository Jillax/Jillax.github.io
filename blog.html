<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的随笔与笔记">
    <title>随笔 · Jillax</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/blog.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
</head>
<body data-page="blog">

    <!-- ===== Reading Progress Bar ===== -->
    <div class="reading-progress" id="readingProgress"></div>

    <!-- ===== Header ===== -->
    <div class="container">
        <div class="page-header">
            <a href="index.html" class="back-home" data-i18n="home.back">← 返回主页</a>
            <h1 data-i18n="page.blog.title">📝 随笔</h1>
            <p data-i18n="page.blog.desc">笔记 · 思考 · 记录</p>
        </div>

        <!-- ===== Search ===== -->
        <input class="blog-search" id="blogSearch" type="text" placeholder="搜索文章、想法、内容…">

        <!-- ===== Tabs ===== -->
        <div class="blog-tabs">
            <button class="blog-tab active" data-tab="posts"><span data-i18n="blog.posts">文章</span> <span class="count" id="postCount"></span></button>
            <button class="blog-tab" data-tab="pins"><span data-i18n="blog.zhihu">知乎想法</span> <span class="count" id="pinCount"></span></button>
            <button class="blog-tab" data-tab="articles"><span data-i18n="blog.articles">知乎文章</span> <span class="count" id="articleCount"></span></button>
            <button class="blog-tab" data-tab="thesis">AI 文本 <span class="count" id="thesisCount"></span></button>
        </div>

        <!-- ===== Posts Section ===== -->
        <div id="postsSection">
            <div class="post-list" id="postList"></div>
            <div class="empty-state" id="emptyState" style="display:none">还没有文章</div>

            <!-- ===== Article View ===== -->
            <div class="article-view" id="articleView">
                <button class="article-back" id="articleBack">← 返回列表</button>
                <div class="article-header">
                    <h1 id="articleTitle"></h1>
                    <div class="article-meta" id="articleMeta"></div>
                </div>
                <div class="article-content" id="articleContent"></div>
            </div>
        </div>

        <!-- ===== Pins Section ===== -->
        <div id="pinsSection" style="display:none">
            <div class="feed" id="feed"></div>
            <div class="empty-state" id="pinsEmpty" style="display:none">
                <p data-i18n="blog.empty.pins">知乎想法会在推送后自动同步</p>
            </div>
            <div class="pin-source">
                <span data-i18n="blog.source">同步自知乎</span> ·
                <a href="https://www.zhihu.com/people/yi-ban-tong-guo-63/pins" target="_blank">知乎主页</a>
            </div>
        </div>

        <!-- ===== Zhihu Article Viewer ===== -->
        <div id="zhArticleView" style="display:none">
            <button class="article-back" id="zhArtBack">← 返回列表</button>
            <div id="zhArtTitle" style="font-family:var(--font-display);font-size:1.3rem;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.4"></div>
            <div id="zhArtMeta" style="font-size:0.75rem;color:var(--text-faint);margin-bottom:20px"></div>
            <div id="zhArtBody" class="article-content"></div>
        </div>

        <!-- ===== Articles Section ===== -->
        <div id="articlesSection" style="display:none">
            <div class="article-list" id="articleList"></div>
            <div class="empty-state" id="articlesEmpty" style="display:none">
                <p data-i18n="blog.empty.articles">知乎文章会在推送后自动同步</p>
            </div>
            <div class="pin-source">
                <span data-i18n="blog.source">同步自知乎</span> ·
                <a href="https://www.zhihu.com/people/yi-ban-tong-guo-63/posts" target="_blank">知乎文章</a>
            </div>
        </div>

        <!-- ===== Thesis Section ===== -->
        <div id="thesisSection" style="display:none">
            <div class="post-list" id="thesisList"></div>
            <div class="empty-state" id="thesisEmpty" style="display:none">还没有 AI 文本</div>

            <div class="article-view" id="thesisArticleView">
                <button class="article-back" id="thesisArticleBack">← 返回列表</button>
                <div class="article-header">
                    <h1 id="thesisArticleTitle"></h1>
                    <div class="article-meta" id="thesisArticleMeta"></div>
                </div>
                <div class="article-content" id="thesisArticleContent"></div>
            </div>
        </div>

        <!-- ===== Lightbox ===== -->
        <div class="lightbox" id="lightbox">
            <button class="lightbox-close" id="lightboxClose">✕</button>
            <img id="lightboxImg" src="" alt="">
        </div>
    </div>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
    <script src="js/blog.js"></script>

</body>
</html>
