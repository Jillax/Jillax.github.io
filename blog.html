<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的随笔与笔记">
    <title>随笔 · Jillax</title>

    <link rel="stylesheet" href="css/main.css">

    <!-- marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>

    <style>
        /* ===== Post List ===== */
        .post-list { display: flex; flex-direction: column; }
        .post-item {
            padding: 24px 0;
            border-bottom: 1px solid var(--border-light);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .post-item:last-child { border-bottom: none; }
        .post-item:hover { padding-left: 12px; }
        .post-title {
            font-family: var(--font-chinese);
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 6px;
        }
        .post-meta {
            display: flex; gap: 12px; align-items: center;
            font-size: 0.75rem; color: var(--text-faint);
            margin-bottom: 10px;
        }
        .post-tag {
            font-size: 0.6rem;
            padding: 1px 8px;
            border: 1px solid var(--border);
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }
        .post-summary {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 300;
            line-height: 1.7;
        }

        /* ===== Article View ===== */
        .article-view { display: none; }
        .article-view.active { display: block; }
        .list-view.hidden { display: none; }

        .article-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            transition: color 0.3s ease;
            cursor: pointer;
            font-family: var(--font-body);
            border: none;
            background: none;
            padding: 0;
        }
        .article-back:hover { color: var(--gold); }

        .article-header {
            margin-bottom: 40px;
            padding-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }
        .article-header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            font-weight: 600;
            color: var(--text);
            line-height: 1.2;
            letter-spacing: -0.3px;
            font-variation-settings: 'SOFT' 60, 'WONK' 0;
        }
        .article-header .article-meta {
            font-size: 0.78rem;
            color: var(--text-faint);
            margin-top: 12px;
        }

        /* ===== Markdown Content ===== */
        .article-content {
            font-size: 0.92rem;
            color: var(--text-soft);
            font-weight: 300;
            line-height: 2;
        }
        .article-content h1,
        .article-content h2,
        .article-content h3 {
            font-family: var(--font-chinese);
            color: var(--text);
            font-weight: 500;
            margin-top: 40px;
            margin-bottom: 16px;
            letter-spacing: 0.3px;
        }
        .article-content h1 { font-size: 1.4rem; }
        .article-content h2 { font-size: 1.2rem; }
        .article-content h3 { font-size: 1.05rem; }
        .article-content p { margin-bottom: 16px; }
        .article-content strong { color: var(--text); font-weight: 500; }
        .article-content em { font-style: italic; }
        .article-content a {
            color: var(--gold-soft);
            border-bottom: 1px solid var(--gold-dim);
            transition: color 0.3s ease;
        }
        .article-content a:hover { color: var(--gold); }
        .article-content blockquote {
            border-left: 2px solid var(--gold-dim);
            padding: 12px 20px;
            margin: 20px 0;
            color: var(--text-muted);
            font-style: italic;
            background: var(--border-light);
        }
        .article-content blockquote p:last-child { margin-bottom: 0; }
        .article-content ul,
        .article-content ol {
            padding-left: 24px;
            margin-bottom: 16px;
        }
        .article-content li { margin-bottom: 6px; }
        .article-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 36px 0;
        }
        .article-content code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.82em;
            background: var(--border-light);
            padding: 2px 6px;
            color: var(--gold-soft);
        }
        .article-content pre {
            background: var(--border-light);
            padding: 20px;
            margin: 20px 0;
            overflow-x: auto;
            border: 1px solid var(--border);
        }
        .article-content pre code {
            background: none;
            padding: 0;
            color: var(--text-soft);
            font-size: 0.82rem;
        }
        .article-content img {
            max-width: 100%;
            margin: 24px auto;
        }

        /* ===== Tabs ===== */
        .blog-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }
        .blog-tab {
            padding: 10px 24px;
            font-size: 0.82rem;
            color: var(--text-muted);
            background: none;
            border: none;
            border-bottom: 1px solid transparent;
            margin-bottom: -1px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font-body);
        }
        .blog-tab:hover { color: var(--text-soft); }
        .blog-tab.active {
            color: var(--text);
            border-bottom-color: var(--gold);
        }
        .blog-tab .count {
            font-size: 0.65rem;
            color: var(--text-faint);
            margin-left: 4px;
            font-family: var(--font-display);
        }

        /* ===== Pins Feed ===== */
        .feed { display: flex; flex-direction: column; gap: 0; }
        .pin-card {
            padding: 24px 0;
            border-bottom: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }
        .pin-card:last-child { border-bottom: none; }
        .pin-card:hover { padding-left: 8px; }

        .pin-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .pin-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: var(--text-faint);
            font-family: var(--font-display);
            flex-shrink: 0;
        }
        .pin-author {
            font-size: 0.78rem;
            color: var(--text-soft);
            font-weight: 500;
        }
        .pin-time {
            font-size: 0.65rem;
            color: var(--text-faint);
            margin-left: auto;
            font-family: var(--font-display);
        }
        .pin-content {
            font-size: 0.85rem;
            color: var(--text-soft);
            line-height: 1.9;
            font-weight: 300;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .pin-content a {
            color: var(--gold-soft);
            border-bottom: 1px solid var(--gold-dim);
        }
        .pin-images {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 6px;
            margin-top: 12px;
        }
        .pin-images img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        .pin-images img:hover { opacity: 0.8; }
        .pin-footer {
            display: flex;
            gap: 16px;
            margin-top: 12px;
        }
        .pin-stat {
            font-size: 0.68rem;
            color: var(--text-faint);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: var(--font-body);
        }
        .pin-stat .num {
            font-family: var(--font-display);
            color: var(--text-muted);
        }
        .pin-source {
            text-align: center;
            margin-top: 24px;
            font-size: 0.7rem;
            color: var(--text-faint);
        }
        .pin-source a {
            color: var(--gold-soft);
            border-bottom: 1px solid var(--gold-dim);
        }

        /* ===== Articles List ===== */
        .article-list { display: flex; flex-direction: column; }
        .article-card {
            padding: 20px 0;
            border-bottom: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }
        .article-card:last-child { border-bottom: none; }
        .article-card:hover { padding-left: 8px; }
        .article-card-title {
            font-family: var(--font-chinese);
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 6px;
        }
        .article-card-title a {
            color: var(--text);
            transition: color 0.3s ease;
        }
        .article-card-title a:hover { color: var(--gold-soft); }
        .article-card-meta {
            display: flex; gap: 12px; align-items: center;
            font-size: 0.72rem; color: var(--text-faint);
            margin-bottom: 8px;
        }
        .article-card-summary {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 300;
            line-height: 1.7;
        }
        .article-card-stats {
            display: flex;
            gap: 14px;
            margin-top: 8px;
            font-size: 0.68rem;
            color: var(--text-faint);
        }

        /* ===== Lightbox ===== */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .lightbox.active { display: flex; }
        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border: 1px solid var(--border);
        }
        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 24px;
            font-size: 1.4rem;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            background: none;
            border: none;
            font-family: var(--font-body);
            transition: color 0.3s ease;
        }
        .lightbox-close:hover { color: #fff; }

        /* ===== Search ===== */
        .blog-search {
            width: 100%;
            padding: 10px 16px;
            margin-bottom: 20px;
            font-size: 0.82rem;
            font-family: var(--font-body);
            color: var(--text-soft);
            background: var(--bg-surface);
            border: 1px solid var(--border);
            outline: none;
            transition: border-color 0.3s ease;
        }
        .blog-search::placeholder { color: var(--text-faint); }
        .blog-search:focus { border-color: var(--gold-dim); }
        .blog-search.hidden { display: none; }

        /* ===== Reading Progress Bar ===== */
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gold);
            z-index: 9999;
            transition: width 0.1s linear;
            pointer-events: none;
        }

        /* ===== Empty ===== */
        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--text-faint); font-size: 0.85rem;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .post-item { padding: 20px 0; }
            .post-item:hover { padding-left: 8px; }
            .article-content { font-size: 0.88rem; }
        }
    </style>
</head>
<body>

    <!-- ===== Reading Progress Bar ===== -->
    <div class="reading-progress" id="readingProgress"></div>

    <!-- ===== Nav ===== -->
    <nav>

    <div class="container">

    <!-- ===== Blog ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ===== Elements =====
            const postList = document.getElementById('postList');
            const emptyState = document.getElementById('emptyState');
            const articleView = document.getElementById('articleView');
            const articleTitle = document.getElementById('articleTitle');
            const articleMeta = document.getElementById('articleMeta');
            const articleContent = document.getElementById('articleContent');
            const articleBack = document.getElementById('articleBack');
            const postsSection = document.getElementById('postsSection');
            const pinsSection = document.getElementById('pinsSection');
            const feed = document.getElementById('feed');
            const pinsEmpty = document.getElementById('pinsEmpty');
            const articlesSection = document.getElementById('articlesSection');
            const articleList = document.getElementById('articleList');
            const articlesEmpty = document.getElementById('articlesEmpty');
            const tabs = document.querySelectorAll('.blog-tab');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const postCount = document.getElementById('postCount');
            const pinCount = document.getElementById('pinCount');
            const articleCount = document.getElementById('articleCount');
            const blogSearch = document.getElementById('blogSearch');
            let searchQuery = '';
            let allDataRaw = null;
            let posts = [];
            let currentTab = 'posts';

            // ===== Utility =====
            function fmtNum(n) {
                if (!n && n !== 0) return '—';
                if (n >= 10000) return (n / 10000).toFixed(1) + '万';
                return String(n);
            }
            function fmtTime(dateStr) {
                if (!dateStr) return '';
                const d = new Date(dateStr);
                const now = new Date();
                const diff = now - d;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                if (days < 1) return '今天';
                if (days === 1) return '昨天';
                if (days < 7) return days + '天前';
                if (days < 30) return Math.floor(days / 7) + '周前';
                return d.toLocaleDateString('zh-CN', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });
            }

            // ===== Reading Progress =====
            let readingActive = false;
            function trackReadingProgress(active) {
                readingActive = active;
                const bar = document.getElementById('readingProgress');
                if (!active) { bar.style.width = '0'; return; }
                setTimeout(function() {
                    var articleEl = document.getElementById('articleContent');
                    if (!articleEl) return;
                    var rect = articleEl.getBoundingClientRect();
                    var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                    var articleTop = rect.top + scrollTop;
                    var articleHeight = articleEl.scrollHeight;
                    var winHeight = window.innerHeight;
                    var totalScrollable = articleHeight - winHeight + Math.max(articleTop - 80, 0);
                    if (totalScrollable <= 0) { bar.style.width = '100%'; return; }
                    function updateBar() {
                        if (!readingActive) return;
                        var st = window.pageYOffset || document.documentElement.scrollTop;
                        var progress = Math.min(Math.max((st - articleTop + 80) / totalScrollable, 0), 1);
                        bar.style.width = (progress * 100) + '%';
                        requestAnimationFrame(updateBar);
                    }
                    updateBar();
                }, 100);
            }

            // ===== Tab Switching =====
            function switchTab(tab) {
                currentTab = tab;
                tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
                postsSection.style.display = tab === 'posts' ? '' : 'none';
                pinsSection.style.display = tab === 'pins' ? '' : 'none';
                articlesSection.style.display = tab === 'articles' ? '' : 'none';
                history.pushState(null, '', 'blog.html' + (tab !== 'posts' ? '#' + tab : ''));
            }

            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    switchTab(this.dataset.tab);
                });
            });

            // ===== Search Filter =====
            if (blogSearch) {
                blogSearch.addEventListener('input', function() {
                    searchQuery = this.value.trim().toLowerCase();
                    const activeTab = document.querySelector('.blog-tab.active');
                    const tab = activeTab ? activeTab.dataset.tab : 'posts';
                    if (tab === 'pins') renderPins(allDataRaw);
                    else if (tab === 'articles') renderArticles(allDataRaw);
                    else if (tab === 'posts') renderList();
                });
            }

            // ===== Posts =====
            function showList() {
                postList.style.display = '';
                articleView.classList.remove('active');
                trackReadingProgress(false);
                if (currentTab === 'posts') {
                    history.pushState(null, '', 'blog.html');
                }
            }

            function showArticle(postId) {
                const post = posts.find(p => p.id === postId);
                if (!post) { showList(); return; }

                switchTab('posts');
                postList.style.display = 'none';
                articleView.classList.add('active');
                articleTitle.textContent = post.title;
                articleMeta.textContent = post.date + (post.tags ? '  ·  ' + post.tags.join(' · ') : '');
                ararticleContent.innerHTML = '<p style="color:var(--text-faint)">加载中...</p>';

                // 开始跟踪阅读进度
                trackReadingProgress(true);

                history.pushState(null, '', 'blog.html#' + postId);

                fetch('data/posts/' + post.file)
                    .then(r => {
                        if (!r.ok) throw new Error('Not found');
                        return r.text();
                    })
                    .then(md => {
                        articleContent.innerHTML = marked.parse(md);
                    })
                    .catch(() => {
                        articleContent.innerHTML = '<p style="color:var(--text-muted)">文章加载失败</p>';
                    });
            }

            function renderList() {
                let filtered = posts;
                if (searchQuery) {
                    filtered = posts.filter(p => {
                        const title = (p.title || '').toLowerCase();
                        const tags = (p.tags || []).join(' ').toLowerCase();
                        return title.includes(searchQuery) || tags.includes(searchQuery);
                    });
                }
                postCount.textContent = filtered.length || '';
                if (filtered.length === 0) {
                    postList.innerHTML = '';
                    emptyState.style.display = 'block';
                    return;
                }
                emptyState.style.display = 'none';
                postList.innerHTML = filtered.map(p => `
                    <div class="post-item" data-id="${p.id}">
                        <div class="post-title">${p.title}</div>
                        <div class="post-meta">
                            <span>${p.date}</span>
                            ${p.tags ? p.tags.map(t => `<span class="post-tag">${t}</span>`).join('') : ''}
                        </div>
                        <div class="post-summary">${p.summary}</div>
                    </div>
                `).join('');

                postList.querySelectorAll('.post-item').forEach(el => {
                    el.addEventListener('click', () => showArticle(el.dataset.id));
                });
            }

            // ===== Pins =====
            function renderPins(data) {
                let pins = data.pins || [];
                if (searchQuery) {
                    pins = pins.filter(p => (p.content || '').toLowerCase().includes(searchQuery));
                }
                pinCount.textContent = pins.length || '';

                if (pins.length === 0) {
                    feed.innerHTML = '';
                    pinsEmpty.style.display = 'block';
                    return;
                }
                pinsEmpty.style.display = 'none';

                const name = data.profile?.name || 'Jillax';
                feed.innerHTML = pins.map(pin => {
                    const timeStr = fmtTime(pin.created);
                    const content = (pin.content || '').replace(/\n/g, '<br>');
                    const hasImages = pin.images && pin.images.length > 0;

                    return `
                        <div class="pin-card">
                            <div class="pin-header">
                                <div class="pin-avatar">J</div>
                                <span class="pin-author">${name}</span>
                                <span class="pin-time">${timeStr}</span>
                            </div>
                            <div class="pin-content">${content}</div>
                            ${hasImages ? `
                                <div class="pin-images">
                                    ${pin.images.map(img => `
                                        <img src="${img}" alt="" loading="lazy" referrerpolicy="no-referrer"
                                             onclick="document.getElementById('lightboxImg').src=this.src;document.getElementById('lightbox').classList.add('active');document.body.style.overflow='hidden'">
                                    `).join('')}
                                </div>
                            ` : ''}
                            <div class="pin-footer">
                                <span class="pin-stat">👍 <span class="num">${fmtNum(pin.likes)}</span></span>
                                <span class="pin-stat">💬 <span class="num">${fmtNum(pin.comments)}</span></span>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // ===== Articles =====
            function renderArticles(data) {
                window.__zhArticleData = data.articles || [];
                let articles = data.articles || [];
                if (searchQuery) {
                    articles = articles.filter(a => {
                        const title = (a.title || '').toLowerCase();
                        const summary = (a.summary || '').toLowerCase();
                        return title.includes(searchQuery) || summary.includes(searchQuery);
                    });
                }
                articleCount.textContent = articles.length || '';

                if (articles.length === 0) {
                    articleList.innerHTML = '';
                    articlesEmpty.style.display = 'block';
                    return;
                }
                articlesEmpty.style.display = 'none';

                articleList.innerHTML = articles.map(a => {
                    const timeStr = fmtTime(a.created);
                    return `
                        <div class="article-card" onclick="openZhArticle('${a.url}')">
                            <div class="article-card-title">
                                <a href="${a.url}" target="_blank" rel="noopener">${a.title}</a>
                            </div>
                            <div class="article-card-meta">
                                <span>${timeStr}</span>
                            </div>
                            ${a.summary ? `<div class="article-card-summary">${a.summary}</div>` : ''}
                            <div class="article-card-stats">
                                <span>👍 ${fmtNum(a.likes)}</span>
                                <span>💬 ${fmtNum(a.comments)}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // ===== Zhihu Article Viewer =====
            window.openZhArticle = function(url) {
                const arts = window.__zhArticleData || [];
                const a = arts.find(x => x.url === url);
                if (!a || !a.body_html) { window.open(url, '_blank'); return; }
                document.getElementById('articlesSection').style.display = 'none';
                document.getElementById('zhArticleView').style.display = '';
                document.getElementById('zhArtTitle').textContent = a.title;
                document.getElementById('zhArtMeta').innerHTML = fmtTime(a.created) + ' · 👍 ' + fmtNum(a.likes) + ' · 💬 ' + fmtNum(a.comments);
                document.getElementById('zhArtBody').innerHTML = a.body_html;
            };
            document.getElementById('zhArtBack').addEventListener('click', function() {
                document.getElementById('zhArticleView').style.display = 'none';
                document.getElementById('articlesSection').style.display = '';
            });

            // ===== Load Data =====
            fetch('data/posts.json')
                .then(r => r.json())
                .then(data => {
                    posts = data;
                    renderList();

                    const hash = window.location.hash.slice(1);
                    if (hash === 'pins' || hash === 'articles') {
                        switchTab(hash);
                    } else if (hash) {
                        const found = posts.find(p => p.id === hash);
                        if (found) showArticle(hash);
                    }
                })
                .catch(() => {
                    postList.innerHTML = '<div class="empty-state">加载失败</div>';
                });

            fetch('data/zhihu.json')
                .then(r => {
                    if (!r.ok) throw new Error('Not found');
                    return r.json();
                })
                .then(data => {
                    allDataRaw = data;
                    renderPins(data);
                    renderArticles(data);
                })
                .catch(() => {
                    feed.innerHTML = '';
                    pinsEmpty.style.display = 'block';
                    articleList.innerHTML = '';
                    articlesEmpty.style.display = 'block';
                });

            // ===== Back Button =====
            articleBack.addEventListener('click', showList);

            // ===== Lightbox =====
            document.getElementById('lightboxClose').addEventListener('click', function() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            });
            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox) {
                    lightbox.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    lightbox.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });

            // ===== Browser Navigation =====
            window.addEventListener('popstate', function() {
                const hash = window.location.hash.slice(1);
                if (hash === 'pins' || hash === 'articles') {
                    switchTab(hash);
                } else if (hash) {
                    const found = posts.find(p => p.id === hash);
                    if (found) showArticle(hash);
                } else {
                    switchTab('posts');
                    showList();
                }
            });
        });
    </script>

    <script src="js/main.js"></script>

</body>
</html>
