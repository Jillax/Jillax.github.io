<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的文件分享">
    <title>分享 · Jillax</title>

    <link rel="stylesheet" href="css/main.css">

    <style>
        /* ===== Breadcrumb ===== */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
            font-size: 0.82rem;
            flex-wrap: wrap;
        }
        .breadcrumb a {
            color: var(--text-muted);
            transition: color 0.3s ease;
        }
        .breadcrumb a:hover { color: var(--gold); }
        .breadcrumb .sep {
            color: var(--text-faint);
            font-size: 0.7rem;
        }
        .breadcrumb .current {
            color: var(--text-soft);
        }

        /* ===== File Grid ===== */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .file-item {
            border: 1px solid var(--border);
            padding: 16px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .file-item:hover {
            border-color: var(--gold-dim);
            background: var(--gold-dim);
            transform: translateY(-2px);
        }
        .file-item.folder:hover {
            border-color: var(--gold-soft);
        }
        .file-icon {
            font-size: 1.6rem;
            margin-bottom: 8px;
            line-height: 1;
        }
        .file-thumb {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            margin-bottom: 8px;
            background: var(--border-light);
        }
        .file-name {
            font-size: 0.8rem;
            color: var(--text-soft);
            word-break: break-all;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .file-item.folder .file-name {
            color: var(--text);
        }
        .file-size {
            font-size: 0.7rem;
            color: var(--text-faint);
            margin-top: 4px;
        }

        /* ===== State Messages ===== */
        .state-msg {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-faint);
            font-size: 0.85rem;
        }
        .state-msg .icon { font-size: 2.2rem; margin-bottom: 16px; }
        .state-msg .detail {
            font-size: 0.78rem;
            color: var(--text-faint);
            margin-top: 8px;
        }
        .error-msg { color: rgba(200, 100, 100, 0.5); }

        /* ===== Lightbox ===== */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .lightbox.active { display: flex; }
        .lightbox-content {
            max-width: 90vw;
            max-height: 85vh;
            position: relative;
        }
        .lightbox-content img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border: 1px solid var(--border);
        }
        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 24px;
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: color 0.3s ease;
            background: none;
            border: none;
            font-family: var(--font-body);
        }
        .lightbox-close:hover { color: #fff; }
        .lightbox-dl {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            background: var(--gold);
            color: #181410;
            border: none;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease;
            letter-spacing: 0.5px;
            font-family: var(--font-body);
        }
        .lightbox-dl:hover { background: #d4b36a; }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .file-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
            .file-item { padding: 12px; }
        }
    </style>
</head>
<body>

    <!-- ===== Nav ===== -->
    <nav>
        <div class="container">
            <a href="index.html" class="nav-logo">Jillax</a>
            <div class="nav-links">
                <a href="about.html" data-i18n="nav.about">关于</a>
                <a href="portfolio.html" data-i18n="nav.portfolio">投资</a>
                <a href="contact.html" data-i18n="nav.contact">联系</a>
                <a href="share.html" class="current" data-i18n="nav.share">分享</a>
                <a href="translations.html" data-i18n="nav.translations">译制</a>
                <a href="bookshelf.html" data-i18n="nav.bookshelf">书影音</a>
                <a href="blog.html" data-i18n="nav.blog">随笔</a>
                <button class="theme-toggle" id="themeToggle" title="切换主题">☀</button>
                <button class="lang-toggle" title="语言/Language">EN</button>
            </div>
        </div>
    </nav>

    <div id="page-transition-overlay" style="position:fixed;inset:0;z-index:9998;background:#1a1714;opacity:1;pointer-events:none"></div>

    <!-- ===== Header ===== -->
    <div class="container">
        <div class="page-header">
            <a href="index.html" class="back-home" data-i18n="home.back">← 返回主页</a>
            <h1 data-i18n="page.share.title">📁 文件分享</h1>
            <p data-i18n="page.share.desc">浏览和下载分享的文件</p>
        </div>

        <!-- ===== Breadcrumb ===== -->
        <div class="breadcrumb" id="breadcrumb">
            <a href="#" data-path="">根目录</a>
        </div>

        <!-- ===== File Grid ===== -->
        <div class="file-grid" id="fileGrid"></div>

        <!-- ===== Loading / Error ===== -->
        <div class="state-msg" id="stateMsg" style="display:none">
            <div class="icon" id="stateIcon">📂</div>
            <div id="stateText">加载中...</div>
            <div class="detail" id="stateDetail"></div>
        </div>
    </div>

    <!-- ===== Lightbox ===== -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">✕</button>
        <div class="lightbox-content">
            <img id="lightboxImg" src="" alt="">
        </div>
        <a class="lightbox-dl" id="lightboxDl" download>下载原图</a>
    </div>

    <!-- ===== Footer ===== -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Jillax</p>
        </div>
    </footer>

    <script>
        // ============================================================
        //  ⚙️ 配置区
        // ============================================================

        const GITHUB_OWNER = 'Jillax';
        const GITHUB_REPO = 'Jillax.github.io';
                const BRANCH = 'main';
        const ROOT_PATH = 'Share';
        const IMAGE_EXTS = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.bmp', '.svg'];

        // ============================================================
        //  以下代码不用动
        // ============================================================

        let currentPath = ROOT_PATH;
        const fileGrid = document.getElementById('fileGrid');
        const stateMsg = document.getElementById('stateMsg');
        const stateIcon = document.getElementById('stateIcon');
        const stateText = document.getElementById('stateText');
        const stateDetail = document.getElementById('stateDetail');
        const breadcrumb = document.getElementById('breadcrumb');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxDl = document.getElementById('lightboxDl');

        function isImage(name) {
            return IMAGE_EXTS.some(ext => name.toLowerCase().endsWith(ext));
        }

        function formatSize(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function getRawUrl(path) {
            return `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${BRANCH}/${path}`;
        }

        function getCdnUrl(path) {
            return `https://cdn.jsdelivr.net/gh/${GITHUB_OWNER}/${GITHUB_REPO}@${BRANCH}/${path}`;
        }

        async function listDir() {
            const url = "https://raw.githubusercontent.com/Jillax/Jillax.github.io/main/Share/index.json";
            const res = await fetch(url);
            if (!res.ok) throw new Error("索引文件加载失败");
            const data = await res.json();
            return (data.files || []).map(function(f) {
              return { type: "file", name: f.name, path: "Share/" + f.name, size: f.size || 0 };
            });
          }

        function renderBreadcrumb(path) {
            const parts = path ? path.split('/') : [];
            let html = `<a href="#" data-path="">根目录</a>`;
            let accumulated = '';
            parts.forEach((part, i) => {
                accumulated += (accumulated ? '/' : '') + part;
                const isLast = i === parts.length - 1;
                html += `<span class="sep">›</span>`;
                if (isLast) {
                    html += `<span class="current">${part}</span>`;
                } else {
                    html += `<a href="#" data-path="${accumulated}">${part}</a>`;
                }
            });
            breadcrumb.innerHTML = html;
            breadcrumb.querySelectorAll('a[data-path]').forEach(a => {
                a.addEventListener('click', e => {
                    e.preventDefault();
                    navigateTo(a.dataset.path);
                });
            });
        }

        function showState(icon, text, detail, isError) {
            stateMsg.style.display = 'block';
            fileGrid.style.display = 'none';
            stateIcon.textContent = icon;
            stateText.textContent = text;
            stateText.className = isError ? 'error-msg' : '';
            stateDetail.textContent = detail || '';
        }

        function showGrid() {
            stateMsg.style.display = 'none';
            fileGrid.style.display = 'grid';
        }

        async function navigateTo() {
            currentPath = ROOT_PATH;
            renderBreadcrumb(currentPath);
            showState('⏳', '加载中...', '');

            try {
                const items = await listDir();
                showGrid();
                fileGrid.innerHTML = '';

                const folders = items.filter(i => i.type === 'dir');
                const files = items.filter(i => i.type === 'file');

                folders.sort((a, b) => a.name.localeCompare(b.name));
                files.sort((a, b) => a.name.localeCompare(b.name));

                const allItems = [...folders, ...files];

                if (allItems.length === 0) {
                    showState('📂', '这个文件夹是空的', '');
                    return;
                }

                allItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'file-item' + (item.type === 'dir' ? ' folder' : '');

                    if (item.type === 'dir') {
                        div.innerHTML = `
                            <div class="file-icon">📁</div>
                            <div class="file-name">${item.name}</div>
                        `;
                        
                    } else if (isImage(item.name)) {
                        const thumbUrl = getCdnUrl(item.path);
                        div.innerHTML = `
                            <img class="file-thumb" src="${thumbUrl}" alt="${item.name}" loading="lazy"
                                 onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                            <div class="file-icon" style="display:none">🖼️</div>
                            <div class="file-name">${item.name}</div>
                            <div class="file-size">${formatSize(item.size)}</div>
                        `;
                        div.addEventListener('click', () => openLightbox(item.path, item.name));
                    } else {
                        const rawUrl = getRawUrl(item.path);
                        div.innerHTML = `
                            <div class="file-icon">📄</div>
                            <div class="file-name">${item.name}</div>
                            <div class="file-size">${formatSize(item.size)}</div>
                        `;
                        div.addEventListener('click', () => window.open(rawUrl, '_blank'));
                    }

                    fileGrid.appendChild(div);
                });
            } catch (err) {
                showState('⚠️', '加载失败', err.message, true);
            }
        }

        function openLightbox(path, name) {
            const url = getRawUrl(path);
            lightboxImg.src = url;
            lightboxDl.href = url;
            lightboxDl.download = name;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', e => {
            if (e.target === lightbox) closeLightbox();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox();
        });

        navigateTo();
    </script>

    <script src="js/main.js"></script>

</body>
</html>
