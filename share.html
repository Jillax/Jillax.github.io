<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的文件分享">
    <title>分享 · Jillax</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Noto+Serif+SC:wght@400;500;600;700&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #181410;
            --bg-nav: rgba(24, 20, 16, 0.82);
            --text: #e4dbcc;
            --text-soft: rgba(228, 219, 204, 0.55);
            --text-muted: rgba(228, 219, 204, 0.28);
            --text-faint: rgba(228, 219, 204, 0.12);
            --gold: #c4a35a;
            --gold-soft: rgba(196, 163, 90, 0.35);
            --gold-dim: rgba(196, 163, 90, 0.12);
            --border: rgba(228, 219, 204, 0.06);
            --border-light: rgba(228, 219, 204, 0.03);
            --container: 680px;
            --font-display: 'Fraunces', 'Noto Serif SC', serif;
            --font-body: 'Spectral', 'Noto Serif SC', serif;
            --font-chinese: 'Noto Serif SC', serif;
        }

        [data-theme="light"] {
            --bg: #f5f0e8;
            --bg-nav: rgba(245, 240, 232, 0.85);
            --text: #2c2824;
            --text-soft: rgba(44, 40, 36, 0.6);
            --text-muted: rgba(44, 40, 36, 0.35);
            --text-faint: rgba(44, 40, 36, 0.12);
            --gold: #c4a35a;
            --gold-soft: rgba(196, 163, 90, 0.5);
            --gold-dim: rgba(196, 163, 90, 0.15);
            --border: rgba(44, 40, 36, 0.08);
            --border-light: rgba(44, 40, 36, 0.04);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            font-weight: 400;
        }
        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }

        .container {
            max-width: var(--container);
            margin: 0 auto;
            padding: 0 32px;
            position: relative;
            z-index: 1;
        }

        /* ===== Nav ===== */
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100; padding: 20px 0;
            background: var(--bg-nav);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light);
        }
        nav .container {
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo {
            font-family: var(--font-display); font-weight: 600;
            font-size: 1.1rem; color: var(--text);
            letter-spacing: 0.5px;
            font-variation-settings: 'SOFT' 80, 'WONK' 0;
        }
        .nav-links {
            display: flex; gap: 20px;
            font-size: 0.78rem; color: var(--text-muted);
            font-family: var(--font-body);
        }
        .nav-links a {
            transition: color 0.4s ease; letter-spacing: 0.5px; position: relative;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 0; height: 1px; background: var(--gold);
            transition: width 0.4s ease;
        }
        .nav-links a:hover { color: var(--text); }
        .nav-links a:hover::after { width: 100%; }
        .nav-links .current { color: var(--text-soft); }
        .nav-links .current::after { width: 100%; }
        .theme-toggle {
            background: none; border: none;
            color: var(--text-muted); cursor: pointer;
            font-size: 0.85rem; padding: 0;
            transition: color 0.4s ease;
            font-family: var(--font-body); line-height: 1;
        }
        .theme-toggle:hover { color: var(--gold); }

        /* ===== Page Header ===== */
        .page-header {
            padding: 100px 0 40px;
        }
        .page-header .back-home {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.78rem;
            color: var(--text-faint);
            margin-bottom: 16px;
            transition: color 0.3s ease;
            font-family: var(--font-body);
        }
        .page-header .back-home:hover { color: var(--gold); }
        .page-header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 3vw, 2.4rem);
            font-weight: 600; color: var(--text);
            letter-spacing: -0.3px;
            font-variation-settings: 'SOFT' 60, 'WONK' 0;
        }
        .page-header p {
            font-size: 0.82rem; color: var(--text-muted);
            margin-top: 8px; font-weight: 300;
        }

        /* ===== Breadcrumb ===== */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
            font-size: 0.82rem;
            flex-wrap: wrap;
        }
        .breadcrumb a {
            color: var(--text-muted);
            transition: color 0.3s ease;
        }
        .breadcrumb a:hover { color: var(--gold); }
        .breadcrumb .sep {
            color: var(--text-faint);
            font-size: 0.7rem;
        }
        .breadcrumb .current {
            color: var(--text-soft);
        }

        /* ===== File Grid ===== */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .file-item {
            border: 1px solid var(--border);
            padding: 16px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .file-item:hover {
            border-color: var(--gold-dim);
            background: var(--gold-dim);
            transform: translateY(-2px);
        }
        .file-item.folder:hover {
            border-color: var(--gold-soft);
        }
        .file-icon {
            font-size: 1.6rem;
            margin-bottom: 8px;
            line-height: 1;
        }
        .file-thumb {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            margin-bottom: 8px;
            background: var(--border-light);
        }
        .file-name {
            font-size: 0.8rem;
            color: var(--text-soft);
            word-break: break-all;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .file-item.folder .file-name {
            color: var(--text);
        }
        .file-size {
            font-size: 0.7rem;
            color: var(--text-faint);
            margin-top: 4px;
        }

        /* ===== State Messages ===== */
        .state-msg {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-faint);
            font-size: 0.85rem;
        }
        .state-msg .icon { font-size: 2.2rem; margin-bottom: 16px; }
        .state-msg .detail {
            font-size: 0.78rem;
            color: var(--text-faint);
            margin-top: 8px;
        }
        .error-msg { color: rgba(200, 100, 100, 0.5); }

        /* ===== Lightbox ===== */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .lightbox.active { display: flex; }
        .lightbox-content {
            max-width: 90vw;
            max-height: 85vh;
            position: relative;
        }
        .lightbox-content img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border: 1px solid var(--border);
        }
        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 24px;
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: color 0.3s ease;
            background: none;
            border: none;
            font-family: var(--font-body);
        }
        .lightbox-close:hover { color: #fff; }
        .lightbox-dl {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            background: var(--gold);
            color: #181410;
            border: none;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease;
            letter-spacing: 0.5px;
            font-family: var(--font-body);
        }
        .lightbox-dl:hover { background: #d4b36a; }

        /* ===== Footer ===== */
        footer {
            padding: 48px 0; margin-top: 80px;
            border-top: 1px solid var(--border-light);
            text-align: center; color: var(--text-faint);
            font-size: 0.75rem;
            font-family: var(--font-display); font-style: italic;
            font-variation-settings: 'SOFT' 100, 'WONK' 1;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            nav { padding: 16px 0; }
            .nav-links { gap: 14px; font-size: 0.75rem; }
            .nav-links a:nth-child(5),
            .nav-links a:nth-child(6),
            .nav-links a:nth-child(7),
            .nav-links a:nth-child(8) { display: none; }
            .container { padding: 0 24px; }
            .page-header { padding: 80px 0 28px; }
            .file-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
            .file-item { padding: 12px; }
        }
        @media (max-width: 480px) {
            .nav-links a:nth-child(4),
            .nav-links a:nth-child(5),
            .nav-links a:nth-child(6),
            .nav-links a:nth-child(7),
            .nav-links a:nth-child(8) { display: none; }
        }
    </style>
</head>
<body>

    <!-- ===== Nav ===== -->
    <nav>
        <div class="container">
            <a href="index.html" class="nav-logo">Jillax</a>
            <div class="nav-links">
                <a href="about.html">关于</a>
                <a href="portfolio.html">投资</a>
                <a href="contact.html">联系</a>
                <a href="share.html" class="current">分享</a>
                <a href="translations.html">译制</a>
                <a href="bookshelf.html">书影音</a>
                <a href="blog.html">随笔</a>
                <button class="theme-toggle" id="themeToggle" title="切换主题">☀</button>
            </div>
        </div>
    </nav>

    <!-- ===== Header ===== -->
    <div class="container">
        <div class="page-header">
            <a href="index.html" class="back-home">← 返回主页</a>
            <h1>📁 文件分享</h1>
            <p>浏览和下载分享的文件</p>
        </div>

        <!-- ===== Breadcrumb ===== -->
        <div class="breadcrumb" id="breadcrumb">
            <a href="#" data-path="">根目录</a>
        </div>

        <!-- ===== File Grid ===== -->
        <div class="file-grid" id="fileGrid"></div>

        <!-- ===== Loading / Error ===== -->
        <div class="state-msg" id="stateMsg" style="display:none">
            <div class="icon" id="stateIcon">📂</div>
            <div id="stateText">加载中...</div>
            <div class="detail" id="stateDetail"></div>
        </div>
    </div>

    <!-- ===== Lightbox ===== -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">✕</button>
        <div class="lightbox-content">
            <img id="lightboxImg" src="" alt="">
        </div>
        <a class="lightbox-dl" id="lightboxDl" download>下载原图</a>
    </div>

    <!-- ===== Footer ===== -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Jillax</p>
        </div>
    </footer>

    <!-- ===== Theme Toggle ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                html.setAttribute('data-theme', 'light');
                toggle.textContent = '☾';
            } else if (saved === 'dark') {
                html.removeAttribute('data-theme');
                toggle.textContent = '☀';
            }
            toggle.addEventListener('click', function() {
                const isLight = html.hasAttribute('data-theme');
                if (isLight) {
                    html.removeAttribute('data-theme');
                    toggle.textContent = '☀';
                    localStorage.setItem('theme', 'dark');
                } else {
                    html.setAttribute('data-theme', 'light');
                    toggle.textContent = '☾';
                    localStorage.setItem('theme', 'light');
                }
            });
        });
    </script>

    <script>
        // ============================================================
        //  ⚙️ 配置区
        // ============================================================

        const GITHUB_OWNER = 'Jillax';
        const GITHUB_REPO = 'Image-Share';
        const GITHUB_TOKEN = '';
        const BRANCH = 'main';
        const ROOT_PATH = '';
        const IMAGE_EXTS = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.bmp', '.svg'];

        // ============================================================
        //  以下代码不用动
        // ============================================================

        let currentPath = ROOT_PATH;
        const fileGrid = document.getElementById('fileGrid');
        const stateMsg = document.getElementById('stateMsg');
        const stateIcon = document.getElementById('stateIcon');
        const stateText = document.getElementById('stateText');
        const stateDetail = document.getElementById('stateDetail');
        const breadcrumb = document.getElementById('breadcrumb');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxDl = document.getElementById('lightboxDl');

        function isImage(name) {
            return IMAGE_EXTS.some(ext => name.toLowerCase().endsWith(ext));
        }

        function formatSize(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function getRawUrl(path) {
            return `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${BRANCH}/${path}`;
        }

        function getCdnUrl(path) {
            return `https://cdn.jsdelivr.net/gh/${GITHUB_OWNER}/${GITHUB_REPO}@${BRANCH}/${path}`;
        }

        async function listDir(path) {
            const encodedPath = path ? encodeURIComponent(path) : '';
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents${encodedPath ? '/' + encodedPath : ''}?ref=${BRANCH}`;
            const headers = { Accept: 'application/vnd.github.v3+json' };
            if (GITHUB_TOKEN) {
                headers.Authorization = `Bearer ${GITHUB_TOKEN}`;
            }
            const res = await fetch(url, { headers });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                const msg = err.message || res.statusText;
                const remaining = res.headers.get('X-RateLimit-Remaining');
                if (remaining === '0') {
                    const reset = res.headers.get('X-RateLimit-Reset');
                    const resetDate = new Date(parseInt(reset) * 1000);
                    throw new Error(`API 频率限制已达上限，将在 ${resetDate.toLocaleTimeString()} 后重置。建议配置 Token 以提升限制。`);
                }
                if (res.status === 404) {
                    throw new Error(`路径不存在：${path}`);
                }
                throw new Error(`请求失败：${msg}`);
            }
            return res.json();
        }

        function renderBreadcrumb(path) {
            const parts = path ? path.split('/') : [];
            let html = `<a href="#" data-path="">根目录</a>`;
            let accumulated = '';
            parts.forEach((part, i) => {
                accumulated += (accumulated ? '/' : '') + part;
                const isLast = i === parts.length - 1;
                html += `<span class="sep">›</span>`;
                if (isLast) {
                    html += `<span class="current">${part}</span>`;
                } else {
                    html += `<a href="#" data-path="${accumulated}">${part}</a>`;
                }
            });
            breadcrumb.innerHTML = html;
            breadcrumb.querySelectorAll('a[data-path]').forEach(a => {
                a.addEventListener('click', e => {
                    e.preventDefault();
                    navigateTo(a.dataset.path);
                });
            });
        }

        function showState(icon, text, detail, isError) {
            stateMsg.style.display = 'block';
            fileGrid.style.display = 'none';
            stateIcon.textContent = icon;
            stateText.textContent = text;
            stateText.className = isError ? 'error-msg' : '';
            stateDetail.textContent = detail || '';
        }

        function showGrid() {
            stateMsg.style.display = 'none';
            fileGrid.style.display = 'grid';
        }

        async function navigateTo(path) {
            currentPath = path;
            renderBreadcrumb(path);
            showState('⏳', '加载中...', '');

            try {
                const items = await listDir(path);
                showGrid();
                fileGrid.innerHTML = '';

                const folders = items.filter(i => i.type === 'dir');
                const files = items.filter(i => i.type === 'file');

                folders.sort((a, b) => a.name.localeCompare(b.name));
                files.sort((a, b) => a.name.localeCompare(b.name));

                const allItems = [...folders, ...files];

                if (allItems.length === 0) {
                    showState('📂', '这个文件夹是空的', '');
                    return;
                }

                allItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'file-item' + (item.type === 'dir' ? ' folder' : '');

                    if (item.type === 'dir') {
                        div.innerHTML = `
                            <div class="file-icon">📁</div>
                            <div class="file-name">${item.name}</div>
                        `;
                        div.addEventListener('click', () => navigateTo(item.path));
                    } else if (isImage(item.name)) {
                        const thumbUrl = getCdnUrl(item.path);
                        div.innerHTML = `
                            <img class="file-thumb" src="${thumbUrl}" alt="${item.name}" loading="lazy"
                                 onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                            <div class="file-icon" style="display:none">🖼️</div>
                            <div class="file-name">${item.name}</div>
                            <div class="file-size">${formatSize(item.size)}</div>
                        `;
                        div.addEventListener('click', () => openLightbox(item.path, item.name));
                    } else {
                        const rawUrl = getRawUrl(item.path);
                        div.innerHTML = `
                            <div class="file-icon">📄</div>
                            <div class="file-name">${item.name}</div>
                            <div class="file-size">${formatSize(item.size)}</div>
                        `;
                        div.addEventListener('click', () => window.open(rawUrl, '_blank'));
                    }

                    fileGrid.appendChild(div);
                });
            } catch (err) {
                showState('⚠️', '加载失败', err.message, true);
            }
        }

        function openLightbox(path, name) {
            const url = getRawUrl(path);
            lightboxImg.src = url;
            lightboxDl.href = url;
            lightboxDl.download = name;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', e => {
            if (e.target === lightbox) closeLightbox();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox();
        });

        navigateTo(ROOT_PATH);
    </script>

</body>
</html>
