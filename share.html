<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的文件分享">
    <title>分享 · Jillax</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/share.css">
</head>
<body data-page="share">

    <div class="container">
        <div class="page-header">
            <a href="index.html" class="back-home" data-i18n="home.back">← 返回主页</a>
            <h1 data-i18n="page.share.title">📁 文件分享</h1>
            <p data-i18n="page.share.desc">浏览和下载分享的文件</p>
        </div>

        <div class="breadcrumb" id="breadcrumb">
            <a href="#" data-path="">根目录</a>
        </div>

        <div class="file-grid" id="fileGrid"></div>

        <div class="state-msg" id="stateMsg" style="display:none">
            <div class="icon" id="stateIcon">📂</div>
            <div id="stateText">加载中...</div>
            <div class="detail" id="stateDetail"></div>
        </div>
    </div>

    <!-- ===== Lightbox ===== -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">✕</button>
        <div class="lightbox-content">
            <img id="lightboxImg" src="" alt="">
        </div>
        <a class="lightbox-dl" id="lightboxDl" download>下载原图</a>
    </div>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
    <script src="js/share.js"></script>

</body>
</html>
