<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="画廊 — AI 生成图像与数字创作。">
    <meta name="author" content="Jillax">
    <meta property="og:title" content="画廊 · Jillax">
    <meta property="og:description" content="AI 生成图像与数字创作。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jillax.github.io/share.html">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://jillax.github.io/share.html">
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <title>画廊 · Jillax</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .gallery-header {
            text-align: center;
            padding: 100px 20px 40px;
        }
        .gallery-header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--text);
            text-shadow: 0 0 20px var(--purple-glow);
        }
        .gallery-header h1 span { color: var(--purple-bright); }
        .gallery-header .sub {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            margin-top: 10px;
        }
        .gallery {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 80px;
            columns: 3;
            column-gap: 16px;
        }
        @media (max-width: 900px) { .gallery { columns: 2; } }
        @media (max-width: 500px) { .gallery { columns: 1; } }
        .gallery-item {
            break-inside: avoid;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .gallery-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(13,10,26,0.8) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }
        .gallery-item:hover {
            border-color: var(--purple);
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(155,89,255,0.2);
        }
        .gallery-item:hover::after { opacity: 1; }
        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.6s ease;
        }
        .gallery-item:hover img { transform: scale(1.03); }
        .gallery-caption {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 16px;
            z-index: 2;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }
        .gallery-item:hover .gallery-caption {
            opacity: 1;
            transform: translateY(0);
        }
        .gallery-caption .gc-title {
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--purple-bright);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--purple-glow);
        }
        .gallery-caption .gc-meta {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--text-faint);
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(13,10,26,0.95);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .lightbox.open { display: flex; }
        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border: 1px solid var(--border-glow);
            box-shadow: 0 0 60px rgba(155,89,255,0.2);
        }
        .lightbox-close {
            position: fixed;
            top: 24px; right: 32px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
            background: none;
            border: 1px solid var(--border);
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 201;
        }
        .lightbox-close:hover { border-color: var(--neon-pink); color: var(--neon-pink); }
        .lightbox-title {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            z-index: 201;
            text-align: center;
        }
    </style>
</head>
<body data-page="share">
    <noscript>
        <div style="text-align:center;padding:60px 20px;font-family:monospace;color:#b47aff;background:#0d0a1a">
            <h1>画廊</h1>
            <p>AI 生成图像与数字创作。</p>
        </div>
    </noscript>

    <main>
    <div class="gallery-header">
        <h1><span>画 廊</span></h1>
        <p class="sub">GALLERY · AI GENERATED · DIGITAL ART</p>
    </div>
    <div class="gallery" id="gallery"></div>
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">✕</button>
        <img id="lightboxImg" src="" alt="">
        <div class="lightbox-title" id="lightboxTitle"></div>
    </div>
    </main>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
    <script>
    (function() {
        var gallery = document.getElementById('gallery');
        var lightbox = document.getElementById('lightbox');
        var lightboxImg = document.getElementById('lightboxImg');
        var lightboxTitle = document.getElementById('lightboxTitle');
        var images = [
            { file: 'Jill.jpg', title: 'Jill' },
            { file: 'Jill&Boss.jpg', title: 'Jill & Boss' },
            { file: 'Jill海报.png', title: 'Jill · VA-11 Hall-A' },
            { file: '赛博朋克酒保行动Jill同人.webp', title: 'VA-11 Hall-A 同人' },
            { file: 'ChatGPT Image 2026年5月19日 22_45_50.png', title: 'AI Art' },
            { file: 'ChatGPT Image 2026年6月4日 11_02_45.png', title: 'AI Art #2' },
            { file: 'ChatGPT Image 2026年6月4日 11_08_23.png', title: 'AI Art #3' },
            { file: 'swuDota2.png', title: 'SWU Dota 2' },
            { file: '大性别分化.webp', title: '大性别分化' },
            { file: '性别史知识图谱.png', title: '性别史知识图谱' }
        ];
        var basePath = 'assets/Image-Share/';
        images.forEach(function(img) {
            var item = document.createElement('div');
            item.className = 'gallery-item';
            item.innerHTML =
                '<img src="' + basePath + encodeURIComponent(img.file) + '" alt="' + img.title + '" loading="lazy">' +
                '<div class="gallery-caption"><div class="gc-title">' + img.title + '</div>' +
                '<div class="gc-meta">' + img.file + '</div></div>';
            item.addEventListener('click', function() {
                lightboxImg.src = basePath + encodeURIComponent(img.file);
                lightboxTitle.textContent = img.title + ' — ' + img.file;
                lightbox.classList.add('open');
                document.body.style.overflow = 'hidden';
            });
            gallery.appendChild(item);
        });
        function closeLB() {
            lightbox.classList.remove('open');
            document.body.style.overflow = '';
        }
        lightbox.addEventListener('click', function(e) { if (e.target === lightbox || e.target === lightboxImg) closeLB(); });
        document.getElementById('lightboxClose').addEventListener('click', closeLB);
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLB(); });
    })();
    </script>
</body>
</html>
