<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的书影音清单">
    <title>书影音 · Jillax</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Noto+Serif+SC:wght@400;500;600;700&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #181410;
            --bg-nav: rgba(24, 20, 16, 0.82);
            --text: #e4dbcc;
            --text-soft: rgba(228, 219, 204, 0.55);
            --text-muted: rgba(228, 219, 204, 0.28);
            --text-faint: rgba(228, 219, 204, 0.12);
            --gold: #c4a35a;
            --gold-soft: rgba(196, 163, 90, 0.35);
            --gold-dim: rgba(196, 163, 90, 0.12);
            --olive: #7a8b6e;
            --border: rgba(228, 219, 204, 0.06);
            --border-light: rgba(228, 219, 204, 0.03);
            --container: 680px;
            --font-display: 'Fraunces', 'Noto Serif SC', serif;
            --font-body: 'Spectral', 'Noto Serif SC', serif;
            --font-chinese: 'Noto Serif SC', serif;
        }

        [data-theme="light"] {
            --bg: #f5f0e8;
            --bg-nav: rgba(245, 240, 232, 0.85);
            --text: #2c2824;
            --text-soft: rgba(44, 40, 36, 0.6);
            --text-muted: rgba(44, 40, 36, 0.35);
            --text-faint: rgba(44, 40, 36, 0.12);
            --gold: #c4a35a;
            --gold-soft: rgba(196, 163, 90, 0.5);
            --gold-dim: rgba(196, 163, 90, 0.15);
            --olive: #6b8f71;
            --border: rgba(44, 40, 36, 0.08);
            --border-light: rgba(44, 40, 36, 0.04);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-weight: 400;
        }
        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }

        .container {
            max-width: var(--container);
            margin: 0 auto;
            padding: 0 32px;
            position: relative;
            z-index: 1;
        }

        /* ===== Nav ===== */
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100; padding: 20px 0;
            background: var(--bg-nav);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light);
        }
        nav .container {
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo {
            font-family: var(--font-display); font-weight: 600;
            font-size: 1.1rem; color: var(--text);
            letter-spacing: 0.5px;
            font-variation-settings: 'SOFT' 80, 'WONK' 0;
        }
        .nav-links {
            display: flex; gap: 20px;
            font-size: 0.78rem; color: var(--text-muted);
            font-family: var(--font-body);
        }
        .nav-links a {
            transition: color 0.4s ease; letter-spacing: 0.5px; position: relative;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 0; height: 1px; background: var(--gold);
            transition: width 0.4s ease;
        }
        .nav-links a:hover { color: var(--text); }
        .nav-links a:hover::after { width: 100%; }
        .nav-links .current { color: var(--text-soft); }
        .nav-links .current::after { width: 100%; }
        .theme-toggle {
            background: none; border: none;
            color: var(--text-muted); cursor: pointer;
            font-size: 0.85rem; padding: 0;
            transition: color 0.4s ease;
            font-family: var(--font-body); line-height: 1;
        }
        .theme-toggle:hover { color: var(--gold); }

        /* ===== Page Header ===== */
        .page-header {
            padding: 100px 0 40px;
        }
        .page-header .back-home {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.78rem;
            color: var(--text-faint);
            margin-bottom: 16px;
            transition: color 0.3s ease;
            font-family: var(--font-body);
        }
        .page-header .back-home:hover { color: var(--gold); }
        .page-header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 3vw, 2.4rem);
            font-weight: 600; color: var(--text);
            letter-spacing: -0.3px;
            font-variation-settings: 'SOFT' 60, 'WONK' 0;
        }
        .page-header p {
            font-size: 0.82rem; color: var(--text-muted);
            margin-top: 8px; font-weight: 300;
        }

        /* ===== Category Tabs ===== */
        .cat-tabs {
            display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .cat-tab {
            padding: 8px 20px; font-size: 0.82rem;
            color: var(--text-muted); border: 1px solid var(--border);
            background: none; cursor: pointer;
            transition: all 0.3s ease; font-family: var(--font-body);
        }
        .cat-tab:hover { border-color: var(--gold-dim); color: var(--gold); }
        .cat-tab.active { border-color: var(--gold-dim); background: var(--gold-dim); color: var(--gold); }
        .cat-tab .count {
            font-size: 0.65rem;
            color: var(--text-faint);
            margin-left: 4px;
            font-family: var(--font-display);
        }

        /* ===== Stats ===== */
        .stats-bar {
            display: flex; gap: 16px; margin-bottom: 8px; flex-wrap: wrap;
        }
        .stat-item {
            font-size: 0.72rem;
            color: var(--text-faint);
            font-family: var(--font-display);
        }
        .stat-item strong {
            color: var(--text-soft);
            font-weight: 500;
        }
        .update-time {
            font-size: 0.65rem;
            color: var(--text-faint);
            margin-bottom: 16px;
            font-style: italic;
        }

        /* ===== Status Filter ===== */
        .status-tabs {
            display: flex; gap: 2px; margin-bottom: 24px; flex-wrap: wrap;
        }
        .status-tab {
            padding: 4px 14px; font-size: 0.72rem;
            color: var(--text-faint); border: 1px solid var(--border);
            background: none; cursor: pointer;
            transition: all 0.3s ease; font-family: var(--font-body);
        }
        .status-tab:hover { border-color: var(--gold-dim); color: var(--text-soft); }
        .status-tab.active { border-color: var(--gold-dim); color: var(--text-soft); }

        /* ===== Items Grid ===== */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 12px;
        }
        .item-card {
            display: flex;
            gap: 14px;
            padding: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .item-card:hover {
            border-color: var(--gold-dim);
        }
        .item-cover {
            width: 60px;
            height: 85px;
            flex-shrink: 0;
            background: var(--border-light);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .item-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .item-cover .placeholder {
            font-size: 1.2rem;
            color: var(--text-faint);
        }
        .item-info { flex: 1; min-width: 0; }
        .item-title {
            font-family: var(--font-chinese);
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 1px;
            letter-spacing: 0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-author {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 300;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .item-status {
            font-size: 0.6rem;
            padding: 1px 7px;
            border: 1px solid var(--border);
            color: var(--text-faint);
            letter-spacing: 0.5px;
        }
        .item-status.collect { border-color: rgba(122, 139, 110, 0.3); color: var(--olive); }
        .item-status.wish { border-color: var(--border); color: var(--text-faint); }
        .item-status.do { border-color: var(--gold-dim); color: var(--gold-soft); }
        .item-rating {
            font-size: 0.65rem;
            color: var(--gold-soft);
            letter-spacing: 1px;
        }
        .item-comment {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 300;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ===== Empty ===== */
        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--text-faint); font-size: 0.85rem;
        }

        /* ===== Footer ===== */
        footer {
            padding: 48px 0; margin-top: 80px;
            border-top: 1px solid var(--border-light);
            text-align: center; color: var(--text-faint);
            font-size: 0.75rem;
            font-family: var(--font-display); font-style: italic;
            font-variation-settings: 'SOFT' 100, 'WONK' 1;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            nav { padding: 16px 0; }
            .nav-links { gap: 14px; font-size: 0.75rem; }
            .nav-links a:nth-child(5),
            .nav-links a:nth-child(6),
            .nav-links a:nth-child(7),
            .nav-links a:nth-child(8) { display: none; }
            .container { padding: 0 24px; }
            .page-header { padding: 80px 0 28px; }
            .items-grid { grid-template-columns: 1fr; }
            .item-card { padding: 14px; }
        }
        @media (max-width: 480px) {
            .nav-links a:nth-child(4),
            .nav-links a:nth-child(5),
            .nav-links a:nth-child(6),
            .nav-links a:nth-child(7),
            .nav-links a:nth-child(8) { display: none; }
            .cat-tab { padding: 6px 14px; font-size: 0.78rem; }
            .status-tab { padding: 3px 10px; font-size: 0.68rem; }
        }
    </style>
</head>
<body>

    <!-- ===== Nav ===== -->
    <nav>
        <div class="container">
            <a href="index.html" class="nav-logo">Jillax</a>
            <div class="nav-links">
                <a href="index.html#about">关于</a>
                <a href="index.html#projects">笔墨</a>
                <a href="portfolio.html">投资</a>
                <a href="contact.html">联系</a>
                <a href="share.html">分享</a>
                <a href="translations.html">译制</a>
                <a href="bookshelf.html" class="current">书影音</a>
                <a href="blog.html">随笔</a>
                <button class="theme-toggle" id="themeToggle" title="切换主题">☀</button>
            </div>
        </div>
    </nav>

    <!-- ===== Header ===== -->
    <div class="container">
        <div class="page-header">
            <a href="index.html" class="back-home">← 返回主页</a>
            <h1>📖 书影音清单</h1>
            <p>书籍 · 电影 · 音乐</p>
        </div>

        <!-- ===== Category Tabs ===== -->
        <div class="cat-tabs" id="catTabs">
            <button class="cat-tab active" data-cat="books">书籍 <span class="count" id="countBooks">0</span></button>
            <button class="cat-tab" data-cat="movies">电影 <span class="count" id="countMovies">0</span></button>
            <button class="cat-tab" data-cat="music">音乐 <span class="count" id="countMusic">0</span></button>
        </div>

        <!-- ===== Stats & Update ===== -->
        <div class="update-time" id="updateTime"></div>

        <!-- ===== Items ===== -->
        <div class="items-grid" id="itemsGrid"></div>
        <div class="empty-state" id="emptyState" style="display:none">还没有内容</div>
    </div>

    <!-- ===== Footer ===== -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Jillax</p>
        </div>
    </footer>

    <!-- ===== Theme Toggle ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                html.setAttribute('data-theme', 'light');
                toggle.textContent = '☾';
            } else if (saved === 'dark') {
                html.removeAttribute('data-theme');
                toggle.textContent = '☀';
            }
            toggle.addEventListener('click', function() {
                const isLight = html.hasAttribute('data-theme');
                if (isLight) {
                    html.removeAttribute('data-theme');
                    toggle.textContent = '☀';
                    localStorage.setItem('theme', 'dark');
                } else {
                    html.setAttribute('data-theme', 'light');
                    toggle.textContent = '☾';
                    localStorage.setItem('theme', 'light');
                }
            });
        });
    </script>

    <!-- ===== Bookshelf ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const grid = document.getElementById('itemsGrid');
            const empty = document.getElementById('emptyState');
            const catTabs = document.querySelectorAll('.cat-tab');
            const updateTime = document.getElementById('updateTime');

            let allData = { books: [], movies: [], music: [] };
            let currentCat = 'books';

            const statusLabels = {
                books: { collect: '读过', wish: '想读', do: '在读' },
                movies: { collect: '看过', wish: '想看', do: '在看' },
                music: { collect: '听过', wish: '想听', do: '在听' },
            };

            function renderStars(rating) {
                if (!rating || rating === 0) return '';
                return '★'.repeat(rating) + '☆'.repeat(5 - rating);
            }

            function getStatusText(cat, status) {
                const labels = statusLabels[cat] || statusLabels.books;
                return labels[status] || status;
            }

            function renderItems(cat) {
                const items = allData[cat] || [];

                if (items.length === 0) {
                    grid.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';

                grid.innerHTML = items.map(item => {
                    const hasCover = item.cover && item.cover.trim();
                    const initial = item.title ? item.title.charAt(0) : '?';
                    const statusText = getStatusText(cat, item.status);
                    const stars = renderStars(item.rating);

                    return `
                        <div class="item-card">
                            <div class="item-cover">
                                ${hasCover
                                    ? `<img src="${item.cover}" alt="${item.title}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=placeholder>${initial}</span>'">`
                                    : `<span class="placeholder">${initial}</span>`
                                }
                            </div>
                            <div class="item-info">
                                <div class="item-title" title="${item.title}">${item.title}</div>
                                <div class="item-author" title="${item.author}">${item.author || ''}</div>
                                <div class="item-meta">
                                    <span class="item-status ${item.status}">${statusText}</span>
                                    ${stars ? `<span class="item-rating">${stars}</span>` : ''}
                                </div>
                                ${item.comment ? `<div class="item-comment">${item.comment}</div>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            function switchCategory(cat) {
                currentCat = cat;
                renderItems(cat);
            }

            fetch('data/bookshelf.json')
                .then(r => {
                    if (!r.ok) throw new Error('Not found');
                    return r.json();
                })
                .then(data => {
                    allData = data;

                    document.getElementById('countBooks').textContent = (data.books || []).length;
                    document.getElementById('countMovies').textContent = (data.movies || []).length;
                    document.getElementById('countMusic').textContent = (data.music || []).length;

                    if (data.updated) {
                        const d = new Date(data.updated);
                        updateTime.textContent = '数据同步于 ' + d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
                    }

                    switchCategory('books');
                })
                .catch(() => {
                    grid.innerHTML = '<div class="empty-state">加载失败</div>';
                });

            catTabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    catTabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    switchCategory(this.dataset.cat);
                });
            });
        });
    </script>

</body>
</html>
