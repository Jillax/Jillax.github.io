<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的书影音清单">
    <title>书影音 · Jillax</title>

    <link rel="stylesheet" href="css/main.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <style>
        /* ===== Category Tabs ===== */
        .cat-tabs {
            display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .cat-tab {
            padding: 8px 20px; font-size: 0.82rem;
            color: var(--text-muted); border: 1px solid var(--border);
            background: none; cursor: pointer;
            transition: all 0.3s ease; font-family: var(--font-body);
        }
        .cat-tab:hover { border-color: var(--gold-dim); color: var(--gold); }
        .cat-tab.active { border-color: var(--gold-dim); background: var(--gold-dim); color: var(--gold); }
        .cat-tab .count {
            font-size: 0.65rem;
            color: var(--text-faint);
            margin-left: 4px;
            font-family: var(--font-display);
        }

        /* ===== Stats Bar ===== */
        .stats-bar {
            display: flex; gap: 16px; margin-bottom: 8px; flex-wrap: wrap;
        }
        .stat-item {
            font-size: 0.72rem;
            color: var(--text-faint);
            font-family: var(--font-display);
        }
        .stat-item strong {
            color: var(--text-soft);
            font-weight: 500;
        }
        .update-time {
            font-size: 0.65rem;
            color: var(--text-faint);
            margin-bottom: 16px;
            font-style: italic;
        }

        /* ===== Dashboard Section ===== */
        .dash-section {
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 16px;
        }
        .dash-title {
            font-family: var(--font-display);
            font-size: 0.78rem;
            color: var(--text-faint);
            letter-spacing: 2px;
            margin-bottom: 14px;
            text-transform: uppercase;
            font-variation-settings: 'SOFT' 100, 'WONK' 1;
        }

        /* ===== Stat Cards ===== */
        .stat-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 10px;
            margin-bottom: 0;
        }
        .stat-card {
            border: 1px solid var(--border-light);
            padding: 14px;
            text-align: center;
        }
        .stat-card .num {
            font-family: var(--font-display);
            font-size: 1.6rem;
            color: var(--gold-soft);
            font-weight: 500;
            line-height: 1.1;
            font-variation-settings: 'SOFT' 60, 'WONK' 0;
        }
        .stat-card .label {
            font-size: 0.65rem;
            color: var(--text-faint);
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        /* ===== Rating Distribution ===== */
        .rating-bars {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .rating-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .rating-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            width: 28px;
            flex-shrink: 0;
            text-align: right;
            font-family: var(--font-display);
        }
        .rating-track {
            flex: 1;
            height: 18px;
            background: var(--border-light);
            position: relative;
            overflow: hidden;
        }
        .rating-fill {
            height: 100%;
            background: var(--gold-dim);
            transition: width 0.8s ease;
            width: 0;
        }
        .rating-count {
            font-size: 0.7rem;
            color: var(--text-faint);
            width: 32px;
            flex-shrink: 0;
            font-family: var(--font-display);
        }

        /* ===== Status Filter ===== */
        .filter-bar {
            display: flex; gap: 2px; margin-bottom: 16px; flex-wrap: wrap;
            align-items: center;
        }
        .filter-label {
            font-size: 0.65rem;
            color: var(--text-faint);
            margin-right: 8px;
            font-family: var(--font-display);
            letter-spacing: 0.5px;
        }
        .filter-tab {
            padding: 4px 14px; font-size: 0.72rem;
            color: var(--text-faint); border: 1px solid var(--border);
            background: none; cursor: pointer;
            transition: all 0.3s ease; font-family: var(--font-body);
        }
        .filter-tab:hover { border-color: var(--gold-dim); color: var(--text-soft); }
        .filter-tab.active { border-color: var(--gold-dim); color: var(--text-soft); }

        /* ===== Items Grid ===== */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 12px;
        }
        .item-card {
            display: flex;
            gap: 14px;
            padding: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .item-card:hover {
            border-color: var(--gold-dim);
        }
        .item-card.hidden { display: none; }
        .item-cover {
            width: 60px;
            height: 85px;
            flex-shrink: 0;
            background: var(--border-light);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .item-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .item-cover .placeholder {
            font-size: 1.2rem;
            color: var(--text-faint);
        }
        .item-info { flex: 1; min-width: 0; }
        .item-title {
            font-family: var(--font-chinese);
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 1px;
            letter-spacing: 0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-author {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 300;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .item-status {
            font-size: 0.6rem;
            padding: 1px 7px;
            border: 1px solid var(--border);
            color: var(--text-faint);
            letter-spacing: 0.5px;
        }
        .item-status.collect { border-color: rgba(122, 139, 110, 0.3); color: var(--olive); }
        .item-status.wish { border-color: var(--border); color: var(--text-faint); }
        .item-status.do { border-color: var(--gold-dim); color: var(--gold-soft); }
        .item-rating {
            font-size: 0.65rem;
            color: var(--gold-soft);
            letter-spacing: 1px;
        }
        .item-date {
            font-size: 0.6rem;
            color: var(--text-faint);
            margin-left: auto;
        }
        .item-comment {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 300;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ===== Filter count badge ===== */
        .filter-count {
            font-size: 0.6rem;
            color: var(--text-faint);
            margin-left: 12px;
            font-family: var(--font-display);
        }

        /* ===== Empty ===== */
        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--text-faint); font-size: 0.85rem;
        }

        /* ===== Line Chart ===== */
        .line-chart-box {
            border: 1px solid var(--border);
            padding: 4px;
        }
        .chart-canvas-wrap {
            position: relative;
            max-width: 100%;
            margin: 0 auto;
        }
        .chart-canvas-wrap canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .items-grid { grid-template-columns: 1fr; }
            .item-card { padding: 14px; }
            .stat-cards { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .cat-tab { padding: 6px 14px; font-size: 0.78rem; }
            .filter-tab { padding: 3px 10px; font-size: 0.68rem; }
            .stat-cards { grid-template-columns: repeat(2, 1fr); gap: 6px; }
            .stat-card { padding: 10px; }
            .stat-card .num { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <!-- ===== Nav ===== -->
    <nav>
        <div class="container">
            <a href="index.html" class="nav-logo">Jillax</a>
            <div class="nav-links">
                <a href="about.html" data-i18n="nav.about">关于</a>
                <a href="portfolio.html" data-i18n="nav.portfolio">投资</a>
                <a href="contact.html" data-i18n="nav.contact">联系</a>
                <a href="share.html" data-i18n="nav.share">分享</a>
                <a href="translations.html" data-i18n="nav.translations">译制</a>
                <a href="bookshelf.html" class="current" data-i18n="nav.bookshelf">书影音</a>
                <a href="blog.html" data-i18n="nav.blog">随笔</a>
                <button class="theme-toggle" id="themeToggle" title="切换主题">☀</button>
                <button class="lang-toggle" title="语言/Language">EN</button>
            </div>
        </div>
    </nav>

    <div id="page-transition-overlay" style="position:fixed;inset:0;z-index:9998;background:#1a1714;opacity:1;pointer-events:none"></div>

    <!-- ===== Header ===== -->
    <div class="container">
        <div class="page-header">
            <a href="index.html" class="back-home" data-i18n="home.back">← 返回主页</a>
            <h1 data-i18n="page.bookshelf.title">📖 书影音清单</h1>
            <p data-i18n="page.bookshelf.desc">书籍 · 电影 · 音乐</p>
        </div>

        <!-- ===== Category Tabs ===== -->
        <div class="cat-tabs" id="catTabs">
            <button class="cat-tab active" data-cat="books">书籍 <span class="count" id="countBooks">0</span></button>
            <button class="cat-tab" data-cat="movies">电影 <span class="count" id="countMovies">0</span></button>
            <button class="cat-tab" data-cat="music">音乐 <span class="count" id="countMusic">0</span></button>
            <button class="cat-tab" data-cat="games">游戏 <span class="count" id="countGames">0</span></button>
        </div>

        <!-- ===== Stats Cards ===== -->
        <div class="dash-section" id="statsSection">
            <div class="dash-title">📊 统计</div>
            <div class="stat-cards" id="statCards"></div>
        </div>

        <!-- ===== Rating Distribution ===== -->
        <div class="dash-section" id="ratingSection">
            <div class="dash-title">⭐ 评分分布</div>
            <div class="rating-bars" id="ratingBars"></div>
        </div>

        <!-- ===== Cumulative Timeline ===== -->
        <div class="dash-section" id="timelineSection">
            <div class="dash-title">📈 累计趋势</div>
            <div class="line-chart-box">
                <div class="chart-canvas-wrap" style="height: 220px;">
                    <canvas id="cumulativeChart"></canvas>
                </div>
            </div>
        </div>

        <!-- ===== Update Time ===== -->
        <div class="update-time" id="updateTime"></div>

        <!-- ===== Filter Bar ===== -->
        <div class="filter-bar" id="filterBar">
            <span class="filter-label">评分筛选</span>
            <button class="filter-tab active" data-rating="0">全部</button>
            <button class="filter-tab" data-rating="3">3 星</button>
            <button class="filter-tab" data-rating="4">4 星</button>
            <button class="filter-tab" data-rating="5">5 星</button>
            <span class="filter-count" id="filterCount"></span>
        </div>

        <!-- ===== Items ===== -->
        <div class="items-grid" id="itemsGrid"></div>
        <div class="empty-state" id="emptyState" style="display:none">还没有内容</div>
    </div>

    <!-- ===== Footer ===== -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Jillax</p>
        </div>
    </footer>

    <!-- ===== Bookshelf ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const grid = document.getElementById('itemsGrid');
            const empty = document.getElementById('emptyState');
            const catTabs = document.querySelectorAll('.cat-tab');
            const updateTime = document.getElementById('updateTime');
            const statCards = document.getElementById('statCards');
            const ratingBars = document.getElementById('ratingBars');
            const filterTabs = document.querySelectorAll('.filter-tab');
            const filterCount = document.getElementById('filterCount');
            let cumulativeChartInstance = null;

            let allData = { books: [], movies: [], music: [], games: [] };
            let currentCat = 'books';
            let ratingFilter = 0;

            const statusLabels = {
                books: { collect: '读过', wish: '想读', do: '在读' },
                movies: { collect: '看过', wish: '想看', do: '在看' },
                music: { collect: '听过', wish: '想听', do: '在听' },
                games: { collect: '玩过', wish: '想玩', do: '在玩' },
            };

            function renderStars(rating) {
                if (!rating || rating === 0) return '';
                return '★'.repeat(rating) + '☆'.repeat(5 - rating);
            }

            function getStatusText(cat, status) {
                const labels = statusLabels[cat] || statusLabels.books;
                return labels[status] || status;
            }

            function getCatLabel() {
                const map = { books: '本', movies: '部', music: '张', games: '款' };
                return map[currentCat] || '项';
            }

            // ==================== STATS ====================
            function renderStats(cat) {
                const items = allData[cat] || [];
                const total = items.length;
                const rated = items.filter(i => i.rating > 0);
                const avg = rated.length > 0
                    ? (rated.reduce((s, i) => s + i.rating, 0) / rated.length).toFixed(1)
                    : '—';

                // This year counts (collect only)
                const thisYear = new Date().getFullYear();
                const thisYearCollect = items.filter(i => i.date && i.date.startsWith(String(thisYear)) && i.status === 'collect');
                const thisYearCount = thisYearCollect.length;

                // Prev year
                const lastYear = thisYear - 1;
                const lastYearCollect = items.filter(i => i.date && i.date.startsWith(String(lastYear)) && i.status === 'collect');
                const lastYearCount = lastYearCollect.length;

                const label = getCatLabel();
                const unitMap = { books: '本', movies: '部', music: '张', games: '款' };
                const unit = unitMap[currentCat] || '项';

                statCards.innerHTML = `
                    <div class="stat-card">
                        <div class="num">${total}</div>
                        <div class="label">累计 ${unit}</div>
                    </div>
                    <div class="stat-card">
                        <div class="num">${avg}</div>
                        <div class="label">平均评分</div>
                    </div>
                    <div class="stat-card">
                        <div class="num">${thisYearCount}</div>
                        <div class="label">${thisYear} 年</div>
                    </div>
                    <div class="stat-card">
                        <div class="num">${lastYearCount}</div>
                        <div class="label">${lastYear} 年</div>
                    </div>
                `;
            }

            // ==================== RATING DISTRIBUTION ====================
            function renderRatingDist(cat) {
                const items = allData[cat] || [];
                const counts = {};
                let maxCount = 0;
                for (let r = 1; r <= 5; r++) {
                    const c = items.filter(i => i.rating === r).length;
                    counts[r] = c;
                    if (c > maxCount) maxCount = c;
                }

                ratingBars.innerHTML = [5, 4, 3, 2, 1].map(r => {
                    const pct = maxCount > 0 ? (counts[r] / maxCount * 100) : 0;
                    return `
                        <div class="rating-row">
                            <span class="rating-label">${r}★</span>
                            <div class="rating-track">
                                <div class="rating-fill" style="width:0" data-width="${pct}"></div>
                            </div>
                            <span class="rating-count">${counts[r]}</span>
                        </div>
                    `;
                }).join('');

                // Animate bars after render
                requestAnimationFrame(() => {
                    ratingBars.querySelectorAll('.rating-fill').forEach(el => {
                        el.style.width = el.dataset.width + '%';
                    });
                });
            }

            // ==================== CUMULATIVE CHART ====================
            function getChartTheme() {
                var isLight = document.documentElement.hasAttribute('data-theme');
                return {
                    grid: isLight ? 'rgba(44,40,36,0.06)' : 'rgba(255,255,255,0.06)',
                    text: isLight ? '#8c7e6c' : '#8f8271',
                    gold: '#c4a35a',
                    fillTop: 'rgba(196,163,90,0.06)',
                    fillBottom: 'rgba(196,163,90,0.005)',
                };
            }

            function renderCumulativeChart(cat) {
                if (cumulativeChartInstance) {
                    cumulativeChartInstance.destroy();
                    cumulativeChartInstance = null;
                }

                var items = allData[cat] || [];
                var collected = items.filter(function(i) {
                    return i.date && i.status === 'collect';
                }).sort(function(a, b) {
                    return a.date.localeCompare(b.date);
                });

                var canvas = document.getElementById('cumulativeChart');
                if (collected.length < 2) {
                    canvas.style.display = 'none';
                    return;
                }
                canvas.style.display = '';

                // Group by month and compute cumulative
                var monthly = {};
                collected.forEach(function(i) {
                    var ym = i.date.substring(0, 7);
                    monthly[ym] = (monthly[ym] || 0) + 1;
                });

                var sortedMonths = Object.keys(monthly).sort();
                var cum = 0;
                var labels = sortedMonths.map(function(m) {
                    var d = new Date(m + '-01');
                    return d.getFullYear() + '\u5e74' + (d.getMonth() + 1) + '\u6708';
                });
                var data = sortedMonths.map(function(m) {
                    cum += monthly[m];
                    return cum;
                });

                var colors = getChartTheme();
                var ctx = canvas.getContext('2d');

                var gradient = ctx.createLinearGradient(0, 0, 0, 220);
                gradient.addColorStop(0, colors.fillTop);
                gradient.addColorStop(1, colors.fillBottom);

                cumulativeChartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '\u7d2f\u8ba1',
                            data: data,
                            borderColor: colors.gold,
                            backgroundColor: gradient,
                            borderWidth: 2,
                            pointRadius: 0,
                            pointHitRadius: 10,
                            tension: 0.3,
                            fill: true,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: colors.text === '#8c7e6c' ? '#f0ebe2' : '#27231e',
                                titleColor: colors.text === '#8c7e6c' ? '#2b221a' : '#ddd3c4',
                                bodyColor: colors.text === '#8c7e6c' ? '#5c5142' : '#bfb29f',
                                borderColor: colors.text === '#8c7e6c' ? 'rgba(44,40,36,0.08)' : 'rgba(255,255,255,0.06)',
                                borderWidth: 1,
                                cornerRadius: 0,
                                padding: 10,
                                callbacks: {
                                    label: function(ctx) {
                                        return ctx.parsed.y + ' \u9879';
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: {
                                    color: colors.text,
                                    font: { size: 10, family: 'Spectral' },
                                    maxRotation: 45,
                                    maxTicksLimit: 15,
                                }
                            },
                            y: {
                                grid: { color: colors.grid },
                                beginAtZero: true,
                                ticks: {
                                    color: colors.text,
                                    font: { size: 10, family: 'Spectral' },
                                    stepSize: 1,
                                }
                            }
                        }
                    }
                });
            }

            // ==================== FILTER ====================
            function getFilteredItems(cat) {
                let items = allData[cat] || [];
                if (ratingFilter > 0) {
                    items = items.filter(i => i.rating === ratingFilter);
                }
                return items;
            }

            function renderItems(cat) {
                const items = getFilteredItems(cat);

                filterCount.textContent = items.length > 0 ? `显示 ${items.length} 项` : '';

                if (items.length === 0) {
                    grid.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';

                grid.innerHTML = items.map(item => {
                    const hasCover = item.cover && item.cover.trim();
                    const initial = item.title ? item.title.charAt(0) : '?';
                    const statusText = getStatusText(cat, item.status);
                    const stars = renderStars(item.rating);
                    const dateStr = item.date ? item.date.substring(0, 7) : '';

                    return `
                        <div class="item-card">
                            <div class="item-cover">
                                ${hasCover
                                    ? `<img src="${item.cover}" alt="${item.title}" loading="lazy" referrerpolicy="no-referrer" onerror="this.parentElement.innerHTML='<span class=placeholder>${initial}</span>'">`
                                    : `<span class="placeholder">${initial}</span>`
                                }
                            </div>
                            <div class="item-info">
                                <div class="item-title" title="${item.title.replace(/"/g, '&quot;')}">${item.title}</div>
                                <div class="item-author" title="${item.author ? item.author.replace(/"/g, '&quot;') : ''}">${item.author || ''}</div>
                                <div class="item-meta">
                                    <span class="item-status ${item.status}">${statusText}</span>
                                    ${stars ? `<span class="item-rating">${stars}</span>` : ''}
                                    ${dateStr ? `<span class="item-date">${dateStr}</span>` : ''}
                                </div>
                                ${item.comment ? `<div class="item-comment">${item.comment}</div>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // ==================== SWITCH CATEGORY ====================
            function switchCategory(cat) {
                currentCat = cat;
                ratingFilter = 0;

                // Reset filter tabs
                filterTabs.forEach(t => t.classList.remove('active'));
                document.querySelector('.filter-tab[data-rating="0"]').classList.add('active');

                renderStats(cat);
                renderRatingDist(cat);
                renderCumulativeChart(cat);
                renderItems(cat);
            }

            // ==================== INIT ====================
            fetch('data/bookshelf.json')
                .then(r => {
                    if (!r.ok) throw new Error('Not found');
                    return r.json();
                })
                .then(data => {
                    allData = data;

                    document.getElementById('countBooks').textContent = (data.books || []).length;
                    document.getElementById('countMovies').textContent = (data.movies || []).length;
                    document.getElementById('countMusic').textContent = (data.music || []).length;
                    document.getElementById('countGames').textContent = (data.games || []).length;

                    if (data.updated) {
                        const d = new Date(data.updated);
                        updateTime.textContent = '数据同步于 ' + d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
                    }

                    switchCategory('books');
                })
                .catch(() => {
                    grid.innerHTML = '<div class="empty-state">加载失败</div>';
                    statCards.innerHTML = '';
                    ratingBars.innerHTML = '';
                });

            // ==================== EVENTS ====================
            catTabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    catTabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    switchCategory(this.dataset.cat);
                });
            });

            filterTabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    filterTabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    ratingFilter = parseInt(this.dataset.rating);
                    renderItems(currentCat);
                });
            });
        });
    </script>
