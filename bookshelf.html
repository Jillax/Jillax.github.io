<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的书影音游清单">
    <meta name="referrer" content="no-referrer">
    <title>书影音游 · Jillax</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/bookshelf.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body data-page="bookshelf">

    <div class="container">
        <div class="page-header">
            <a href="index.html" class="back-home" data-i18n="home.back">← 返回主页</a>
            <h1 data-i18n="page.bookshelf.title">📖 书影音游清单</h1>
            <p data-i18n="page.bookshelf.desc">书籍 · 电影 · 音乐 · 游戏</p>
        </div>

        <!-- ===== Category Tabs ===== -->
        <div class="cat-tabs">
            <button class="cat-tab active" data-cat="books">📚 书 <span class="count" id="countBooks">0</span></button>
            <button class="cat-tab" data-cat="movies">🎬 影 <span class="count" id="countMovies">0</span></button>
            <button class="cat-tab" data-cat="music">🎵 音 <span class="count" id="countMusic">0</span></button>
            <button class="cat-tab" data-cat="games">🎮 游 <span class="count" id="countGames">0</span></button>
        </div>

        <!-- ===== Stats ===== -->
        <div class="stats-bar">
            <div class="stat-cards" id="statCards"></div>
        </div>
        <div class="update-time" id="updateTime"></div>

        <!-- ===== Dashboard ===== -->
        <div class="dash-section" id="ratingSection">
            <div class="dash-title">评分分布</div>
            <div class="rating-bars" id="ratingBars"></div>
        </div>

        <div class="dash-section" id="chartSection">
            <div class="dash-title">时间线</div>
            <div class="line-chart-box">
                <div class="chart-canvas-wrap" style="height:240px">
                    <canvas id="cumulativeChart"></canvas>
                </div>
            </div>
        </div>

        <!-- ===== Filter ===== -->
        <div class="filter-bar">
            <span class="filter-label">评分筛选</span>
            <button class="filter-tab active" data-rating="0">全部</button>
            <button class="filter-tab" data-rating="5">5★</button>
            <button class="filter-tab" data-rating="4">4★</button>
            <button class="filter-tab" data-rating="3">3★</button>
            <button class="filter-tab" data-rating="2">2★</button>
            <button class="filter-tab" data-rating="1">1★</button>
            <span class="filter-count" id="filterCount"></span>
        </div>

        <!-- ===== Items ===== -->
        <div class="items-grid" id="itemsGrid"></div>
        <div class="empty-state" id="emptyState" style="display:none">还没有内容</div>
    </div>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
    <script src="js/bookshelf.js"></script>

</body>
</html>
