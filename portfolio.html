<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的投资组合">
    <title>投资 · Jillax</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Noto+Serif+SC:wght@400;500;600;700&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <!-- Chart.js datalabels plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

    <style>
        :root {
            --bg: #181410;
            --bg-nav: rgba(24, 20, 16, 0.82);
            --text: #e4dbcc;
            --text-soft: rgba(228, 219, 204, 0.55);
            --text-muted: rgba(228, 219, 204, 0.28);
            --text-faint: rgba(228, 219, 204, 0.12);
            --gold: #c4a35a;
            --gold-soft: rgba(196, 163, 90, 0.35);
            --gold-dim: rgba(196, 163, 90, 0.12);
            --green: #6b8f71;
            --green-soft: rgba(107, 143, 113, 0.35);
            --red: #b5706b;
            --red-soft: rgba(181, 112, 107, 0.35);
            --border: rgba(228, 219, 204, 0.06);
            --border-light: rgba(228, 219, 204, 0.03);
            --container: 760px;
            --font-display: 'Fraunces', 'Noto Serif SC', serif;
            --font-body: 'Spectral', 'Noto Serif SC', serif;
            --font-chinese: 'Noto Serif SC', serif;
        }

        [data-theme="light"] {
            --bg: #f5f0e8;
            --bg-nav: rgba(245, 240, 232, 0.85);
            --text: #2c2824;
            --text-soft: rgba(44, 40, 36, 0.6);
            --text-muted: rgba(44, 40, 36, 0.35);
            --text-faint: rgba(44, 40, 36, 0.12);
            --gold-soft: rgba(196, 163, 90, 0.5);
            --gold-dim: rgba(196, 163, 90, 0.15);
            --green-soft: rgba(107, 143, 113, 0.3);
            --red-soft: rgba(181, 112, 107, 0.3);
            --border: rgba(44, 40, 36, 0.08);
            --border-light: rgba(44, 40, 36, 0.04);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            font-weight: 400;
        }
        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }

        .container {
            max-width: var(--container);
            margin: 0 auto;
            padding: 0 32px;
            position: relative;
            z-index: 1;
        }

        /* ===== Nav ===== */
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100; padding: 20px 0;
            background: var(--bg-nav);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light);
        }
        nav .container {
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo {
            font-family: var(--font-display); font-weight: 600;
            font-size: 1.1rem; color: var(--text);
            letter-spacing: 0.5px;
            font-variation-settings: 'SOFT' 80, 'WONK' 0;
        }
        .nav-links {
            display: flex; gap: 20px;
            font-size: 0.78rem; color: var(--text-muted);
            font-family: var(--font-body);
        }
        .nav-links a {
            transition: color 0.4s ease; letter-spacing: 0.5px; position: relative;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 0; height: 1px; background: var(--gold);
            transition: width 0.4s ease;
        }
        .nav-links a:hover { color: var(--text); }
        .nav-links a:hover::after { width: 100%; }
        .nav-links .current { color: var(--text-soft); }
        .nav-links .current::after { width: 100%; }
        .theme-toggle {
            background: none; border: none;
            color: var(--text-muted); cursor: pointer;
            font-size: 0.85rem; padding: 0;
            transition: color 0.4s ease;
            font-family: var(--font-body); line-height: 1;
        }
        .theme-toggle:hover { color: var(--gold); }

        /* ===== Page Header ===== */
        .page-header {
            padding: 100px 0 32px;
        }
        .page-header .back-home {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.78rem;
            color: var(--text-faint);
            margin-bottom: 16px;
            transition: color 0.3s ease;
            font-family: var(--font-body);
        }
        .page-header .back-home:hover { color: var(--gold); }
        .page-header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 3vw, 2.4rem);
            font-weight: 600; color: var(--text);
            letter-spacing: -0.3px;
            font-variation-settings: 'SOFT' 60, 'WONK' 0;
        }
        .page-header p {
            font-size: 0.82rem; color: var(--text-muted);
            margin-top: 8px; font-weight: 300;
        }

        /* ===== Stats Bar ===== */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            margin-bottom: 44px;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }
        .stat-item {
            text-align: center;
            padding: 28px 16px;
            border-right: 1px solid var(--border-light);
        }
        .stat-item:last-child { border-right: none; }
        .stat-label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-faint);
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-family: var(--font-body);
            text-transform: uppercase;
        }
        .stat-value {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text);
            font-variation-settings: 'SOFT' 60, 'WONK' 0;
        }
        .stat-value.green { color: var(--green); }
        .stat-value.red { color: var(--red); }
        .stat-sub {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ===== Chart Sections ===== */
        .chart-section {
            margin-bottom: 48px;
        }
        .chart-section-title {
            font-size: 0.7rem;
            color: var(--text-faint);
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-family: var(--font-chinese);
        }
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-bottom: 48px;
        }
        .chart-box {
            border: 1px solid var(--border);
            padding: 24px;
        }
        .chart-canvas-wrap {
            position: relative;
            max-width: 260px;
            margin: 0 auto;
        }
        .chart-canvas-wrap-wide { position: relative; }
        .chart-canvas-wrap-wide canvas { max-height: 260px; }

        /* ===== Detail Table ===== */
        .holding-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .holding-table th {
            font-size: 0.65rem;
            color: var(--text-faint);
            letter-spacing: 2px;
            font-weight: 400;
            text-align: right;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
        }
        .holding-table th:first-child { text-align: left; }
        .holding-table td {
            text-align: right;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-soft);
            font-weight: 300;
        }
        .holding-table td:first-child { text-align: left; }
        .cat-row td {
            border-bottom: 1px solid var(--border);
            padding-top: 16px;
            padding-bottom: 4px;
            font-weight: 500;
            color: var(--text);
        }
        .cat-row td:first-child { font-family: var(--font-chinese); }
        .total-row td {
            border-bottom: none;
            padding-top: 14px;
            font-weight: 500;
            color: var(--text);
        }
        .gain-positive { color: var(--green); }
        .gain-negative { color: var(--red); }
        .dot {
            display: inline-block;
            width: 5px; height: 5px;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: middle;
        }

        /* ===== Philosophy ===== */
        .portfolio-philosophy {
            margin-top: 56px;
            text-align: center;
            padding: 40px 0;
            border-top: 1px solid var(--border);
        }
        .portfolio-philosophy p {
            font-family: var(--font-chinese);
            font-size: 0.82rem;
            color: var(--gold-soft);
            line-height: 1.9;
            letter-spacing: 1px;
            max-width: 400px;
            margin: 0 auto;
        }

        /* ===== Footer ===== */
        footer {
            padding: 48px 0; margin-top: 80px;
            border-top: 1px solid var(--border-light);
            text-align: center; color: var(--text-faint);
            font-size: 0.75rem;
            font-family: var(--font-display); font-style: italic;
            font-variation-settings: 'SOFT' 100, 'WONK' 1;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            nav { padding: 16px 0; }
            .nav-links { gap: 14px; font-size: 0.75rem; }
            .nav-links a:nth-child(5),
            .nav-links a:nth-child(6),
            .nav-links a:nth-child(7),
            .nav-links a:nth-child(8) { display: none; }
            .container { padding: 0 24px; }
            .page-header { padding: 80px 0 20px; }
            .stat-value { font-size: 1.3rem; }
            .chart-grid { grid-template-columns: 1fr; }
            .chart-canvas-wrap { max-width: 220px; }
            .holding-table { font-size: 0.78rem; }
            .holding-table th,
            .holding-table td { padding: 8px 6px; }
        }
        @media (max-width: 480px) {
            .nav-links a:nth-child(4),
            .nav-links a:nth-child(5),
            .nav-links a:nth-child(6),
            .nav-links a:nth-child(7),
            .nav-links a:nth-child(8) { display: none; }
            .stats-bar { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>

    <!-- ===== Nav ===== -->
    <nav>
        <div class="container">
            <a href="index.html" class="nav-logo">Jillax</a>
            <div class="nav-links">
                <a href="index.html#about">关于</a>
                <a href="index.html#projects">笔墨</a>
                <a href="portfolio.html" class="current">投资</a>
                <a href="contact.html">联系</a>
                <a href="share.html">分享</a>
                <a href="translations.html">译制</a>
                <a href="bookshelf.html">书影音</a>
                <a href="blog.html">随笔</a>
                <button class="theme-toggle" id="themeToggle" title="切换主题">☀</button>
            </div>
        </div>
    </nav>

    <!-- ===== Header ===== -->
    <div class="container">
        <div class="page-header">
            <a href="index.html" class="back-home">← 返回主页</a>
            <h1>📊 投资组合</h1>
            <p>资产配置 · 持仓明细 · 收益分析</p>
        </div>

        <!-- ===== Stats Bar ===== -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <span class="stat-label">总资产净值</span>
                <span class="stat-value" id="totalValue">--</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">累计收益</span>
                <span class="stat-value" id="totalGain">--</span>
                <span class="stat-sub" id="gainPct"></span>
            </div>
            <div class="stat-item">
                <span class="stat-label">收益率</span>
                <span class="stat-value" id="returnPct">--</span>
                <span class="stat-sub">自 2025.12</span>
            </div>
        </div>

        <!-- ===== Charts Row ===== -->
        <div class="chart-grid">
            <!-- Doughnut: Asset Allocation -->
            <div class="chart-box">
                <div class="chart-section-title">资产配置</div>
                <div class="chart-canvas-wrap">
                    <canvas id="allocationChart"></canvas>
                </div>
            </div>
            <!-- Bar: Gain/Loss per Asset -->
            <div class="chart-box">
                <div class="chart-section-title">持仓盈亏</div>
                <div class="chart-canvas-wrap-wide">
                    <canvas id="gainChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Line: Historical NAV -->
        <div class="chart-section">
            <div class="chart-section-title">净值走势</div>
            <div class="chart-box">
                <div class="chart-canvas-wrap-wide">
                    <canvas id="historyChart"></canvas>
                </div>
            </div>
        </div>

        <!-- ===== Holdings Table ===== -->
        <div class="chart-section">
            <div class="chart-section-title">持仓明细</div>
            <table class="holding-table" id="holdingTable">
                <thead>
                    <tr>
                        <th>名称</th>
                        <th>成本</th>
                        <th>现值</th>
                        <th>盈亏</th>

                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>

        <!-- Philosophy -->
        <div class="portfolio-philosophy">
            <p>相信人类科技进步，持续买入优质资产，保持在场。</p>
        </div>
    </div>

    <!-- ===== Footer ===== -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Jillax</p>
        </div>
    </footer>

    <!-- ===== Theme Toggle ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                html.setAttribute('data-theme', 'light');
                toggle.textContent = '☾';
            } else if (saved === 'dark') {
                html.removeAttribute('data-theme');
                toggle.textContent = '☀';
            }
            toggle.addEventListener('click', function() {
                const isLight = html.hasAttribute('data-theme');
                if (isLight) {
                    html.removeAttribute('data-theme');
                    toggle.textContent = '☀';
                    localStorage.setItem('theme', 'dark');
                } else {
                    html.setAttribute('data-theme', 'light');
                    toggle.textContent = '☾';
                    localStorage.setItem('theme', 'light');
                }
            });
        });
    </script>

    <!-- ===== Portfolio Charts ===== -->
    <script>
        Chart.register(ChartDataLabels);

        document.addEventListener('DOMContentLoaded', function() {
            fetch('data/portfolio.json')
                .then(r => r.json())
                .then(data => {
                    renderStats(data);
                    renderAllocation(data);
                    renderGainChart(data);
                    renderHistory(data);
                    renderTable(data);
                })
                .catch(() => {
                    document.getElementById('totalValue').textContent = '加载失败';
                });

            function renderStats(data) {
                const gain = data.totalValue - data.totalCost;
                const pct = ((gain / data.totalCost) * 100).toFixed(1);
                const isPos = gain >= 0;

                document.getElementById('totalValue').textContent = '¥' + data.totalValue.toLocaleString();

                const gainEl = document.getElementById('totalGain');
                gainEl.className = 'stat-value ' + (isPos ? 'green' : 'red');
                gainEl.textContent = (isPos ? '+' : '') + '¥' + gain.toLocaleString();

                document.getElementById('gainPct').textContent = (isPos ? '+' : '') + pct + '%';

                const retEl = document.getElementById('returnPct');
                retEl.className = 'stat-value ' + (isPos ? 'green' : 'red');
                const start = data.history[0].value;
                const totalRet = ((data.totalValue - start) / start * 100).toFixed(1);
                retEl.textContent = (totalRet >= 0 ? '+' : '') + totalRet + '%';
            }

            function renderAllocation(data) {
                const ctx = document.getElementById('allocationChart').getContext('2d');
                const values = data.categories.map(c => c.items.reduce((s, i) => s + i.value, 0));
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: data.categories.map(c => c.name),
                        datasets: [{
                            data: values,
                            backgroundColor: ['#c4a35a', '#8b7355', '#6b8f71'],
                            borderWidth: 0,
                            spacing: 3,
                            hoverOffset: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        cutout: '62%',
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    color: '#e4dbcc',
                                    font: { family: 'Noto Serif SC', size: 12 },
                                    padding: 16,
                                    usePointStyle: true,
                                    pointStyle: 'circle'
                                }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(24, 20, 16, 0.92)',
                                titleFont: { family: 'Noto Serif SC', size: 13 },
                                bodyFont: { family: 'Spectral', size: 12 },
                                padding: 14,
                                cornerRadius: 0,
                                callbacks: {
                                    label: function(ctx) {
                                        const total = values.reduce((a, b) => a + b, 0);
                                        const pct = ((ctx.parsed / total) * 100).toFixed(1);
                                        return '¥' + ctx.parsed.toLocaleString() + '  (' + pct + '%)';
                                    }
                                }
                            },
                            datalabels: { display: false }
                        }
                    }
                });
            }

            function renderGainChart(data) {
                const items = [];
                data.categories.forEach(c => {
                    c.items.forEach(i => {
                        items.push({ name: i.name, gain: i.value - i.cost });
                    });
                });

                const ctx = document.getElementById('gainChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: items.map(i => i.name),
                        datasets: [{
                            data: items.map(i => i.gain),
                            backgroundColor: items.map(i => i.gain >= 0 ? 'rgba(107, 143, 113, 0.7)' : 'rgba(181, 112, 107, 0.7)'),
                            borderColor: items.map(i => i.gain >= 0 ? '#6b8f71' : '#b5706b'),
                            borderWidth: 1,
                            borderRadius: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        indexAxis: 'y',
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(24, 20, 16, 0.92)',
                                titleFont: { family: 'Noto Serif SC', size: 13 },
                                bodyFont: { family: 'Spectral', size: 12 },
                                padding: 14,
                                cornerRadius: 0,
                                callbacks: {
                                    label: function(ctx) {
                                        return (ctx.parsed.x >= 0 ? '+' : '') + '¥' + ctx.parsed.x.toLocaleString();
                                    }
                                }
                            },
                            datalabels: {
                                anchor: 'end',
                                align: 'end',
                                color: '#e4dbcc',
                                font: { family: 'Spectral', size: 11 },
                                formatter: (v) => (v >= 0 ? '+' : '') + '¥' + v.toLocaleString()
                            }
                        },
                        scales: {
                            x: {
                                grid: { color: 'rgba(228, 219, 204, 0.06)', drawBorder: false },
                                ticks: { color: 'rgba(228, 219, 204, 0.28)', font: { size: 10 } }
                            },
                            y: {
                                grid: { display: false },
                                ticks: {
                                    color: 'rgba(228, 219, 204, 0.55)',
                                    font: { family: 'Noto Serif SC', size: 11 }
                                }
                            }
                        }
                    }
                });
            }

            function renderHistory(data) {
                const ctx = document.getElementById('historyChart').getContext('2d');
                const dates = data.history.map(h => h.date);
                const values = data.history.map(h => h.value);

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: [{
                            data: values,
                            borderColor: '#c4a35a',
                            backgroundColor: function(ctx) {
                                const chart = ctx.chart;
                                const {ctx: c, chartArea: area} = chart;
                                if (!area) return 'transparent';
                                const g = c.createLinearGradient(0, area.top, 0, area.bottom);
                                g.addColorStop(0, 'rgba(196, 163, 90, 0.25)');
                                g.addColorStop(1, 'rgba(196, 163, 90, 0.01)');
                                return g;
                            },
                            fill: true,
                            tension: 0.35,
                            pointRadius: 3,
                            pointBackgroundColor: '#c4a35a',
                            pointHoverRadius: 6,
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(24, 20, 16, 0.92)',
                                titleFont: { family: 'Noto Serif SC', size: 13 },
                                bodyFont: { family: 'Spectral', size: 12 },
                                padding: 14,
                                cornerRadius: 0,
                                callbacks: {
                                    label: function(ctx) {
                                        return '¥' + ctx.parsed.y.toLocaleString();
                                    }
                                }
                            },
                            datalabels: { display: false }
                        },
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: {
                                    color: 'rgba(228, 219, 204, 0.28)',
                                    font: { size: 10 },
                                    maxTicksLimit: 8
                                }
                            },
                            y: {
                                grid: { color: 'rgba(228, 219, 204, 0.06)', drawBorder: false },
                                ticks: {
                                    color: 'rgba(228, 219, 204, 0.28)',
                                    font: { size: 10 },
                                    callback: (v) => '¥' + v.toLocaleString()
                                }
                            }
                        }
                    }
                });
            }

            function renderTable(data) {
                const tbody = document.getElementById('tableBody');
                let html = '';
                data.categories.forEach(cat => {
                    let catValue = 0, catCost = 0;
                    cat.items.forEach(item => {
                        catValue += item.value;
                        catCost += item.cost;
                    });
                    const catGain = catValue - catCost;
                    const catCls = catGain >= 0 ? 'gain-positive' : 'gain-negative';
                    const catRet = catCost > 0 ? ((catGain / catCost) * 100).toFixed(1) + '%' : '-';
                    html += '<tr class="cat-row">'
                        + '<td><span class="dot" style="background:' + cat.color + '"></span>' + cat.name + '</td>'
                        + '<td>¥' + catCost.toLocaleString() + '</td>'
                        + '<td>¥' + catValue.toLocaleString() + '</td>'
                        + '<td class="' + catCls + '">' + (catGain >= 0 ? '+' : '') + '¥' + catGain.toLocaleString() + '</td>'
                        + '<td class="' + catCls + '">' + catRet + '</td>'
                        + '</tr>';
                    cat.items.forEach(item => {
                        const gain = item.value - item.cost;
                        const cls = gain >= 0 ? 'gain-positive' : 'gain-negative';
                        const ret = item.cost > 0 ? ((gain / item.cost) * 100).toFixed(1) + '%' : '-';
                        html += '<tr>'
                            + '<td style="padding-left:24px">' + item.name + '</td>'
                            + '<td>¥' + item.cost.toLocaleString() + '</td>'
                            + '<td>¥' + item.value.toLocaleString() + '</td>'
                            + '<td class="' + cls + '">' + (gain >= 0 ? '+' : '') + '¥' + gain.toLocaleString() + '</td>'
                            + '<td class="' + cls + '">' + ret + '</td>'
                            + '</tr>';
                    });
                });
                const totalGain = data.totalValue - data.totalCost;
                const totalCls = totalGain >= 0 ? 'gain-positive' : 'gain-negative';
                const totalRet = data.totalCost > 0 ? ((totalGain / data.totalCost) * 100).toFixed(1) + '%' : '-';
                html += '<tr class="total-row">'
                    + '<td>合计</td>'
                    + '<td>¥' + data.totalCost.toLocaleString() + '</td>'
                    + '<td>¥' + data.totalValue.toLocaleString() + '</td>'
                    + '<td class="' + totalCls + '">' + (totalGain >= 0 ? '+' : '') + '¥' + totalGain.toLocaleString() + '</td>'
                    + '<td class="' + totalCls + '">' + totalRet + '</td>'
                    + '</tr>';
                tbody.innerHTML = html;
            }
        });
    </script>

</body>
</html>
