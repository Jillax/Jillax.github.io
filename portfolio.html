<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的投资组合">
    <title>投资 · Jillax</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Noto+Serif+SC:wght@400;500;600;700&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --bg: #181410;
            --bg-nav: rgba(24, 20, 16, 0.82);
            --text: #e4dbcc;
            --text-soft: rgba(228, 219, 204, 0.55);
            --text-muted: rgba(228, 219, 204, 0.28);
            --text-faint: rgba(228, 219, 204, 0.12);
            --gold: #c4a35a;
            --gold-soft: rgba(196, 163, 90, 0.35);
            --gold-dim: rgba(196, 163, 90, 0.12);
            --green: #6b8f71;
            --green-soft: rgba(107, 143, 113, 0.35);
            --red: #b5706b;
            --red-soft: rgba(181, 112, 107, 0.35);
            --border: rgba(228, 219, 204, 0.06);
            --border-light: rgba(228, 219, 204, 0.03);
            --container: 800px;
            --font-display: 'Fraunces', 'Noto Serif SC', serif;
            --font-body: 'Spectral', 'Noto Serif SC', serif;
            --font-chinese: 'Noto Serif SC', serif;
        }

        [data-theme="light"] {
            --bg: #f5f0e8;
            --bg-nav: rgba(245, 240, 232, 0.85);
            --text: #2c2824;
            --text-soft: rgba(44, 40, 36, 0.6);
            --text-muted: rgba(44, 40, 36, 0.35);
            --text-faint: rgba(44, 40, 36, 0.12);
            --gold-soft: rgba(196, 163, 90, 0.5);
            --gold-dim: rgba(196, 163, 90, 0.15);
            --green-soft: rgba(107, 143, 113, 0.3);
            --red-soft: rgba(181, 112, 107, 0.3);
            --border: rgba(44, 40, 36, 0.08);
            --border-light: rgba(44, 40, 36, 0.04);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            font-weight: 400;
        }
        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }

        .container { max-width: var(--container); margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }

        /* Nav */
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100; padding: 20px 0;
            background: var(--bg-nav);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light);
        }
        nav .container { display: flex; justify-content: space-between; align-items: center; }
        .nav-logo {
            font-family: var(--font-display); font-weight: 600;
            font-size: 1.1rem; color: var(--text);
            letter-spacing: 0.5px;
            font-variation-settings: 'SOFT' 80, 'WONK' 0;
        }
        .nav-links { display: flex; gap: 20px; font-size: 0.78rem; color: var(--text-muted); font-family: var(--font-body); }
        .nav-links a { transition: color 0.4s ease; letter-spacing: 0.5px; position: relative; }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 0; height: 1px; background: var(--gold);
            transition: width 0.4s ease;
        }
        .nav-links a:hover { color: var(--text); }
        .nav-links a:hover::after { width: 100%; }
        .nav-links .current { color: var(--text-soft); }
        .nav-links .current::after { width: 100%; }
        .theme-toggle {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            font-size: 0.85rem; padding: 0; transition: color 0.4s ease;
            font-family: var(--font-body); line-height: 1;
        }
        .theme-toggle:hover { color: var(--gold); }

        /* Page Header */
        .page-header { padding: 100px 0 32px; }
        .page-header .back-home {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 0.78rem; color: var(--text-faint);
            margin-bottom: 16px; transition: color 0.3s ease; font-family: var(--font-body);
        }
        .page-header .back-home:hover { color: var(--gold); }
        .page-header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 3vw, 2.4rem);
            font-weight: 600; color: var(--text);
            letter-spacing: -0.3px;
            font-variation-settings: 'SOFT' 60, 'WONK' 0;
        }
        .page-header p { font-size: 0.82rem; color: var(--text-muted); margin-top: 8px; font-weight: 300; }

        /* Stats Bar */
        .stats-bar {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
            margin-bottom: 44px;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }
        .stat-item { text-align: center; padding: 28px 16px; border-right: 1px solid var(--border-light); }
        .stat-item:last-child { border-right: none; }
        .stat-label {
            display: block; font-size: 0.65rem; color: var(--text-faint);
            letter-spacing: 2px; margin-bottom: 8px; font-family: var(--font-body); text-transform: uppercase;
        }
        .stat-value {
            font-family: var(--font-display); font-size: 1.6rem; font-weight: 600;
            color: var(--text); font-variation-settings: 'SOFT' 60, 'WONK' 0;
        }
        .stat-value.green { color: var(--green); }
        .stat-value.red { color: var(--red); }
        .stat-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

        /* Section */
        .section { margin-bottom: 48px; }
        .section-title {
            font-size: 0.7rem; color: var(--text-faint); letter-spacing: 2px;
            margin-bottom: 20px; font-family: var(--font-chinese);
        }

        /* Chart */
        .chart-box { border: 1px solid var(--border); padding: 24px; }
        .chart-canvas-wrap { position: relative; max-width: 280px; margin: 0 auto; }

        /* Chart + Bars layout */
        .allocation-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }

        /* Percentage bars (skills-like style) */
        .pct-bars {
            border: 1px solid var(--border);
            padding: 24px;
        }
        .pct-row {
            margin-bottom: 20px;
        }
        .pct-row:last-child { margin-bottom: 0; }
        .pct-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .pct-label {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pct-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .pct-name {
            font-family: var(--font-chinese);
            font-size: 0.82rem;
            color: var(--text-soft);
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .pct-value {
            font-family: var(--font-display);
            font-size: 0.9rem;
            color: var(--text);
            font-weight: 600;
            font-variation-settings: 'SOFT' 60, 'WONK' 0;
        }
        .pct-track {
            height: 6px;
            background: var(--border);
            overflow: hidden;
            transition: background 0.3s ease;
        }
        .pct-row:hover .pct-track {
            background: var(--border-light);
        }
        .pct-fill {
            height: 100%;
            width: 0;
            border-radius: 0;
            transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Table */
        .portfolio-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .portfolio-table th {
            font-size: 0.65rem; color: var(--text-faint); letter-spacing: 2px;
            font-weight: 400; text-align: right; padding: 10px 12px;
            border-bottom: 1px solid var(--border);
        }
        .portfolio-table th:first-child { text-align: left; }
        .portfolio-table td {
            text-align: right; padding: 10px 12px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-soft); font-weight: 300;
        }
        .portfolio-table td:first-child { text-align: left; }
        .cat-row td {
            border-bottom: 1px solid var(--border);
            padding-top: 18px; padding-bottom: 6px;
            font-weight: 500; color: var(--text);
        }
        .cat-row td:first-child { font-family: var(--font-chinese); letter-spacing: 0.5px; }

        /* Expandable item rows */
        .item-row { cursor: pointer; user-select: none; }
        .item-row:hover td { color: var(--text); }
        .item-row .arrow { display: inline-block; width: 16px; transition: transform 0.2s; font-size: 0.7rem; color: var(--text-faint); }
        .item-row.expanded .arrow { transform: rotate(90deg); }
        .item-row td { padding-top: 12px; padding-bottom: 12px; }

        /* Sub-item rows (hidden by default) */
        .sub-row { display: none; }
        .sub-row.open { display: table-row; }
        .sub-row td { padding-top: 8px; padding-bottom: 8px; }
        .sub-row td:first-child { padding-left: 40px; font-size: 0.82rem; }

        .dca-badge {
            display: inline-block; font-size: 0.6rem;
            padding: 1px 6px; margin-left: 6px;
            border: 1px solid var(--gold-dim); color: var(--gold-soft);
            letter-spacing: 0.3px;
        }

        .gain-pos { color: var(--green) !important; }
        .gain-neg { color: var(--red) !important; }

        .total-row td {
            border-bottom: none; padding-top: 14px;
            font-weight: 500; color: var(--text);
        }

        .dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; margin-right: 10px; vertical-align: middle; }

        /* Philosophy */
        .philosophy { margin-top: 56px; text-align: center; padding: 40px 0; border-top: 1px solid var(--border); }
        .philosophy p {
            font-family: var(--font-chinese); color: var(--gold-soft); line-height: 1.9;
            letter-spacing: 1px; max-width: 400px; margin: 0 auto;
        }

        /* Footer */
        footer {
            padding: 48px 0; margin-top: 80px;
            border-top: 1px solid var(--border-light);
            text-align: center; color: var(--text-faint);
            font-size: 0.75rem;
            font-family: var(--font-display); font-style: italic;
            font-variation-settings: 'SOFT' 100, 'WONK' 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav { padding: 16px 0; }
            .nav-links { gap: 14px; font-size: 0.75rem; }
            .nav-links a:nth-child(5),
            .nav-links a:nth-child(6),
            .nav-links a:nth-child(7),
            .nav-links a:nth-child(8) { display: none; }
            .container { padding: 0 24px; }
            .page-header { padding: 80px 0 20px; }
            .stat-value { font-size: 1.3rem; }
            .portfolio-table { font-size: 0.78rem; }
            .portfolio-table th, .portfolio-table td { padding: 8px 6px; }
            .sub-row td:first-child { padding-left: 28px; }
            .allocation-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .nav-links a:nth-child(4),
            .nav-links a:nth-child(5),
            .nav-links a:nth-child(6),
            .nav-links a:nth-child(7),
            .nav-links a:nth-child(8) { display: none; }
            .stats-bar { grid-template-columns: repeat(3, 1fr); }
        }

        .update-note {
            text-align: right; font-size: 0.65rem; color: var(--text-faint);
            margin-top: 12px; font-style: italic;
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                html.setAttribute('data-theme', 'light');
                toggle.textContent = '☾';
            } else if (saved === 'dark') {
                html.removeAttribute('data-theme');
                toggle.textContent = '☀';
            }
            toggle.addEventListener('click', function() {
                const isLight = html.hasAttribute('data-theme');
                if (isLight) {
                    html.removeAttribute('data-theme');
                    toggle.textContent = '☀';
                    localStorage.setItem('theme', 'dark');
                } else {
                    html.setAttribute('data-theme', 'light');
                    toggle.textContent = '☾';
                    localStorage.setItem('theme', 'light');
                }
            });
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('data/portfolio.json')
                .then(r => r.json())
                .then(data => {
                    renderStats(data);
                    renderChart(data);
                    renderPctBars(data);
                    renderTable(data);
                    document.getElementById('updateNote').textContent = '更新于 ' + data.updated;
                })
                .catch(() => {
                    document.getElementById('totalValue').textContent = '加载失败';
                });

            function calcItem(item) {
                if (item.subItems) {
                    let totalValue = 0, totalCost = 0;
                    item.subItems.forEach(s => {
                        totalValue += s.value;
                        totalCost += s.cost;
                    });
                    return { value: totalValue, cost: totalCost };
                }
                return { value: item.value || 0, cost: item.cost || 0 };
            }

            function fmt(n) { return '¥' + Math.round(n).toLocaleString(); }
            function fmtGain(n) { return (n >= 0 ? '+' : '') + '¥' + Math.round(Math.abs(n)).toLocaleString(); }

            function renderStats(data) {
                let totalValue = 0, totalCost = 0;
                data.categories.forEach(cat => {
                    cat.items.forEach(item => {
                        const c = calcItem(item);
                        totalValue += c.value;
                        totalCost += c.cost;
                    });
                });
                const gain = totalValue - totalCost;
                const pct = totalCost > 0 ? ((gain / totalCost) * 100).toFixed(2) : '0.00';
                const isPos = gain >= 0;

                document.getElementById('totalValue').textContent = fmt(totalValue);
                document.getElementById('totalCost').textContent = fmt(totalCost);

                const gainEl = document.getElementById('totalGain');
                gainEl.className = 'stat-value ' + (isPos ? 'green' : 'red');
                gainEl.textContent = fmtGain(gain);
                document.getElementById('gainPct').textContent = (isPos ? '+' : '') + pct + '%';
            }

            function renderChart(data) {
                const labels = [];
                const values = [];
                const colors = [];
                data.categories.forEach(cat => {
                    cat.items.forEach(item => {
                        const c = calcItem(item);
                        labels.push(item.name);
                        values.push(c.value);
                        colors.push(cat.color);
                    });
                });

                const ctx = document.getElementById('allocationChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: colors,
                            borderWidth: 0,
                            spacing: 2,
                            hoverOffset: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        cutout: '60%',
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    color: '#e4dbcc',
                                    font: { family: 'Noto Serif SC', size: 11 },
                                    padding: 14,
                                    usePointStyle: true,
                                    pointStyle: 'circle'
                                }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(24, 20, 16, 0.92)',
                                titleFont: { family: 'Noto Serif SC', size: 13 },
                                bodyFont: { family: 'Spectral', size: 12 },
                                padding: 14,
                                cornerRadius: 0,
                                callbacks: {
                                    label: function(ctx) {
                                        const total = values.reduce((a, b) => a + b, 0);
                                        const pct = ((ctx.parsed / total) * 100).toFixed(1);
                                        return fmt(ctx.parsed) + '  (' + pct + '%)';
                                    }
                                }
                            }
                        }
                    }
                });
            }

            function renderPctBars(data) {
                // Calculate per-category totals
                let totalValue = 0;
                const cats = data.categories.map(cat => {
                    let cv = 0;
                    cat.items.forEach(item => {
                        const c = calcItem(item);
                        cv += c.value;
                    });
                    totalValue += cv;
                    return { name: cat.name, value: cv, color: cat.color };
                });

                const rows = document.querySelectorAll('#pctBars .pct-row');
                rows.forEach((row, i) => {
                    const cat = cats[i] || { name: '', value: 0, color: 'var(--gold)' };
                    const pct = totalValue > 0 ? (cat.value / totalValue * 100) : 0;
                    const pctStr = pct.toFixed(1);
                    row.querySelector('.pct-name').textContent = cat.name;
                    row.querySelector('.pct-value').textContent = pctStr + '%';
                    const fill = row.querySelector('.pct-fill');
                    // Animate after a tiny delay for the transition to work
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            fill.style.width = pctStr + '%';
                        });
                    });
                });
            }

            function renderTable(data) {
                const tbody = document.getElementById('tableBody');
                let html = '';
                let idx = 0;

                data.categories.forEach(cat => {
                    let catValue = 0, catCost = 0;
                    cat.items.forEach(item => {
                        const c = calcItem(item);
                        catValue += c.value;
                        catCost += c.cost;
                    });
                    const catGain = catValue - catCost;
                    const catCls = catGain >= 0 ? 'gain-pos' : 'gain-neg';
                    const catRet = catCost > 0 ? ((catGain / catCost) * 100).toFixed(2) + '%' : '-';

                    html += '<tr class="cat-row">'
                        + '<td style="color:' + cat.color + '">' + cat.name + '</td>'
                        + '<td>' + fmt(catCost) + '</td>'
                        + '<td>' + fmt(catValue) + '</td>'
                        + '<td class="' + catCls + '">' + fmtGain(catGain) + '</td>'
                        + '<td class="' + catCls + '">' + catRet + '</td>'
                        + '</tr>';

                    cat.items.forEach(item => {
                        const c = calcItem(item);
                        const gain = c.value - c.cost;
                        const cls = gain >= 0 ? 'gain-pos' : 'gain-neg';
                        const ret = c.cost > 0 ? ((gain / c.cost) * 100).toFixed(2) + '%' : '-';
                        const hasSub = item.subItems && item.subItems.length > 0;
                        const rowId = 'item-' + idx;

                        html += '<tr class="item-row" id="' + rowId + '" data-idx="' + idx + '">'
                            + '<td><span class="arrow">' + (hasSub ? '▶' : '') + '</span>'
                            + item.name
                            + '</td>'
                            + '<td>' + fmt(c.cost) + '</td>'
                            + '<td>' + fmt(c.value) + '</td>'
                            + '<td class="' + cls + '">' + fmtGain(gain) + '</td>'
                            + '<td class="' + cls + '">' + ret + '</td>'
                            + '</tr>';

                        if (hasSub) {
                            item.subItems.forEach(sub => {
                                const sg = sub.value - sub.cost;
                                const sCls = sg >= 0 ? 'gain-pos' : 'gain-neg';
                                const sRet = sub.cost > 0 ? ((sg / sub.cost) * 100).toFixed(2) + '%' : '-';
                                html += '<tr class="sub-row" data-parent="' + idx + '">'
                                    + '<td style="padding-left:40px">'
                                    + sub.name
                                    + (sub.dca ? ' <span class="dca-badge">定投中</span>' : '')
                                    + '</td>'
                                    + '<td>' + fmt(sub.cost) + '</td>'
                                    + '<td>' + fmt(sub.value) + '</td>'
                                    + '<td class="' + sCls + '">' + fmtGain(sg) + '</td>'
                                    + '<td class="' + sCls + '">' + sRet + '</td>'
                                    + '</tr>';
                            });
                        }
                        idx++;
                    });
                });

                // Total row
                let tv = 0, tc = 0;
                data.categories.forEach(cat => {
                    cat.items.forEach(item => {
                        const c = calcItem(item);
                        tv += c.value;
                        tc += c.cost;
                    });
                });
                const tg = tv - tc;
                const tCls = tg >= 0 ? 'gain-pos' : 'gain-neg';
                const tRet = tc > 0 ? ((tg / tc) * 100).toFixed(2) + '%' : '-';
                html += '<tr class="total-row">'
                    + '<td>合计</td>'
                    + '<td>' + fmt(tc) + '</td>'
                    + '<td>' + fmt(tv) + '</td>'
                    + '<td class="' + tCls + '">' + fmtGain(tg) + '</td>'
                    + '<td class="' + tCls + '">' + tRet + '</td>'
                    + '</tr>';

                tbody.innerHTML = html;

                // Expand/collapse click handler
                document.querySelectorAll('.item-row').forEach(row => {
                    row.addEventListener('click', function() {
                        const idx = this.dataset.idx;
                        const subs = document.querySelectorAll('.sub-row[data-parent="' + idx + '"]');
                        const isOpen = this.classList.toggle('expanded');
                        subs.forEach(s => s.classList.toggle('open', isOpen));
                    });
                });
            }
        });
    </script>

</body>
</html>
