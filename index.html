<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jillax 的个人主页">
    <title>Jillax · 个人主页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body data-page="index">

    <!-- ===== Hero ===== -->
    <section class="hero" id="home">
        <div class="container">
            <div class="hero-content">
                <div class="hero-ornament" data-i18n="hero.ornament">科技 · 人文</div>
                <h1><span class="highlight">Jillax</span></h1>
                <div class="hero-subtitle" data-i18n="hero.subtitle">个人小站，集成存放一些我在意的东西</div>
                <p class="hero-desc" data-i18n="hero.desc">社媒内容 · Agent 实验 · Vibe Coding</p>
                <div class="hero-actions">
                    <a href="about.html" class="btn" data-i18n="btn.about">关于</a>
                    <a href="portfolio.html" class="btn" data-i18n="btn.portfolio">投资组合</a>
                    <a href="contact.html" class="btn" data-i18n="btn.contact">联系方式</a>
                    <a href="share.html" class="btn" data-i18n="btn.share">文件分享</a>
                    <a href="translations.html" class="btn" data-i18n="btn.translations">译制作品</a>
                    <a href="bookshelf.html" class="btn" data-i18n="btn.bookshelf">书影音清单</a>
                    <a href="blog.html" class="btn" data-i18n="btn.blog">随笔</a>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== Quote ===== -->
    <section class="quote-section" id="quote">
        <div class="container">
            <div class="quote-block reveal">
                <div class="quote-mark">"</div>
                <p class="quote-text" id="quoteText">加载中...</p>
                <p class="quote-source" id="quoteSource"></p>
                <button class="quote-refresh" id="quoteRefresh" title="换一条">↻</button>
            </div>
        </div>
    </section>

    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
    <script src="js/index.js"></script>

</body>
</html>
