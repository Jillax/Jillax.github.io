<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>如果历史不一样 · 反事实推演</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0a1a;
      --bg-soft: #130f24;
      --bg-surface: #1a1530;
      --bg-card: #1e1838;
      --text: #d4c8ef;
      --text-soft: #a896cc;
      --text-muted: #6b5a8a;
      --text-faint: #3d2f5c;
      --purple: #9b59ff;
      --purple-bright: #b47aff;
      --purple-soft: rgba(155, 89, 255, 0.15);
      --purple-glow: rgba(155, 89, 255, 0.4);
      --neon-pink: #ff4da6;
      --neon-pink-glow: rgba(255, 77, 166, 0.35);
      --neon-cyan: #00e5ff;
      --neon-cyan-soft: rgba(0, 229, 255, 0.12);
      --amber: #ffaa40;
      --amber-soft: rgba(255, 170, 64, 0.12);
      --border: rgba(155, 89, 255, 0.15);
      --border-glow: rgba(155, 89, 255, 0.3);
      --line-color: rgba(155, 89, 255, 0.25);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* === Header === */
    .header {
      text-align: center;
      padding: 40px 20px 24px;
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 15%;
      right: 15%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--purple), transparent);
    }
    .header-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: var(--neon-pink);
      letter-spacing: 4px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--text);
      text-shadow: 0 0 20px var(--purple-glow);
    }
    .header h1 span {
      color: var(--purple-bright);
      text-shadow: 0 0 30px var(--purple-glow), 0 0 60px rgba(155, 89, 255, 0.2);
    }
    .header .sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 3px;
      margin-top: 8px;
    }

    /* === Tabs === */
    .tabs {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 24px 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .tabs .label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-faint);
      letter-spacing: 2px;
      margin-right: 8px;
      text-transform: uppercase;
    }
    .tab {
      padding: 6px 18px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Noto Sans SC', sans-serif;
      letter-spacing: 1px;
      user-select: none;
    }
    .tab:hover {
      border-color: var(--purple);
      color: var(--purple-bright);
      box-shadow: 0 0 10px rgba(155, 89, 255, 0.15);
    }
    .tab.active {
      background: var(--purple-soft);
      color: var(--purple-bright);
      border-color: var(--purple);
      box-shadow: 0 0 15px rgba(155, 89, 255, 0.2);
      text-shadow: 0 0 8px var(--purple-glow);
    }
    .tab.custom-tab {
      border-style: dashed;
      border-color: var(--text-faint);
    }

    /* === Custom Panel === */
    .custom-panel {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 12px;
      display: none;
    }
    .custom-panel.open { display: block; }
    .custom-panel .inner {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 20px 24px;
    }
    .custom-panel h3 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      color: var(--purple-bright);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .custom-panel .hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      line-height: 1.8;
      font-family: 'Share Tech Mono', monospace;
    }
    .custom-panel .hint code {
      background: var(--purple-soft);
      padding: 1px 6px;
      color: var(--neon-cyan);
      font-size: 0.7rem;
    }
    .custom-panel textarea {
      width: 100%;
      min-height: 140px;
      padding: 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      line-height: 1.7;
      color: var(--text);
      resize: vertical;
    }
    .custom-panel textarea:focus { outline: none; border-color: var(--purple); box-shadow: 0 0 10px rgba(155, 89, 255, 0.15); }
    .custom-panel .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .custom-panel .actions button {
      padding: 8px 22px;
      border: none;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.3s;
    }
    .gen-btn {
      background: var(--purple);
      color: #fff;
      box-shadow: 0 0 15px rgba(155, 89, 255, 0.3);
    }
    .gen-btn:hover { background: var(--purple-bright); box-shadow: 0 0 25px var(--purple-glow); }
    .eg-btn {
      background: transparent;
      border: 1px solid var(--border) !important;
      color: var(--text-muted);
    }
    .eg-btn:hover { border-color: var(--purple) !important; color: var(--purple-bright); }

    /* === Tree Area === */
    .tree-area {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px 60px;
      overflow-x: auto;
    }

    /* === Focus Tree === */
    .focus-tree {
      position: relative;
      min-width: fit-content;
      padding: 20px 0;
    }

    /* Root node */
    .focus-root {
      text-align: center;
      margin-bottom: 24px;
    }
    .focus-root-card {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 36px;
      background: linear-gradient(135deg, var(--purple) 0%, #7a3fd4 100%);
      border: 2px solid var(--purple-bright);
      box-shadow: 0 0 30px rgba(155, 89, 255, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }
    .focus-root-card::before {
      content: '';
      position: absolute;
      inset: -4px;
      border: 1px solid rgba(155, 89, 255, 0.2);
      pointer-events: none;
    }
    .focus-root-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 50px rgba(155, 89, 255, 0.5), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .focus-root-card .root-icon {
      font-size: 1.6rem;
    }
    .focus-root-card .root-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    /* Connector lines */
    .focus-connector {
      display: flex;
      justify-content: center;
      margin-bottom: 4px;
    }
    .focus-connector .v-line {
      width: 2px;
      height: 28px;
      background: var(--line-color);
      box-shadow: 0 0 6px rgba(155, 89, 255, 0.2);
    }

    /* Focus columns row */
    .focus-columns {
      display: flex;
      justify-content: center;
      gap: 0;
      position: relative;
    }
    .focus-columns::before {
      content: '';
      position: absolute;
      top: 0;
      left: 80px;
      right: 80px;
      height: 2px;
      background: var(--line-color);
      box-shadow: 0 0 6px rgba(155, 89, 255, 0.2);
    }

    /* Individual focus column */
    .focus-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      min-width: 200px;
      max-width: 280px;
      padding: 0 12px;
    }
    .focus-col::before {
      content: '';
      width: 2px;
      height: 24px;
      background: var(--line-color);
      box-shadow: 0 0 6px rgba(155, 89, 255, 0.2);
      flex-shrink: 0;
    }

    /* Focus node — HOI4 style */
    .focus-node {
      width: 100%;
      background: var(--bg-card);
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    /* Top accent bar */
    .focus-node::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--purple);
      opacity: 0.6;
      transition: opacity 0.3s;
    }
    .focus-node:hover {
      border-color: var(--purple);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(155, 89, 255, 0.2);
    }
    .focus-node:hover::before { opacity: 1; }
    .focus-node.active {
      border-color: var(--purple-bright);
      box-shadow: 0 0 20px rgba(155, 89, 255, 0.3);
      background: rgba(155, 89, 255, 0.08);
    }
    .focus-node.active::before {
      opacity: 1;
      height: 3px;
      background: var(--purple-bright);
      box-shadow: 0 0 10px var(--purple-glow);
    }

    .node-inner {
      padding: 14px 16px;
    }
    .node-icon {
      font-size: 1.2rem;
      margin-bottom: 6px;
      display: block;
    }
    .node-title {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.5;
      letter-spacing: 0.3px;
    }
    .node-hint {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem;
      color: var(--text-faint);
      margin-top: 6px;
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .focus-node:hover .node-hint { opacity: 0.7; }

    /* Arrow indicators */
    .focus-col + .focus-col::after {
      content: '';
      position: absolute;
      left: -1px;
      top: 0;
      width: 2px;
      height: 24px;
      background: var(--line-color);
    }

    /* Sub-focus tree (children) */
    .focus-children {
      display: flex;
      gap: 0;
      position: relative;
      padding-top: 4px;
      width: 100%;
      justify-content: center;
    }
    .focus-children::before {
      content: '';
      position: absolute;
      top: 0;
      left: 24px;
      right: 24px;
      height: 2px;
      background: var(--line-color);
      box-shadow: 0 0 6px rgba(155, 89, 255, 0.2);
    }
    .focus-children .focus-col {
      min-width: 160px;
      max-width: 220px;
    }
    .focus-children .focus-col::before { height: 16px; }
    .focus-children .focus-node .node-inner { padding: 10px 12px; }
    .focus-children .focus-node .node-title { font-size: 0.75rem; }
    .focus-children .focus-node .node-icon { font-size: 1rem; }

    /* Third level */
    .focus-children .focus-children { gap: 0; }
    .focus-children .focus-children .focus-col { min-width: 130px; max-width: 180px; }
    .focus-children .focus-children .focus-col::before { height: 12px; }
    .focus-children .focus-children .focus-node .node-inner { padding: 8px 10px; }
    .focus-children .focus-children .focus-node .node-title { font-size: 0.7rem; }
    .focus-children .focus-children .focus-node .node-icon { font-size: 0.85rem; }

    /* Add button */
    .add-focus-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--text-faint);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
      flex-shrink: 0;
    }
    .add-focus-btn:hover {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      box-shadow: 0 0 10px var(--neon-cyan-soft);
    }

    /* === Detail Panel === */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 90;
      background: rgba(13, 10, 26, 0.7);
      backdrop-filter: blur(4px);
    }
    .detail-overlay.open { display: block; }
    .detail-panel {
      display: none;
      position: fixed;
      right: 32px;
      top: 50%;
      transform: translateY(-50%);
      width: 360px;
      max-height: 70vh;
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      box-shadow: 0 0 40px rgba(155, 89, 255, 0.15), 0 8px 32px rgba(0,0,0,0.4);
      z-index: 100;
      overflow-y: auto;
    }
    .detail-panel.open { display: block; }

    .detail-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .detail-header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--purple), transparent);
    }
    .detail-header .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .detail-header .close-btn:hover {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
    }
    .detail-header .detail-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem;
      color: var(--neon-pink);
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .detail-header h4 {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--purple-bright);
      letter-spacing: 1px;
      padding-right: 36px;
    }
    .detail-header .detail-meta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-faint);
      margin-top: 6px;
      letter-spacing: 1px;
    }

    .detail-body {
      padding: 20px 24px;
    }
    .detail-body p {
      font-size: 0.88rem;
      color: var(--text-soft);
      line-height: 1.9;
      letter-spacing: 0.3px;
    }

    .detail-discuss {
      margin: 0 24px 24px;
      padding: 16px;
      background: rgba(155, 89, 255, 0.06);
      border: 1px solid var(--border);
      position: relative;
    }
    .detail-discuss::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--neon-cyan);
      box-shadow: 0 0 8px var(--neon-cyan-soft);
    }
    .detail-discuss .discuss-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: var(--neon-cyan);
      letter-spacing: 3px;
      margin-bottom: 10px;
    }
    .detail-discuss p {
      font-size: 0.82rem;
      color: var(--text-soft);
      line-height: 1.8;
    }

    /* === Footer === */
    .footer {
      text-align: center;
      padding: 24px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-faint);
      letter-spacing: 3px;
      border-top: 1px solid var(--border);
      position: relative;
    }
    .footer::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--purple), transparent);
    }

    /* === Empty State === */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-faint);
    }
    .empty-state .big { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }
    .empty-state p {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 2px;
    }

    /* === Responsive === */
    @media (max-width: 900px) {
      .detail-panel {
        right: 12px;
        left: 12px;
        width: auto;
        top: auto;
        bottom: 12px;
        transform: none;
        max-height: 50vh;
      }
    }
    @media (max-width: 700px) {
      .header h1 { font-size: 1.2rem; letter-spacing: 3px; }
      .focus-columns { gap: 0; flex-wrap: wrap; }
      .focus-columns::before { display: none; }
      .focus-col { min-width: 0; max-width: 100%; }
      .focus-col::before { display: none; }
      .focus-children { flex-wrap: wrap; gap: 8px; }
      .focus-children::before { display: none; }
      .focus-children .focus-children .focus-col { max-width: 100%; }
      .tab { font-size: 0.7rem; padding: 4px 12px; }
    }

    /* === Neon glow animation === */
    @keyframes neonPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .focus-node.active::before {
      animation: neonPulse 2s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-tag">COUNTERFACTUAL ANALYSIS SYSTEM</div>
    <h1>如 果 历 史 <span>不 一 样</span></h1>
    <p class="sub">反事实推演 · 国策树</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabBar">
    <span class="label">// 预设场景</span>
    <button class="tab active" data-scenario="0">戊戌变法成功</button>
    <button class="tab" data-scenario="1">赤壁曹操胜</button>
    <button class="tab" data-scenario="2">鸦片战争中国胜</button>
    <button class="tab" data-scenario="3">秦朝延续三百年</button>
    <button class="tab custom-tab" data-scenario="custom">✎ 自定义</button>
  </div>

  <!-- Custom panel -->
  <div class="custom-panel" id="customPanel">
    <div class="inner">
      <h3>> INPUT FOCUS TREE</h3>
      <p class="hint">
        用 <code>##</code> 表示第一层分支，<code>###</code> 表示第二层。<br>
        每行格式：<code>标题 | 详细描述 | 课堂讨论问题</code>
      </p>
      <textarea id="customInput" spellcheck="false"></textarea>
      <div class="actions">
        <button class="gen-btn" id="customGen">GENERATE</button>
        <button class="eg-btn" id="customEg">LOAD EXAMPLE</button>
      </div>
    </div>
  </div>

  <!-- Tree area -->
  <div class="tree-area" id="treeArea">
    <div class="focus-tree" id="treeContainer"></div>
  </div>

  <!-- Detail overlay + panel -->
  <div class="detail-overlay" id="detailOverlay"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <button class="close-btn" id="closeDetail">✕</button>
      <div class="detail-tag">NATIONAL FOCUS DETAIL</div>
      <h4 id="detailTitle"></h4>
      <div class="detail-meta" id="detailMeta"></div>
    </div>
    <div class="detail-body" id="detailBody"></div>
    <div class="detail-discuss" id="detailDiscuss">
      <div class="discuss-label">CLASSROOM DISCUSSION</div>
      <p id="detailDiscussText"></p>
    </div>
  </div>

  <footer class="footer">JILLAX · 每一次假设，都是一次对历史的重新理解</footer>

  <script>
    // ============================================================
    //  Icons for different node types
    // ============================================================
    const ICONS = ['⚔️','🏛️','📜','🌍','🎖️','👑','💡','🔬','🏴','🕊️','🗡️','📊','🎭','⚖️','🚂','🗼'];

    function getIcon(depth, idx) {
      return ICONS[(depth * 3 + idx) % ICONS.length];
    }

    function makeId() { return 'n' + Math.random().toString(36).slice(2, 7); }

    // ============================================================
    //  Scenarios
    // ============================================================
    const SCENARIOS = [
      {
        title: '如果戊戌变法成功了会怎样？',
        desc: '假设1898年慈禧太后未发动政变，光绪帝实权在握，变法得以持续推进……',
        discuss: '课堂讨论：结合当时列强环伺的国际环境，判断变法成功的可能性有多大？',
        root: {
          title: '戊戌变法·成功',
          content: '光绪帝在康有为、梁启超等维新派辅佐下，成功推行全面改革。中国走上君主立宪道路。',
          discuss: '你认为变法成功的最大障碍是什么？是保守势力、列强干涉，还是改革本身过于激进？',
          children: [
            {
              title: '光绪皇帝掌握实权',
              content: '慈禧太后被迫归政，光绪帝真正掌握国家权力。维新派进入核心决策层，改革政令得以全面推行。',
              discuss: '光绪皇帝是否有足够的政治经验和手腕来驾驭各方势力？',
              children: [

    // Assign IDs
    function assignIds(node) {
      node.id = makeId();
      if (node.children) node.children.forEach(assignIds);
    }
    SCENARIOS.forEach(s => assignIds(s.root));

    // ============================================================
    //  State
    // ============================================================
    let currentScenario = 0;

    // ============================================================
    //  DOM refs
    // ============================================================
    const treeContainer = document.getElementById('treeContainer');
    const detailPanel = document.getElementById('detailPanel');
    const detailOverlay = document.getElementById('detailOverlay');
    const detailTitle = document.getElementById('detailTitle');
    const detailMeta = document.getElementById('detailMeta');
    const detailBody = document.getElementById('detailBody');
    const detailDiscussText = document.getElementById('detailDiscussText');
    const detailDiscuss = document.getElementById('detailDiscuss');
    const customPanel = document.getElementById('customPanel');
    const customInput = document.getElementById('customInput');
    const tabs = document.querySelectorAll('.tab');

    // ============================================================
    //  Render
    // ============================================================
    function renderNode(node, depth, idx) {
      const col = document.createElement('div');
      col.className = 'focus-col';
      col.dataset.id = node.id;

      const focusNode = document.createElement('div');
      focusNode.className = 'focus-node';
      focusNode.dataset.id = node.id;
      focusNode.innerHTML = `
        <div class="node-inner">
          <span class="node-icon">${getIcon(depth, idx)}</span>
          <div class="node-title">${node.title}</div>
          <div class="node-hint">> CLICK TO EXPAND</div>
        </div>
      `;
      focusNode.addEventListener('click', (e) => {
        e.stopPropagation();
        showDetail(node);
      });
      col.appendChild(focusNode);

      if (node.children && node.children.length > 0) {
        const childrenContainer = document.createElement('div');
        childrenContainer.className = 'focus-children';
        node.children.forEach((child, ci) => {
          childrenContainer.appendChild(renderNode(child, depth + 1, ci));
        });
        col.appendChild(childrenContainer);
      }

      // Add button for first-level nodes
      if (depth === 1) {
        const addBtn = document.createElement('button');
        addBtn.className = 'add-focus-btn';
        addBtn.textContent = '+';
        addBtn.title = '添加分支';
        addBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const title = prompt('输入新国策标题：');
          if (title) {
            const desc = prompt('输入简要描述：');
            node.children = node.children || [];
            node.children.push({ id: makeId(), title, content: desc || '', discuss: '', children: [] });
            renderScenario(currentScenario);
          }
        });
        col.appendChild(addBtn);
      }

      return col;
    }

    function renderScenario(index) {
      const scenario = typeof index === 'number' ? SCENARIOS[index] : index;
      treeContainer.innerHTML = '';

      // Root
      const rootDiv = document.createElement('div');
      rootDiv.className = 'focus-root';
      rootDiv.innerHTML = `
        <div class="focus-root-card">
          <span class="root-icon">⚖️</span>
          <span class="root-text">${scenario.root.title}</span>
        </div>
      `;
      rootDiv.querySelector('.focus-root-card').addEventListener('click', () => showDetail(scenario.root));
      treeContainer.appendChild(rootDiv);

      // Connector
      const connector = document.createElement('div');
      connector.className = 'focus-connector';
      connector.innerHTML = '<div class="v-line"></div>';
      treeContainer.appendChild(connector);

      // Columns
      if (scenario.root.children && scenario.root.children.length > 0) {
        const columns = document.createElement('div');
        columns.className = 'focus-columns';
        scenario.root.children.forEach((child, i) => {
          columns.appendChild(renderNode(child, 1, i));
        });
        treeContainer.appendChild(columns);
      }

      // Close detail
      closeDetail();
    }

    // ============================================================
    //  Detail panel
    // ============================================================
    function showDetail(node) {
      detailTitle.textContent = node.title;
      detailMeta.textContent = 'NODE ID: ' + node.id + ' · CLICK ELSEWHERE TO CLOSE';
      detailBody.innerHTML = '<p>' + (node.content || '暂无详细描述。') + '</p>';
      if (node.discuss) {
        detailDiscuss.style.display = 'block';
        detailDiscussText.textContent = node.discuss;
      } else {
        detailDiscuss.style.display = 'none';
      }
      detailPanel.classList.add('open');
      detailOverlay.classList.add('open');
    }
    function closeDetail() {
      detailPanel.classList.remove('open');
      detailOverlay.classList.remove('open');
    }
    document.getElementById('closeDetail').addEventListener('click', closeDetail);
    detailOverlay.addEventListener('click', closeDetail);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDetail(); });

    // ============================================================
    //  Custom mode
    // ============================================================
    function parseCustomInput(text) {
      const lines = text.trim().split('\n').filter(l => l.trim());
      const root = { id: makeId(), title: '', content: '', discuss: '', children: [] };
      const stack = [{ node: root, depth: 0 }];
      lines.forEach(line => {
        const trimmed = line.trim();
        const levelMatch = trimmed.match(/^(#{1,4})\s*/);
        if (!levelMatch) return;
        const depth = levelMatch[1].length;
        const content = trimmed.replace(/^#{1,4}\s*/, '');
        const parts = content.split('|').map(s => s.trim());
        const newNode = { id: makeId(), title: parts[0] || '未命名', content: parts[1] || '', discuss: parts[2] || '', children: [] };
        while (stack.length > 0 && stack[stack.length - 1].depth >= depth) stack.pop();
        if (stack.length > 0) {
          const parent = stack[stack.length - 1].node;
          parent.children = parent.children || [];
          parent.children.push(newNode);
        }
        stack.push({ node: newNode, depth });
      });
      if (root.children.length > 0) return { title: root.children[0].title, desc: '', discuss: '', root: root.children[0] };
      return null;
    }

    const customEgText = `# 如果戊戌变法成功了会怎样？
## 光绪掌握实权 | 光绪帝真正掌握权力，维新派进入决策层
君主立宪制建立 | 参照明治维新建立议会制度 | 立宪能否一步到位？
保守势力被清算 | 顽固派被清除，但满汉矛盾可能激化
新政全面推开 | 废八股、兴学堂、练新军
## 列强的反应 | 列强调整对华策略
英国可能支持改革 | 维护在华经济利益
日本态度微妙 | 警惕中国重新强大
## 对后世的影响 | 中国历史走向被改变
革命党势力减弱 | 立宪派占上风 | 还会有辛亥革命吗？
军阀割据可能避免 | 中央权威得以保持`;

    document.getElementById('customEg').addEventListener('click', () => { customInput.value = customEgText; });
    document.getElementById('customGen').addEventListener('click', () => {
      const text = customInput.value.trim();
      if (!text) return;
      const scenario = parseCustomInput(text);
      if (!scenario) { alert('格式有误，请检查后重试。'); return; }
      assignIds(scenario.root);
      renderScenario(scenario);
      customPanel.classList.remove('open');
      tabs.forEach(t => t.classList.remove('active'));
    });

    // ============================================================
    //  Tab switching
    // ============================================================
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        if (tab.dataset.scenario === 'custom') {
          customPanel.classList.toggle('open');
          return;
        }
        customPanel.classList.remove('open');
        currentScenario = parseInt(tab.dataset.scenario);
        renderScenario(currentScenario);
      });
    });

    // ============================================================
    //  Init
    // ============================================================
    renderScenario(0);
  </script>
