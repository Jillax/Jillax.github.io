<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>如果历史不一样 · 反事实推演</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

    :root {
      --bg: #f5f0e8;
      --surface: #ede6d8;
      --text: #2a2520;
      --text-secondary: #7a7060;
      --text-muted: #a09888;
      --gold: #c4a35a;
      --gold-dark: #a08030;
      --border: #d8d0c0;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.07);
      --line-color: #c8b898;
      --node-bg: #fff;
      --root-bg: #f0e8d8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    .header {
      text-align: center;
      padding: 36px 20px 18px;
      background: linear-gradient(180deg, #ede6d8 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.7rem;
      font-weight: 900;
      letter-spacing: 4px;
    }
    .header h1 span { color: var(--gold); }
    .header .sub {
      margin-top: 4px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      letter-spacing: 4px;
    }

    /* ---- Scenario tabs ---- */
    .tabs {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 20px 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .tabs .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-right: 4px;
      letter-spacing: 1px;
      font-family: 'Noto Serif SC', serif;
    }
    .tabs .tab {
      padding: 5px 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
      color: var(--text-secondary);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Noto Serif SC', serif;
      letter-spacing: 1px;
      user-select: none;
    }
    .tabs .tab:hover {
      border-color: var(--gold);
      color: var(--gold-dark);
    }
    .tabs .tab.active {
      background: var(--gold);
      color: #fff;
      border-color: var(--gold);
    }
    .tabs .tab.custom-tab {
      border-style: dashed;
    }

    /* ---- Custom panel ---- */
    .custom-panel {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 12px;
      display: none;
    }
    .custom-panel.open { display: block; }
    .custom-panel .inner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
    }
    .custom-panel h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 0.9rem;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .custom-panel .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 10px;
      line-height: 1.6;
    }
    .custom-panel .hint code {
      background: rgba(0,0,0,0.04);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 0.72rem;
    }
    .custom-panel textarea {
      width: 100%;
      min-height: 150px;
      padding: 12px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.82rem;
      line-height: 1.6;
      color: var(--text);
      resize: vertical;
    }
    .custom-panel textarea:focus { outline: none; border-color: var(--gold); }
    .custom-panel .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .custom-panel .actions button {
      padding: 6px 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: 'Noto Serif SC', serif;
      font-size: 0.82rem;
      letter-spacing: 1px;
      transition: all 0.3s;
    }
    .custom-panel .actions .gen-btn {
      background: var(--gold);
      color: #fff;
    }
    .custom-panel .actions .gen-btn:hover { background: var(--gold-dark); }
    .custom-panel .actions .eg-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .custom-panel .actions .eg-btn:hover { border-color: var(--gold); color: var(--gold-dark); }

    /* ---- Tree area ---- */
    .tree-area {
      max-width: 1100px;
      margin: 0 auto;
      padding: 10px 20px 40px;
    }

    /* Detail side panel (floating) */
    .detail-panel {
      display: none;
      position: fixed;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 300px;
      max-height: 60vh;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      padding: 20px;
      overflow-y: auto;
      z-index: 100;
    }
    .detail-panel.open { display: block; }
    .detail-panel .close-detail {
      float: right;
      background: none;
      border: none;
      font-size: 1.1rem;
      color: var(--text-muted);
      cursor: pointer;
    }
    .detail-panel .close-detail:hover { color: var(--text); }
    .detail-panel h4 {
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      color: var(--gold-dark);
      margin-bottom: 8px;
      padding-right: 20px;
    }
    .detail-panel .dp-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .detail-panel .dp-body {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    .detail-panel .dp-discuss {
      margin-top: 12px;
      padding: 12px;
      background: rgba(196,163,90,0.08);
      border-radius: 6px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .detail-panel .dp-discuss strong {
      color: var(--gold-dark);
      font-family: 'Noto Serif SC', serif;
    }
    @media (max-width: 900px) {
      .detail-panel {
        right: 12px;
        left: 12px;
        width: auto;
        top: auto;
        bottom: 12px;
        transform: none;
        max-height: 40vh;
      }
    }

    /* ---- Tree ---- */
    .tree {
      padding: 10px 0;
    }

    /* Root node */
    .tree-root {
      text-align: center;
      margin-bottom: 20px;
    }
    .tree-root .root-card {
      display: inline-block;
      padding: 14px 32px;
      background: var(--gold);
      color: #fff;
      border-radius: 10px;
      font-family: 'Noto Serif SC', serif;
      font-size: 0.9rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 3px 12px rgba(196,163,90,0.3);
      position: relative;
    }
    .tree-root .root-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(196,163,90,0.4);
    }
    .tree-root .root-card .q-mark {
      font-size: 1.4rem;
      margin-right: 8px;
    }
    /* Vertical line from root */
    .root-line {
      width: 2px;
      height: 30px;
      background: var(--line-color);
      margin: 0 auto;
    }

    /* Children row (horizontal) */
    .tree-row {
      display: flex;
      justify-content: center;
      gap: 40px;
      position: relative;
      padding: 6px 0 0;
    }
    /* Horizontal line spanning children */
    .tree-row::before {
      content: '';
      position: absolute;
      top: 0;
      left: 60px;
      right: 60px;
      height: 2px;
      background: var(--line-color);
    }

    /* Branch (vertical container for a subtree) */
    .tree-branch {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      flex: 1;
      max-width: 260px;
      min-width: 120px;
    }
    /* Vertical line up from branch node */
    .tree-branch::before {
      content: '';
      width: 2px;
      height: 20px;
      background: var(--line-color);
      flex-shrink: 0;
    }

    /* Node card */
    .tree-node {
      width: 100%;
      padding: 12px 14px;
      background: var(--node-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: var(--card-shadow);
      text-align: center;
      position: relative;
    }
    .tree-node:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(196,163,90,0.15);
    }
    .tree-node.active {
      border-color: var(--gold);
      background: rgba(196,163,90,0.04);
      box-shadow: 0 0 0 2px rgba(196,163,90,0.2);
    }

    .tree-node .node-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }
    .tree-node .node-click-hint {
      font-size: 0.6rem;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.3s;
      margin-top: 4px;
    }
    .tree-node:hover .node-click-hint { opacity: 0.5; }

    /* Children of a branch (sub-row) */
    .branch-children {
      display: flex;
      gap: 24px;
      position: relative;
      padding-top: 6px;
      width: 100%;
      justify-content: center;
    }
    /* Horizontal line for sub-children */
    .branch-children::before {
      content: '';
      position: absolute;
      top: 0;
      left: 30px;
      right: 30px;
      height: 2px;
      background: var(--line-color);
    }

    .branch-children .tree-branch {
      max-width: 200px;
      min-width: 100px;
    }
    .branch-children .tree-branch::before {
      height: 16px;
    }
    .branch-children .tree-node {
      padding: 10px 12px;
    }
    .branch-children .tree-node .node-title {
      font-size: 0.8rem;
    }

    /* Third level */
    .branch-children .branch-children {
      gap: 16px;
    }
    .branch-children .branch-children .tree-branch {
      max-width: 160px;
      min-width: 80px;
    }
    .branch-children .branch-children .tree-branch::before {
      height: 12px;
    }
    .branch-children .branch-children .tree-node {
      padding: 8px 10px;
    }
    .branch-children .branch-children .tree-node .node-title {
      font-size: 0.75rem;
    }

    /* Add branch button */
    .add-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px dashed var(--border);
      background: #fff;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
      flex-shrink: 0;
    }
    .add-btn:hover {
      border-color: var(--gold);
      color: var(--gold-dark);
      background: rgba(196,163,90,0.05);
    }

    /* ---- Empty state ---- */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .big {
      font-size: 2.5rem;
      margin-bottom: 10px;
      opacity: 0.4;
    }
    .empty-state p {
      font-family: 'Noto Serif SC', serif;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    /* ---- Responsive ---- */
    @media (max-width: 700px) {
      .header h1 { font-size: 1.3rem; }
      .tree-row { gap: 16px; flex-wrap: wrap; }
      .tree-row::before { display: none; }
      .tree-branch { max-width: 100%; min-width: 0; }
      .tree-branch::before { display: none; }
      .branch-children { gap: 12px; flex-wrap: wrap; }
      .branch-children::before { display: none; }
      .branch-children .branch-children .tree-branch { max-width: 100%; }
      .tabs .tab { font-size: 0.72rem; padding: 4px 12px; }
    }

    /* ---- Footer ---- */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <h1>如 果 历 史 <span>不 一 样</span></h1>
    <p class="sub">反事实推演 · 课堂讨论工具</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabBar">
    <span class="label">预设场景</span>
    <button class="tab active" data-scenario="0">戊戌变法成功</button>
    <button class="tab" data-scenario="1">赤壁曹操胜</button>
    <button class="tab" data-scenario="2">鸦片战争中国胜</button>
    <button class="tab" data-scenario="3">秦朝延续三百年</button>
    <button class="tab custom-tab" data-scenario="custom">✎ 自定义</button>
  </div>

  <!-- Custom panel -->
  <div class="custom-panel" id="customPanel">
    <div class="inner">
      <h3>▎输入推演结构</h3>
      <p class="hint">
        用 <code>##</code> 表示第一层分支，<code>###</code> 表示第二层。<br>
        每行格式：<code>标题 | 详细描述 | 课堂讨论问题</code>
      </p>
      <textarea id="customInput" spellcheck="false"></textarea>
      <div class="actions">
        <button class="gen-btn" id="customGen">✦ 生成推演树</button>
        <button class="eg-btn" id="customEg">载入示例</button>
      </div>
    </div>
  </div>

  <!-- Tree area -->
  <div class="tree-area" id="treeArea">
    <div class="tree" id="treeContainer"></div>
  </div>

  <!-- Detail panel -->
  <div class="detail-panel" id="detailPanel">
    <button class="close-detail" id="closeDetail">✕</button>
    <h4 id="detailTitle"></h4>
    <div class="dp-meta" id="detailMeta"></div>
    <div class="dp-body" id="detailBody"></div>
    <div class="dp-discuss" id="detailDiscuss"></div>
  </div>

  <footer class="footer">Jillax · 每一次假设，都是一次对历史的重新理解</footer>

  <script>
    // ============================================================
    //  Data — Pre-built scenarios
    // ============================================================

    function makeId() { return 'n' + Math.random().toString(36).slice(2, 7); }

    const SCENARIOS = [
      {
        // 0: 戊戌变法成功
        title: '如果戊戌变法成功了会怎样？',
        desc: '假设1898年慈禧太后未发动政变，光绪帝实权在握，变法得以持续推进……',
        discuss: '课堂讨论：结合当时列强环伺的国际环境，判断变法成功的可能性有多大？',
        root: {
          title: '戊戌变法·成功',
          content: '光绪帝在康有为、梁启超等维新派辅佐下，成功推行全面改革。中国走上君主立宪道路。',
          discuss: '你认为变法成功的最大障碍是什么？是保守势力、列强干涉，还是改革本身过于激进？',
          children: [
            {
              title: '光绪皇帝掌握实权',
              content: '慈禧太后被迫归政，光绪帝真正掌握国家权力。维新派进入核心决策层，改革政令得以全面推行。',
              discuss: '光绪皇帝是否有足够的政治经验和手腕来驾驭各方势力？',
              children: [
                { title: '君主立宪制建立', content: '参照日本明治维新模式，建立议会制度，制定宪法。中国成为亚洲第一个立宪国家，政治体制领先于俄国等传统大国。', discuss: '立宪制的建立能否一步到位？还是需要渐进过渡？' },
                { title: '保守势力被清算', content: '慈禧、荣禄等顽固派被清除出权力中心。但满汉矛盾可能因此激化，引发新的政治危机。', discuss: '如何处理旧官僚体系中的既得利益者，是改革最棘手的问题。' },
                { title: '新政全面推开', content: '废八股、兴学堂、练新军、办实业。教育体系全面改革，现代军队建设加速。', discuss: '这些改革措施中，哪一项对当时中国最为迫切？' }
              ]
            },
            {
              title: '列强的反应',
              content: '列强对中国的突然改革措手不及，各自调整对华策略。国际环境变得更加复杂。',
              discuss: '列强是真心希望中国强大，还是更希望中国保持软弱？',
              children: [
                { title: '英国可能支持改革', content: '英国倾向于支持一个稳定的立宪政府，以维护其在华经济利益。但支持力度有限。', discuss: '为什么英国可能是列强中最"友好"的一个？' },
                { title: '日本态度微妙', content: '日本一方面警惕中国改革后可能重新强大，另一方面又希望借改革进一步渗透中国。', discuss: '日本在亚洲的战略是什么？一个强大的中国对日本意味着什么？' },
                { title: '瓜分危机暂时缓解', content: '"以华治华"策略延续。但列强的经济渗透可能加剧，形成新的控制方式。', discuss: '经济殖民与文化殖民是否比直接殖民统治更难对付？' }
              ]
            },
            {
              title: '对后世的影响',
              content: '中国历史走向被彻底改变。20世纪的许多重大事件可能不会发生。',
              discuss: '历史的一个小小转折，能否真正改变一个国家的命运轨迹？',
              children: [
                { title: '革命党势力减弱', content: '孙中山等革命党人的"驱除鞑虏"口号失去号召力。立宪与革命两条道路竞争中，立宪派占上风。', discuss: '如果戊戌变法成功，还会有辛亥革命吗？' },
                { title: '军阀割据可能避免', content: '中央权威得以保持，地方督抚权力受到制约。20世纪初的军阀混战格局可能不会出现。', discuss: '统一 vs. 分裂：中央集权与地方分权如何平衡？' },
                { title: '抗日战争格局改变', content: '如果中国提前三十年开启近代化，抗战实力将大大增强。但日本也可能更早发动侵略。', discuss: '一个更强大的中国能否阻止日本侵华？还是会引发更早的冲突？' }
              ]
            }
          ]
        }
      },
      {
        // 1: 赤壁之战曹操胜
        title: '如果赤壁之战曹操赢了会怎样？',
        desc: '假设东南风未起，黄盖火攻失败，曹操一举攻破孙刘联军……',
        discuss: '课堂讨论：曹操若统一天下，中国历史会缩短还是延长分裂期？',
        root: {
          title: '赤壁之战·曹操胜',
          content: '曹操在赤壁击败孙刘联军，顺势南下统一江南。三国鼎立的局面不复存在。',
          discuss: '曹操的胜利是必然还是偶然？赤壁之战的结果改变了多少历史的走向？',
          children: [
            {
              title: '曹操统一南方',
              content: '孙吴政权灭亡，刘备势力被消灭。曹操完成全国统一，比历史提前了近半个世纪。',
              discuss: '曹操能否有效统治南方士族？南北文化差异如何弥合？',
              children: [
                { title: '孙权投降或被灭', content: '江东士族在周瑜、鲁肃等主战派覆灭后，很可能选择投降。江东六郡并入曹魏版图。', discuss: '江东士族对曹操的态度如何？他们会真心归顺吗？' },
                { title: '刘备势力消亡', content: '诸葛亮"隆中对"失去实现基础，刘备集团要么投降要么退往西南偏安。', discuss: '如果刘备退入蜀地，诸葛亮能否在西南建立割据政权？' },
                { title: '江南开发推迟', content: '三国时期北方移民南迁的浪潮被阻断，江南经济崛起的时间线将大大延后。', discuss: '江南的开发是依靠移民还是本地发展？' }
              ]
            },
            {
              title: '曹魏提前统一全国',
              content: '中国在公元3世纪初就完成了统一，比西晋统一早了近一个世纪。',
              discuss: '提前统一对中国历史是福是祸？',
              children: [

              discuss: '如果儒家没有成为官方意识形态，中国人的价值观会有什么不同？',
              children: [

                { title: '儒家融入法家体系', content: '儒生被迫吸收法家思想，"外儒内法"的模式可能变成"外法内儒"甚至"纯法"。', discuss: '儒学能适应一个长期以法家为主流的社会吗？' }

            },
            {

                { title: '匈奴问题提前解决', content: '秦朝持续北击匈奴，可能提前几百年解决北方游牧民族威胁。长城防线不断北推。', discuss: '农耕文明与游牧文明的对峙，是否真的可以通过军事手段解决？' },
                { title: '丝绸之路提前开通', content: '秦代就已经开始探索西域，中西交流比历史提前了近百年。科技文化传播加速。', discuss: '如果中国提前开放，世界文明的发展路径会有什么不同？' }

    // ============================================================
    //  Assign IDs
    // ============================================================

    function assignIds(node) {
      node.id = makeId();
      if (node.children) {
        node.children.forEach(assignIds);
      }
    }
    SCENARIOS.forEach(s => assignIds(s.root));

    // ============================================================
    //  State
    // ============================================================

    let currentScenario = 0;
    let currentNode = null;

    // ============================================================
    //  DOM refs
    // ============================================================

    const treeContainer = document.getElementById('treeContainer');
    const detailPanel = document.getElementById('detailPanel');
    const detailTitle = document.getElementById('detailTitle');
    const detailMeta = document.getElementById('detailMeta');
    const detailBody = document.getElementById('detailBody');
    const detailDiscuss = document.getElementById('detailDiscuss');
    const customPanel = document.getElementById('customPanel');
    const customInput = document.getElementById('customInput');
    const tabs = document.querySelectorAll('.tab');

    // ============================================================
    //  Tree rendering
    // ============================================================

    function renderNode(node, depth) {
      const branch = document.createElement('div');
      branch.className = 'tree-branch';
      branch.dataset.id = node.id;

      const card = document.createElement('div');
      card.className = 'tree-node';
      card.dataset.id = node.id;
      card.innerHTML = `
        <div class="node-title">${node.title}</div>
        <div class="node-click-hint">点击查看详情</div>
      `;

      card.addEventListener('click', (e) => {
        e.stopPropagation();
        showDetail(node);
      });

      branch.appendChild(card);

      if (node.children && node.children.length > 0) {
        const childrenContainer = document.createElement('div');
        childrenContainer.className = 'branch-children';
        node.children.forEach(child => {
          childrenContainer.appendChild(renderNode(child, depth + 1));
        });
        branch.appendChild(childrenContainer);
      }

      // For root level, add a small "+" button
      if (depth === 1) {
        const addBtn = document.createElement('button');
        addBtn.className = 'add-btn';
        addBtn.textContent = '+';
        addBtn.title = '课堂讨论时添加分支';
        addBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const title = prompt('输入新分支标题：');
          if (title) {
            const desc = prompt('输入简要描述：');
            node.children = node.children || [];
            const newNode = { id: makeId(), title, content: desc || '', discuss: '', children: [] };
            node.children.push(newNode);
            renderScenario(currentScenario);
          }
        });
        branch.appendChild(addBtn);
      }

      return branch;
    }

    function renderScenario(index) {
      const scenario = typeof index === 'number' ? SCENARIOS[index] : index;
      treeContainer.innerHTML = '';

      // Root
      const rootDiv = document.createElement('div');
      rootDiv.className = 'tree-root';
      rootDiv.innerHTML = `
        <div class="root-card">
          <span class="q-mark">❓</span> ${scenario.root.title}
        </div>
      `;
      rootDiv.querySelector('.root-card').addEventListener('click', () => {
        showDetail(scenario.root);
      });
      treeContainer.appendChild(rootDiv);

      // Vertical line after root
      const lineDiv = document.createElement('div');
      lineDiv.className = 'root-line';
      treeContainer.appendChild(lineDiv);

      // Row of first-level branches
      if (scenario.root.children && scenario.root.children.length > 0) {
        const row = document.createElement('div');
        row.className = 'tree-row';
        scenario.root.children.forEach(child => {
          row.appendChild(renderNode(child, 1));
        });
        treeContainer.appendChild(row);
      }

      // Close detail if open
      detailPanel.classList.remove('open');
      currentNode = null;
    }

    // ============================================================
    //  Detail panel
    // ============================================================

    function showDetail(node) {
      currentNode = node;
      detailTitle.textContent = node.title;
      detailMeta.textContent = '点击其他节点可切换查看';
      detailBody.textContent = node.content || '暂无详细描述。';
      detailDiscuss.innerHTML = node.discuss
        ? `<strong>💬 课堂讨论：</strong>${node.discuss}`
        : '';
      detailPanel.classList.add('open');
    }

    document.getElementById('closeDetail').addEventListener('click', () => {
      detailPanel.classList.remove('open');
    });

    // ============================================================
    //  Custom mode
    // ============================================================

    function parseCustomInput(text) {
      const lines = text.trim().split('\n').filter(l => l.trim());
      const root = { id: makeId(), title: '', content: '', discuss: '', children: [] };
      const stack = [{ node: root, depth: 0 }];

      lines.forEach(line => {
        const trimmed = line.trim();
        const levelMatch = trimmed.match(/^(#{1,4})\s*/);
        if (!levelMatch) return;

        const depth = levelMatch[1].length;
        const content = trimmed.replace(/^#{1,4}\s*/, '');
        const parts = content.split('|').map(s => s.trim());

        const newNode = {
          id: makeId(),
          title: parts[0] || '未命名',
          content: parts[1] || '',
          discuss: parts[2] || '',
          children: []
        };

        // Pop stack until we find the right parent
        while (stack.length > 0 && stack[stack.length - 1].depth >= depth) {
          stack.pop();
        }

        if (stack.length > 0) {
          const parent = stack[stack.length - 1].node;
          parent.children = parent.children || [];
          parent.children.push(newNode);
        }

        stack.push({ node: newNode, depth });
      });

      if (root.children.length > 0) {
        return { title: root.children[0].title, desc: '', discuss: '', root: root.children[0] };
      }
      return null;
    }

    const customEgText = `# 如果戊戌变法成功了会怎样？
## 光绪掌握实权 | 光绪帝真正掌握权力，维新派进入决策层
君主立宪制建立 | 参照明治维新建立议会制度 | 立宪能否一步到位？
保守势力被清算 | 顽固派被清除，但满汉矛盾可能激化
新政全面推开 | 废八股、兴学堂、练新军
## 列强的反应 | 列强调整对华策略
英国可能支持改革 | 维护在华经济利益
日本态度微妙 | 警惕中国重新强大
## 对后世的影响 | 中国历史走向被改变
革命党势力减弱 | 立宪派占上风 | 还会有辛亥革命吗？
军阀割据可能避免 | 中央权威得以保持`;

    document.getElementById('customEg').addEventListener('click', () => {
      customInput.value = customEgText;
    });

    document.getElementById('customGen').addEventListener('click', () => {
      const text = customInput.value.trim();
      if (!text) return;
      const scenario = parseCustomInput(text);
      if (!scenario) {
        alert('格式有误，请检查后重试。');
        return;
      }
      assignIds(scenario.root);
      renderScenario(scenario);
      customPanel.classList.remove('open');
      // Deactivate scenario tabs
      tabs.forEach(t => t.classList.remove('active'));
    });

    // ============================================================
    //  Tab switching
    // ============================================================

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        if (tab.dataset.scenario === 'custom') {
          customPanel.classList.toggle('open');
          return;
        }
        customPanel.classList.remove('open');

        const idx = parseInt(tab.dataset.scenario);
        currentScenario = idx;
        renderScenario(idx);
      });
    });

    // ============================================================
    //  Keyboard: Escape closes detail
    // ============================================================

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        detailPanel.classList.remove('open');
      }
    });

    // ============================================================
    //  Init
    // ============================================================

    renderScenario(0);
  </script>
