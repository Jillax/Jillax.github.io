<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jill · Canvas 互动看板娘</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d0a1a;
      --bg-card: #1e1838;
      --text: #d4c8ef;
      --text-soft: #a896cc;
      --text-muted: #6b5a8a;
      --purple: #9b59ff;
      --purple-bright: #b47aff;
      --purple-glow: rgba(155, 89, 255, 0.4);
      --neon-pink: #ff4da6;
      --neon-cyan: #00e5ff;
      --border: rgba(155, 89, 255, 0.15);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .header {
      text-align: center;
      margin-bottom: 12px;
    }
    .header-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem;
      color: var(--neon-pink);
      letter-spacing: 4px;
    }
    .header h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.2rem;
      color: var(--text);
      letter-spacing: 3px;
      text-shadow: 0 0 15px var(--purple-glow);
    }
    .header h1 span { color: var(--purple-bright); }
    #jillCanvas {
      border: 1px solid var(--border);
      background: var(--bg-card);
      cursor: none;
      display: block;
    }
    .hint {
      margin-top: 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-align: center;
    }
    .hint span { color: var(--neon-cyan); }
    .footer {
      position: fixed;
      bottom: 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.5rem;
      color: var(--text-muted);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-tag">CANVAS INTERACTIVE MASCOT</div>
    <h1><span>JILL</span> · VA-11 HALL-A</h1>
  </div>
  <canvas id="jillCanvas" width="600" height="500"></canvas>
  <div class="hint">MOUSE OVER <span>JILL</span> TO INTERACT · CLICK TO CHANGE MOOD</div>
  <div class="footer">JILLAX · CANVAS MASCOT DEMO</div>

  <script>
    const canvas = document.getElementById('jillCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    let mouseX = W / 2, mouseY = H / 2;
    let isHovering = false;
    let mood = 0;
    let frame = 0;
    let dialogText = '';
    let dialogOpacity = 0;
    let eyeOffsetX = 0, eyeOffsetY = 0;
    let blinkTimer = 0;
    let isBlinking = false;
    let breathOffset = 0;
    let sparkles = [];

    const DIALOGUES = {
      hover: ["嗯？有什么事吗？","想来一杯什么？","今天过得怎么样？","Glitch City 的夜晚总是很长……","想聊聊历史吗？","AI 和人文，其实不矛盾。"],
      click: ["哈，被你发现了。","作为调酒师，我什么都能调。","VA-11 Hall-A 永远欢迎你。","混合饮料，混合思想。","相信科技进步的力量。","让我们来聊聊未来吧。"]
    };

    function drawJill(cx, cy, scale) {
      const s = scale;
      ctx.save();
      ctx.translate(cx, cy + Math.sin(breathOffset) * 2);

      ctx.fillStyle = '#6b3fa0';
      ctx.fillRect(-18*s, -42*s, 36*s, 18*s);
      ctx.fillRect(-22*s, -36*s, 8*s, 30*s);
      ctx.fillRect(14*s, -36*s, 8*s, 30*s);
      ctx.fillStyle = '#9b59ff';
      ctx.fillRect(-12*s, -40*s, 6*s, 4*s);
      ctx.fillRect(8*s, -38*s, 4*s, 2*s);

      ctx.fillStyle = '#f5deb3';
      ctx.fillRect(-14*s, -28*s, 28*s, 24*s);

      const eyeLX = -7*s + eyeOffsetX;
      const eyeRX = 5*s + eyeOffsetX;
      const eyeY = -20*s + eyeOffsetY;
      if (isBlinking) {
        ctx.fillStyle = '#2a1f3d';
        ctx.fillRect(eyeLX - 3*s, eyeY, 6*s, 1*s);
        ctx.fillRect(eyeRX - 3*s, eyeY, 6*s, 1*s);
      } else {
        ctx.fillStyle = '#fff';
        ctx.fillRect(eyeLX - 4*s, eyeY - 3*s, 8*s, 7*s);
        ctx.fillRect(eyeRX - 4*s, eyeY - 3*s, 8*s, 7*s);
        ctx.fillStyle = '#9b59ff';
        ctx.fillRect(eyeLX - 2*s + eyeOffsetX*0.5, eyeY - 1*s, 4*s, 4*s);
        ctx.fillRect(eyeRX - 2*s + eyeOffsetX*0.5, eyeY - 1*s, 4*s, 4*s);
        ctx.fillStyle = '#2a1f3d';
        ctx.fillRect(eyeLX - 1*s + eyeOffsetX*0.5, eyeY, 2*s, 2*s);
        ctx.fillRect(eyeRX - 1*s + eyeOffsetX*0.5, eyeY, 2*s, 2*s);
        ctx.fillStyle = '#fff';
        ctx.fillRect(eyeLX + eyeOffsetX*0.5, eyeY - 1*s, 1*s, 1*s);
        ctx.fillRect(eyeRX + eyeOffsetX*0.5, eyeY - 1*s, 1*s, 1*s);
      }

      ctx.fillStyle = '#c0392b';
      if (mood === 1) {
        ctx.fillRect(-4*s, -10*s, 8*s, 2*s);
        ctx.fillRect(-3*s, -12*s, 6*s, 2*s);
      } else if (mood === 2) {
        ctx.fillRect(-2*s, -10*s, 4*s, 1*s);
      } else if (mood === 3) {
        ctx.fillRect(-2*s, -11*s, 4*s, 3*s);
      } else {
        ctx.fillRect(-3*s, -10*s, 6*s, 1*s);
      }

      ctx.fillStyle = 'rgba(255, 150, 150, 0.3)';
      ctx.fillRect(-12*s, -14*s, 6*s, 3*s);
      ctx.fillRect(6*s, -14*s, 6*s, 3*s);

      ctx.fillStyle = '#f5deb3';
      ctx.fillRect(-4*s, -4*s, 8*s, 4*s);

      ctx.fillStyle = '#2a1f3d';
      ctx.fillRect(-16*s, 0, 32*s, 28*s);
      ctx.fillStyle = '#fff';
      ctx.fillRect(-10*s, 0, 20*s, 4*s);
      ctx.fillStyle = '#9b59ff';
      ctx.fillRect(-2*s, 4*s, 4*s, 12*s);
      ctx.fillStyle = '#b47aff';
      ctx.fillRect(-1*s, 6*s, 2*s, 8*s);

      ctx.fillStyle = '#2a1f3d';
      ctx.fillRect(-22*s, 2*s, 6*s, 18*s);
      ctx.fillRect(16*s, 2*s, 6*s, 18*s);
      ctx.fillStyle = '#f5deb3';
      ctx.fillRect(-22*s, 20*s, 6*s, 4*s);
      ctx.fillRect(16*s, 20*s, 6*s, 4*s);

      if (mood !== 3) {
        ctx.fillStyle = 'rgba(0, 229, 255, 0.4)';
        ctx.fillRect(18*s, 10*s, 8*s, 12*s);
        ctx.fillStyle = 'rgba(0, 229, 255, 0.6)';
        ctx.shadowColor = 'rgba(0, 229, 255, 0.5)';
        ctx.shadowBlur = 8;
        ctx.fillRect(19*s, 12*s, 6*s, 6*s);
        ctx.shadowBlur = 0;
      }

      ctx.restore();
    }

    function drawDialog(text, x, y) {
      if (!text || dialogOpacity <= 0) return;
      ctx.save();
      ctx.globalAlpha = dialogOpacity;
      ctx.font = '14px "Noto Sans SC"';
      const tw = ctx.measureText(text).width + 24;
      const th = 36;
      const bx = Math.max(10, Math.min(W - tw - 10, x - tw / 2));
      const by = y - th - 16;
      ctx.fillStyle = 'rgba(30, 24, 56, 0.92)';
      ctx.strokeStyle = 'rgba(155, 89, 255, 0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.rect(bx, by, tw, th); ctx.fill(); ctx.stroke();
      ctx.fillStyle = 'rgba(30, 24, 56, 0.92)';
      ctx.beginPath(); ctx.moveTo(x - 6, by + th); ctx.lineTo(x, by + th + 8); ctx.lineTo(x + 6, by + th); ctx.fill();
      ctx.fillStyle = '#d4c8ef';
      ctx.textAlign = 'center';
      ctx.fillText(text, bx + tw / 2, by + 22);
      ctx.textAlign = 'left';
      ctx.restore();
    }

    function addSparkle(x, y) {
      for (let i = 0; i < 5; i++) {
        sparkles.push({
          x: x + (Math.random() - 0.5) * 40,
          y: y + (Math.random() - 0.5) * 40,
          vx: (Math.random() - 0.5) * 2,
          vy: -Math.random() * 2 - 1,
          life: 1,
          size: Math.random() * 3 + 1,
          color: ['#9b59ff', '#ff4da6', '#00e5ff', '#ffaa40'][Math.floor(Math.random() * 4)]
        });
      }
    }

    function drawGrid() {
      ctx.strokeStyle = 'rgba(155, 89, 255, 0.04)';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 30) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
      for (let y = 0; y < H; y += 30) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    }

    function render() {
      frame++;
      breathOffset += 0.03;
      const jillCX = W / 2, jillCY = H / 2 + 20;
      const dx = mouseX - jillCX, dy = mouseY - jillCY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      eyeOffsetX = dist > 0 ? (dx / dist) * Math.min(3, dist * 0.01) : 0;
      eyeOffsetY = dist > 0 ? (dy / dist) * Math.min(3, dist * 0.01) : 0;

      blinkTimer++;
      if (blinkTimer > 180 + Math.random() * 120) { isBlinking = true; blinkTimer = 0; }
      if (isBlinking && blinkTimer > 8) { isBlinking = false; }

      const wasHovering = isHovering;
      isHovering = mouseX > jillCX - 30 && mouseX < jillCX + 30 && mouseY > jillCY - 50 && mouseY < jillCY + 30;
      if (isHovering && !wasHovering) {
        dialogText = DIALOGUES.hover[Math.floor(Math.random() * DIALOGUES.hover.length)];
        dialogOpacity = 1;
      }
      if (dialogOpacity > 0) dialogOpacity = Math.max(0, dialogOpacity - 0.003);

      ctx.clearRect(0, 0, W, H);
      drawGrid();
      const scanY = (frame * 2) % H;
      ctx.fillStyle = 'rgba(155, 89, 255, 0.03)';
      ctx.fillRect(0, scanY, W, 2);

      sparkles = sparkles.filter(s => { s.x += s.vx; s.y += s.vy; s.life -= 0.02; return s.life > 0; });
      sparkles.forEach(s => { ctx.save(); ctx.globalAlpha = s.life; ctx.fillStyle = s.color; ctx.shadowColor = s.color; ctx.shadowBlur = 6; ctx.fillRect(s.x - s.size/2, s.y - s.size/2, s.size, s.size); ctx.restore(); });

      drawJill(jillCX, jillCY, 3);
      drawDialog(dialogText, jillCX, jillCY - 55);

      requestAnimationFrame(render);
    }

    canvas.addEventListener('mousemove', (e) => { const r = canvas.getBoundingClientRect(); mouseX = e.clientX - r.left; mouseY = e.clientY - r.top; });
    canvas.addEventListener('click', (e) => {
      const r = canvas.getBoundingClientRect();
      const cx = e.clientX - r.left, cy = e.clientY - r.top;
      const jillCX = W / 2, jillCY = H / 2 + 20;
      if (Math.sqrt((cx - jillCX)**2 + (cy - jillCY)**2) < 60) {
        mood = (mood + 1) % 4;
        dialogText = DIALOGUES.click[Math.floor(Math.random() * DIALOGUES.click.length)];
        dialogOpacity = 1;
        addSparkle(jillCX, jillCY - 20);
      }
    });

    render();
  </script>
</body>
</html>
