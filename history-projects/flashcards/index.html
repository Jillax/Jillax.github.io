<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史闪卡 · 间隔重复记忆系统</title>
<link rel="icon" type="image/jpeg" href="../../favicon.jpg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0a1a;--bg-card:#1e1838;--bg-surface:#130f24;
  --text:#d4c8ef;--text-soft:#a896cc;--text-muted:#6b5a8a;--text-faint:#3d2f5c;
  --purple:#9b59ff;--purple-bright:#b47aff;--purple-soft:rgba(155,89,255,.15);--purple-glow:rgba(155,89,255,.4);
  --neon-pink:#ff4da6;--neon-cyan:#00e5ff;--amber:#ffaa40;--green:#4ade80;--red:#ff6b8a;
  --border:rgba(155,89,255,.15);--border-glow:rgba(155,89,255,.3);
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

.back-link{position:fixed;top:16px;left:16px;font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--text-faint);text-decoration:none;z-index:10;letter-spacing:1px;transition:color .3s}
.back-link:hover{color:var(--purple)}

.header{text-align:center;padding:40px 20px 20px;position:relative}
.header::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:1px;background:linear-gradient(to right,transparent,var(--purple),transparent)}
.header-tag{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--neon-pink);letter-spacing:4px;margin-bottom:8px}
.header h1{font-family:'Orbitron',sans-serif;font-size:clamp(1.2rem,3vw,1.8rem);font-weight:700;letter-spacing:4px;text-transform:uppercase;text-shadow:0 0 15px var(--purple-glow)}
.header h1 span{color:var(--purple-bright)}
.header .sub{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--text-muted);letter-spacing:2px;margin-top:6px}

.main{max-width:900px;margin:0 auto;padding:24px 20px 60px}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:24px;flex-wrap:wrap}
.tab{padding:8px 18px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .3s}
.tab:hover{border-color:var(--purple);color:var(--purple-bright)}
.tab.active{background:var(--purple-soft);color:var(--purple-bright);border-color:var(--purple)}

/* Bank selector */
.bank-section{margin-bottom:28px}
.bank-section h3{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--neon-cyan);letter-spacing:3px;margin-bottom:12px}
.bank-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.bank-card{border:1px solid var(--border);padding:16px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.bank-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--purple);opacity:.4;transition:opacity .3s}
.bank-card:hover{border-color:var(--purple);transform:translateY(-2px);box-shadow:0 4px 16px rgba(155,89,255,.15)}
.bank-card:hover::before{opacity:1}
.bank-card.active{border-color:var(--purple-bright);background:var(--purple-soft);box-shadow:0 0 15px rgba(155,89,255,.2)}
.bank-card.active::before{opacity:1}
.bank-name{font-size:.9rem;font-weight:500;color:var(--text);margin-bottom:4px}
.bank-meta{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text-faint);letter-spacing:1px}
.bank-count{position:absolute;top:12px;right:14px;font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text-faint)}

/* Stats */
.stats-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.stat{border:1px solid var(--border);padding:12px 16px;text-align:center;min-width:80px;background:var(--bg-card)}
.stat .num{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:700;color:var(--purple-bright);text-shadow:0 0 10px var(--purple-glow)}
.stat .lbl{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--text-faint);letter-spacing:1px;margin-top:2px}

/* Flashcard */
.fc-wrap{perspective:1200px;margin-bottom:24px}
.flashcard{width:100%;min-height:280px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.flashcard.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:2px solid var(--border);padding:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg-card)}
.fc-face::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--purple);opacity:.6}
.fc-era{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--neon-pink);letter-spacing:3px;margin-bottom:10px}
.fc-type{font-family:'Share Tech Mono',monospace;font-size:.55rem;padding:2px 10px;border:1px solid var(--border);color:var(--text-muted);letter-spacing:1px;margin-bottom:16px}
.fc-q{font-size:clamp(1.2rem,3vw,1.8rem);font-weight:500;text-align:center;line-height:1.5;letter-spacing:.5px}
.fc-hint{position:absolute;bottom:16px;font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--text-faint);opacity:.5;letter-spacing:1px}
.flashcard:hover .fc-hint{opacity:1}
.fc-back{transform:rotateY(180deg);overflow-y:auto;align-items:flex-start;justify-content:flex-start;text-align:left}
.fc-back::before{background:var(--neon-cyan)}
.fc-back-title{font-size:1rem;font-weight:500;color:var(--purple-bright);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);width:100%}
.fc-back-era{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text-faint);margin-bottom:14px;letter-spacing:1px}
.fc-back-body{font-size:.88rem;color:var(--text-soft);line-height:1.9;font-weight:300;flex:1;width:100%}

/* Rating */
.rating-bar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.rate-btn{padding:12px 10px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:.78rem;transition:all .3s;flex:1;min-width:60px;max-width:110px;font-family:'Noto Sans SC',sans-serif}
.rate-btn.again{color:var(--red)}.rate-btn.again:hover{background:rgba(255,107,138,.1);border-color:var(--red)}
.rate-btn.hard{color:var(--amber)}.rate-btn.hard:hover{background:rgba(255,170,64,.1);border-color:var(--amber)}
.rate-btn.good{color:var(--green)}.rate-btn.good:hover{background:rgba(74,222,128,.1);border-color:var(--green)}
.rate-btn.easy{color:var(--neon-cyan)}.rate-btn.easy:hover{background:rgba(0,229,255,.1);border-color:var(--neon-cyan)}
.rate-lbl{display:block;font-size:.55rem;margin-top:3px;opacity:.7;font-family:'Share Tech Mono',monospace}

/* Done state */
.review-done{text-align:center;padding:60px 20px}
.done-icon{font-size:3rem;margin-bottom:16px}
.done-text{font-size:.95rem;color:var(--text-soft);margin-bottom:8px}
.done-sub{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--text-faint);letter-spacing:1px}

/* Browse */
.browse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.b-card{border:1px solid var(--border);padding:16px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;background:var(--bg-card)}
.b-card:hover{border-color:var(--border-glow);transform:translateY(-2px);box-shadow:0 4px 16px rgba(155,89,255,.1)}
.b-card-era{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text-faint);letter-spacing:1px}
.b-card-type{font-family:'Share Tech Mono',monospace;font-size:.5rem;padding:1px 8px;border:1px solid var(--border);color:var(--text-muted);display:inline-block;margin-left:6px}
.b-card-title{font-size:.95rem;font-weight:500;margin:8px 0 6px;color:var(--text)}
.b-card-preview{font-size:.78rem;color:var(--text-muted);line-height:1.5;font-weight:300;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.b-card-mastery{position:absolute;top:0;right:0;width:3px;height:100%}
.m-new{background:var(--text-faint)}.m-learning{background:var(--red)}.m-review{background:var(--amber)}.m-mature{background:var(--green)}

/* Custom bank modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(13,10,26,.8);z-index:100;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg-card);border:1px solid var(--border-glow);padding:28px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 0 40px rgba(155,89,255,.15)}
.modal h3{font-family:'Share Tech Mono',monospace;font-size:.85rem;color:var(--purple-bright);letter-spacing:2px;margin-bottom:16px}
.modal label{display:block;font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text-faint);letter-spacing:2px;margin-bottom:6px;margin-top:12px}
.modal input,.modal textarea{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:.85rem}
.modal input:focus,.modal textarea:focus{outline:none;border-color:var(--purple)}
.modal textarea{min-height:200px;font-family:'Share Tech Mono',monospace;font-size:.75rem;line-height:1.7;resize:vertical}
.modal .hint{font-size:.65rem;color:var(--text-muted);line-height:1.6;margin-top:4px}
.modal .hint code{background:var(--purple-soft);padding:1px 5px;color:var(--neon-cyan);font-size:.6rem}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-btn{padding:8px 22px;border:none;font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .3s}
.modal-btn.primary{background:var(--purple);color:#fff;box-shadow:0 0 12px rgba(155,89,255,.3)}
.modal-btn.primary:hover{background:var(--purple-bright)}
.modal-btn.secondary{background:transparent;border:1px solid var(--border);color:var(--text-muted)}
.modal-btn.secondary:hover{border-color:var(--neon-cyan);color:var(--neon-cyan)}

.footer{text-align:center;padding:20px;font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--text-faint);letter-spacing:2px;border-top:1px solid var(--border)}

@media(max-width:600px){
  .bank-grid{grid-template-columns:1fr}
  .flashcard{min-height:220px}
  .rate-btn{padding:10px 6px;font-size:.72rem;min-width:48px}
  .browse-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<a href="../../projects.html" class="back-link">&larr; 返回项目</a>

<header class="header">
  <div class="header-tag">SPACED REPETITION SYSTEM</div>
  <h1>历史<span>闪卡</span></h1>
  <p class="sub">SM-2 间隔重复 · 自选题库 · 温故知新</p>
</header>

<div class="main">
  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="review">复习</button>
    <button class="tab" data-tab="browse">浏览</button>
    <button class="tab" data-tab="manage">题库管理</button>
  </div>

  <!-- Review view -->
  <div id="viewReview">
    <!-- Bank selector -->
    <div class="bank-section">
      <h3>> SELECT QUESTION BANK</h3>
      <div class="bank-grid" id="bankGrid"></div>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat"><div class="num" id="stDue">0</div><div class="lbl">待复习</div></div>
      <div class="stat"><div class="num" id="stLearn">0</div><div class="lbl">学习中</div></div>
      <div class="stat"><div class="num" id="stMature">0</div><div class="lbl">已掌握</div></div>
      <div class="stat"><div class="num" id="stTotal">0</div><div class="lbl">总卡片</div></div>
    </div>

    <!-- Card area -->
    <div id="cardArea"></div>
  </div>

  <!-- Browse view -->
  <div id="viewBrowse" style="display:none">
    <div class="bank-section">
      <h3>> SELECT BANK TO BROWSE</h3>
      <div class="bank-grid" id="browseBankGrid"></div>
    </div>
    <div class="browse-grid" id="browseGrid"></div>
  </div>

  <!-- Manage view -->
  <div id="viewManage" style="display:none">
    <div style="margin-bottom:20px">
      <button class="modal-btn primary" id="btnNewBank">+ 创建新题库</button>
      <button class="modal-btn secondary" id="btnImport" style="margin-left:8px">导入题库</button>
    </div>
    <div id="manageList"></div>
  </div>
</div>

<!-- New bank modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>> CREATE QUESTION BANK</h3>
    <label>题库名称</label>
    <input type="text" id="bankNameInput" placeholder="例：大二下学期期末考题库">
    <label>描述（可选）</label>
    <input type="text" id="bankDescInput" placeholder="例：中国古代史期末复习">
    <label>卡片内容</label>
    <div class="hint">每张卡片一行，格式：<code>问题 | 答案 | 时期标签（可选）</code><br>例：<code>戊戌变法发生在哪一年？ | 1898年 | 近代史</code></div>
    <textarea id="bankCardsInput" spellcheck="false" placeholder="问题1 | 答案1 | 标签&#10;问题2 | 答案2 | 标签&#10;问题3 | 答案3"></textarea>
    <div class="modal-actions">
      <button class="modal-btn primary" id="btnSaveBank">保存题库</button>
      <button class="modal-btn secondary" id="btnCancelModal">取消</button>
    </div>
  </div>
</div>

<!-- Import modal -->
<div class="modal-overlay" id="importOverlay">
  <div class="modal">
    <h3>> IMPORT BANK</h3>
    <label>粘贴 JSON 数据</label>
    <textarea id="importInput" style="min-height:150px;font-family:'Share Tech Mono',monospace;font-size:.7rem" spellcheck="false" placeholder='[{"q":"问题","a":"答案","era":"标签"}]'></textarea>
    <label>题库名称</label>
    <input type="text" id="importNameInput" placeholder="导入的题库名称">
    <div class="modal-actions">
      <button class="modal-btn primary" id="btnDoImport">导入</button>
      <button class="modal-btn secondary" id="btnCancelImport">取消</button>
    </div>
  </div>
</div>

<footer class="footer">JILLAX · SPACED REPETITION · SM-2 ALGORITHM</footer>

<script>
// ============================================================
//  Built-in Banks
// ============================================================
var BUILT_IN_BANKS = [
  {
    id: 'builtin-china-ancient',
    name: '中国古代史基础',
    desc: '先秦至清末重要知识点',
    builtIn: true,
    cards: [
      {q:'秦始皇统一六国是在哪一年？',a:'公元前221年。秦灭齐完成统一，建立中国历史上第一个大一统中央集权王朝。',era:'先秦'},
      {q:'科举制正式创立于哪个朝代？',a:'隋朝。隋炀帝大业年间设进士科，标志着科举制正式确立。',era:'隋唐'},
      {q:'王安石变法的主要目的是什么？',a:'富国强兵，改变北宋积贫积弱局面。主要措施包括青苗法、免役法、保甲法等。',era:'宋'},
      {q:'郑和下西洋共几次？最远到达哪里？',a:'共7次（1405-1433），最远到达非洲东海岸和红海沿岸。',era:'明'},
      {q:'清朝的"闭关锁国"政策主要指什么？',a:'限制对外贸易，仅保留广州一口通商（1757年起），由公行制度垄断对外贸易。',era:'清'},
      {q:'什么是"编户齐民"？',a:'秦汉时期将百姓编入户籍，使农民直接向国家纳税服役的制度，削弱了贵族对人口的控制。',era:'秦汉'},
      {q:'唐朝三省六部制中三省分别是什么？',a:'中书省（决策）、门下省（审议）、尚书省（执行）。尚书省下设吏、户、礼、兵、刑、工六部。',era:'隋唐'},
      {q:'《资治通鉴》的作者和体例是什么？',a:'北宋司马光主编，编年体通史，记载从战国到五代共1362年历史。',era:'宋'},
    ]
  },
  {
    id: 'builtin-china-modern',
    name: '中国近代史基础',
    desc: '鸦片战争至新中国成立',
    builtIn: true,
    cards: [
      {q:'鸦片战争（1840-1842）的结果和影响？',a:'清政府战败，签订《南京条约》。割让香港岛、开放五口通商、协定关税。中国开始沦为半殖民地半封建社会。',era:'晚清'},
      {q:'太平天国运动的时间和领导人？',a:'1851-1864年，洪秀全领导。定都天京（南京），颁布《天朝田亩制度》。',era:'晚清'},
      {q:'戊戌变法发生在哪一年？持续了多久？',a:'1898年，仅持续103天（百日维新），因慈禧太后发动政变而失败。',era:'晚清'},
      {q:'辛亥革命的历史意义？',a:'推翻了清朝统治，结束了两千多年的封建帝制，建立了中华民国，使民主共和观念深入人心。',era:'民国'},
      {q:'五四运动的导火线是什么？',a:'1919年巴黎和会上中国外交失败。列强将德国在山东的权益转让给日本，引发学生和工人抗议。',era:'民国'},
      {q:'中国共产党成立于哪一年？',a:'1921年7月（一大在上海召开，后转移至嘉兴南湖）。',era:'民国'},
      {q:'遵义会议的历史意义？',a:'1935年1月，确立了毛泽东在党和红军中的领导地位，挽救了党、红军和中国革命。是中共从幼稚走向成熟的标志。',era:'民国'},
      {q:'抗日战争胜利的时间？',a:'1945年8月15日日本宣布无条件投降。9月2日签署投降书。',era:'民国'},
    ]
  },
  {
    id: 'builtin-world',
    name: '世界史核心概念',
    desc: '重要历史事件与概念',
    builtIn: true,
    cards: [
      {q:'文艺复兴的核心思想是什么？',a:'人文主义。强调人的价值和尊严，提倡个性解放和世俗生活。14-16世纪起源于意大利。',era:'世界古代'},
      {q:'法国大革命爆发的标志事件？',a:'1789年7月14日巴黎市民攻占巴士底狱。随后发表《人权宣言》。',era:'世界近代'},
      {q:'工业革命为什么首先发生在英国？',a:'资本积累、劳动力充足（圈地运动）、市场需求、技术条件、政治制度（君主立宪）等多因素共同作用。',era:'世界近代'},
      {q:'马歇尔计划的主要内容和目的？',a:'1948年美国对西欧的经济援助计划。旨在重建欧洲经济、遏制共产主义扩张、为美国商品开辟市场。',era:'世界现代'},
      {q:'什么是"冷战"？起止标志？',a:'二战后美苏两大阵营的全面对峙（1947-1991）。开始标志：杜鲁门主义；结束标志：苏联解体。',era:'世界现代'},
    ]
  }
];

// ============================================================
//  State
// ============================================================
var banks = [];
var currentBankId = null;
var currentCardIdx = 0;
var isFlipped = false;
var progress = {}; // { bankId: { cardIdx: { interval, ease, reps, due } } }

// ============================================================
//  Storage
// ============================================================
function save() {
  localStorage.setItem('fc_banks', JSON.stringify(banks));
  localStorage.setItem('fc_progress', JSON.stringify(progress));
  localStorage.setItem('fc_currentBank', currentBankId);
}
function load() {
  try {
    var sb = localStorage.getItem('fc_banks');
    if (sb) {
      banks = JSON.parse(sb);
      // Merge built-in if missing
      BUILT_IN_BANKS.forEach(function(bb) {
        if (!banks.find(function(b) { return b.id === bb.id; })) banks.push(bb);
      });
    } else {
      banks = JSON.parse(JSON.stringify(BUILT_IN_BANKS));
    }
    var sp = localStorage.getItem('fc_progress');
    if (sp) progress = JSON.parse(sp);
    currentBankId = localStorage.getItem('fc_currentBank') || (banks.length > 0 ? banks[0].id : null);
  } catch(e) {
    banks = JSON.parse(JSON.stringify(BUILT_IN_BANKS));
    progress = {};
    currentBankId = banks[0].id;
  }
}

// ============================================================
//  SM-2 Algorithm
// ============================================================
function sm2(card, quality) {
  // quality: 0=again, 1=hard, 2=good, 3=easy
  var p = card || { interval: 0, ease: 2.5, reps: 0, due: 0 };
  if (quality < 1) {
    p.reps = 0;
    p.interval = 1;
  } else {
    if (p.reps === 0) p.interval = 1;
    else if (p.reps === 1) p.interval = 6;
    else p.interval = Math.round(p.interval * p.ease);
    p.reps++;
  }
  var q = quality + 2; // map 0-3 to 2-5
  p.ease = Math.max(1.3, p.ease + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
  var now = Date.now();
  p.due = now + p.interval * 86400000;
  return p;
}

function getCardProgress(bankId, idx) {
  if (!progress[bankId]) progress[bankId] = {};
  if (!progress[bankId][idx]) progress[bankId][idx] = { interval: 0, ease: 2.5, reps: 0, due: 0 };
  return progress[bankId][idx];
}

// ============================================================
//  Rendering
// ============================================================
function getBank() { return banks.find(function(b) { return b.id === currentBankId; }); }

function renderBankGrid(targetId) {
  var grid = document.getElementById(targetId);
  grid.innerHTML = '';
  banks.forEach(function(bank) {
    var card = document.createElement('div');
    card.className = 'bank-card' + (bank.id === currentBankId ? ' active' : '');
    var count = bank.cards.length;
    var dueCount = 0;
    var now = Date.now();
    bank.cards.forEach(function(c, i) {
      var p = getCardProgress(bank.id, i);
      if (p.due <= now || p.reps === 0) dueCount++;
    });
    card.innerHTML = '<div class="bank-name">' + bank.name + '</div>' +
      '<div class="bank-meta">' + (bank.desc || '') + '</div>' +
      '<div class="bank-count">' + dueCount + '/' + count + '</div>';
    card.addEventListener('click', function() {
      currentBankId = bank.id;
      currentCardIdx = 0;
      save();
      renderBankGrid('bankGrid');
      renderBankGrid('browseBankGrid');
      renderStats();
      renderCard();
    });
    grid.appendChild(card);
  });
}

function renderStats() {
  var bank = getBank();
  if (!bank) return;
  var now = Date.now();
  var due = 0, learning = 0, mature = 0;
  bank.cards.forEach(function(c, i) {
    var p = getCardProgress(bank.id, i);
    if (p.reps === 0) due++;
    else if (p.due <= now) due++;
    else if (p.interval >= 21) mature++;
    else learning++;
  });
  document.getElementById('stDue').textContent = due;
  document.getElementById('stLearn').textContent = learning;
  document.getElementById('stMature').textContent = mature;
  document.getElementById('stTotal').textContent = bank.cards.length;
}

function getNextCardIdx() {
  var bank = getBank();
  if (!bank) return -1;
  var now = Date.now();
  var dueCards = [];
  bank.cards.forEach(function(c, i) {
    var p = getCardProgress(bank.id, i);
    if (p.reps === 0 || p.due <= now) dueCards.push(i);
  });
  if (dueCards.length === 0) return -1;
  return dueCards[Math.floor(Math.random() * dueCards.length)];
}

function renderCard() {
  var area = document.getElementById('cardArea');
  var bank = getBank();
  if (!bank) { area.innerHTML = '<div class="review-done"><div class="done-icon">📋</div><div class="done-text">请先选择题库</div></div>'; return; }

  var idx = getNextCardIdx();
  if (idx === -1) {
    area.innerHTML = '<div class="review-done">' +
      '<div class="done-icon">✦</div>' +
      '<div class="done-text">今日复习已全部完成</div>' +
      '<div class="done-sub">保持在场，明天继续。</div></div>';
    return;
  }

  var card = bank.cards[idx];
  var p = getCardProgress(bank.id, idx);
  isFlipped = false;

  area.innerHTML = '<div class="fc-wrap">' +
    '<div class="flashcard" id="flashcard">' +
      '<div class="fc-face fc-front">' +
        '<div class="fc-era">' + (card.era || bank.name) + '</div>' +
        '<div class="fc-type">' + (p.reps === 0 ? 'NEW' : p.interval >= 21 ? 'MATURE' : 'REVIEW') + '</div>' +
        '<div class="fc-q">' + card.q + '</div>' +
        '<div class="fc-hint">> CLICK TO REVEAL</div>' +
      '</div>' +
      '<div class="fc-face fc-back">' +
        '<div class="fc-back-title">' + card.q + '</div>' +
        '<div class="fc-back-era">' + (card.era || '') + '</div>' +
        '<div class="fc-back-body">' + card.a + '</div>' +
      '</div>' +
    '</div>' +
  '</div>' +
  '<div class="rating-bar" id="ratingBar" style="display:none">' +
    '<button class="rate-btn again" data-q="0">重来<span class="rate-lbl"><1分</span></button>' +
    '<button class="rate-btn hard" data-q="1">困难<span class="rate-lbl">' + Math.max(1, Math.round(p.interval * 0.5)) + '天</span></button>' +
    '<button class="rate-btn good" data-q="2">良好<span class="rate-lbl">' + (p.reps === 0 ? '1天' : Math.round(p.interval * p.ease) + '天') + '</span></button>' +
    '<button class="rate-btn easy" data-q="3">简单<span class="rate-lbl">' + Math.round((p.reps === 0 ? 4 : p.interval * p.ease * 1.3)) + '天</span></button>' +
  '</div>';

  var fc = document.getElementById('flashcard');
  fc.addEventListener('click', function() {
    if (!isFlipped) {
      fc.classList.add('flipped');
      isFlipped = true;
      document.getElementById('ratingBar').style.display = 'flex';
    }
  });

  document.querySelectorAll('#ratingBar .rate-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var quality = parseInt(this.dataset.q);
      progress[bank.id][idx] = sm2(p, quality);
      save();
      renderStats();
      renderCard();
    });
  });
}

// ============================================================
//  Browse
// ============================================================
function renderBrowse() {
  var grid = document.getElementById('browseGrid');
  var bank = getBank();
  if (!bank) { grid.innerHTML = '<div class="review-done"><div class="done-text">请先选择题库</div></div>'; return; }

  grid.innerHTML = bank.cards.map(function(card, i) {
    var p = getCardProgress(bank.id, i);
    var mClass = p.reps === 0 ? 'm-new' : p.interval >= 21 ? 'm-mature' : p.interval >= 1 ? 'm-review' : 'm-learning';
    return '<div class="b-card" data-idx="' + i + '">' +
      '<div class="b-card-mastery ' + mClass + '"></div>' +
      '<div class="b-card-era">' + (card.era || bank.name) + '<span class="b-card-type">' + (p.reps === 0 ? 'NEW' : p.interval + 'd') + '</span></div>' +
      '<div class="b-card-title">' + card.q + '</div>' +
      '<div class="b-card-preview">' + card.a + '</div>' +
    '</div>';
  }).join('');

  grid.querySelectorAll('.b-card').forEach(function(el) {
    el.addEventListener('click', function() {
      var idx = parseInt(this.dataset.idx);
      var card = bank.cards[idx];
      alert(card.q + '\n\n' + card.a);
    });
  });
}

// ============================================================
//  Manage
// ============================================================
function renderManage() {
  var list = document.getElementById('manageList');
  list.innerHTML = banks.map(function(bank) {
    return '<div style="border:1px solid var(--border);padding:16px;margin-bottom:10px;background:var(--bg-card)">' +
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<div><strong style="color:var(--text)">' + bank.name + '</strong>' +
        '<div style="font-family:Share Tech Mono,monospace;font-size:.6rem;color:var(--text-faint);letter-spacing:1px;margin-top:2px">' + bank.cards.length + ' 张卡片 · ' + (bank.desc || '') + '</div></div>' +
        (bank.builtIn ? '<span style="font-family:Share Tech Mono,monospace;font-size:.55rem;color:var(--neon-cyan);letter-spacing:1px">BUILT-IN</span>' :
          '<button class="modal-btn secondary" data-del="' + bank.id + '" style="font-size:.6rem;padding:4px 12px;border-color:rgba(255,107,138,.3);color:var(--red)">删除</button>') +
      '</div></div>';
  }).join('');

  list.querySelectorAll('[data-del]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = this.dataset.del;
      if (confirm('确认删除此题库？')) {
        banks = banks.filter(function(b) { return b.id !== id; });
        delete progress[id];
        if (currentBankId === id) currentBankId = banks.length > 0 ? banks[0].id : null;
        save();
        renderManage();
        renderBankGrid('bankGrid');
        renderBankGrid('browseBankGrid');
      }
    });
  });
}

// ============================================================
//  Create bank
// ============================================================
function createBank(name, desc, cardsText) {
  var cards = cardsText.trim().split('\n').filter(function(l) { return l.trim(); }).map(function(line) {
    var parts = line.split('|').map(function(s) { return s.trim(); });
    return { q: parts[0] || '未命名', a: parts[1] || '', era: parts[2] || '' };
  });
  if (cards.length === 0) return;
  var id = 'custom-' + Date.now();
  banks.push({ id: id, name: name, desc: desc, cards: cards });
  currentBankId = id;
  save();
  renderBankGrid('bankGrid');
  renderBankGrid('browseBankGrid');
  renderManage();
  renderStats();
  renderCard();
}

// ============================================================
//  Events
// ============================================================
document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    this.classList.add('active');
    var view = this.dataset.tab;
    document.getElementById('viewReview').style.display = view === 'review' ? '' : 'none';
    document.getElementById('viewBrowse').style.display = view === 'browse' ? '' : 'none';
    document.getElementById('viewManage').style.display = view === 'manage' ? '' : 'none';
    if (view === 'browse') renderBrowse();
    if (view === 'manage') renderManage();
  });
});

document.getElementById('btnNewBank').addEventListener('click', function() {
  document.getElementById('modalOverlay').classList.add('open');
});
document.getElementById('btnCancelModal').addEventListener('click', function() {
  document.getElementById('modalOverlay').classList.remove('open');
});
document.getElementById('btnSaveBank').addEventListener('click', function() {
  var name = document.getElementById('bankNameInput').value.trim();
  if (!name) { alert('请输入题库名称'); return; }
  var desc = document.getElementById('bankDescInput').value.trim();
  var cardsText = document.getElementById('bankCardsInput').value;
  if (!cardsText.trim()) { alert('请输入至少一张卡片'); return; }
  createBank(name, desc, cardsText);
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('bankNameInput').value = '';
  document.getElementById('bankDescInput').value = '';
  document.getElementById('bankCardsInput').value = '';
});

document.getElementById('btnImport').addEventListener('click', function() {
  document.getElementById('importOverlay').classList.add('open');
});
document.getElementById('btnCancelImport').addEventListener('click', function() {
  document.getElementById('importOverlay').classList.remove('open');
});
document.getElementById('btnDoImport').addEventListener('click', function() {
  try {
    var data = JSON.parse(document.getElementById('importInput').value);
    var name = document.getElementById('importNameInput').value.trim() || '导入的题库';
    var cards = data.map(function(item) { return { q: item.q || item.question || '', a: item.a || item.answer || '', era: item.era || item.tag || '' }; });
    var id = 'custom-' + Date.now();
    banks.push({ id: id, name: name, desc: '导入题库', cards: cards });
    currentBankId = id;
    save();
    renderBankGrid('bankGrid');
    renderBankGrid('browseBankGrid');
    renderManage();
    renderStats();
    renderCard();
    document.getElementById('importOverlay').classList.remove('open');
  } catch(e) {
    alert('JSON 格式错误：' + e.message);
  }
});

// Keyboard: Space to flip, 1-4 to rate
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  var fc = document.getElementById('flashcard');
  if (!fc) return;
  if (e.key === ' ' && !isFlipped) {
    e.preventDefault();
    fc.click();
  }
  if (isFlipped && e.key >= '1' && e.key <= '4') {
    var btn = document.querySelector('#ratingBar .rate-btn[data-q="' + (parseInt(e.key) - 1) + '"]');
    if (btn) btn.click();
  }
});

// ============================================================
//  Init
// ============================================================
load();
renderBankGrid('bankGrid');
renderBankGrid('browseBankGrid');
renderStats();
renderCard();
</script>
</body>
