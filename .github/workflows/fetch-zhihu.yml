name: 同步知乎想法

on:
  schedule:
    # 每天 UTC 6:00 (北京时间 14:00) 运行
    - cron: '0 6 * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Playwright
        run: |
          npm install playwright
          npm install -g playwright

      - name: 安装 Chromium 浏览器
        run: npx playwright install chromium

      - name: 安装系统依赖
        run: sudo -E npx playwright install-deps chromium

      - name: 抓取知乎想法
        env:
          ZHIHU_COOKIE: ${{ secrets.ZHIHU_COOKIE }}
        run: node scripts/fetch-zhihu.mjs

      - name: 提交更新
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add data/zhihu.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 同步知乎想法" && git push)