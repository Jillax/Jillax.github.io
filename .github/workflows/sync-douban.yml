name: 同步豆瓣书影音数据

on:
  schedule:
    # 每天 UTC 时间 11:00 运行（北京时间 19:00）
    - cron: '0 11 * * *'
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4

      - name: 运行抓取脚本
        env:
          DOUBAN_USER_ID: ${{ vars.DOUBAN_USER_ID || '233706855' }}
          DOUBAN_COOKIE: ${{ secrets.DOUBAN_COOKIE }}
        run: |
          python scripts/fetch_douban.py

      - name: 提交更新
        run: |
          git config user.name "douban-sync[bot]"
          git config user.email "douban-sync[bot]@users.noreply.github.com"
          git add data/bookshelf.json
          if git diff --cached --quiet; then
            echo "无数据变更，跳过提交"
          else
            git commit -m "chore: 同步豆瓣书影音数据 $(date +'%Y-%m-%d')"
            git push
          fi