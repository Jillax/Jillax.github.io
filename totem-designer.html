<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>民族图腾纹样 · 手工DIY设计坊</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: "PingFang SC", "Microsoft YaHei", "Noto Serif SC", serif; }
body { background: #1a0a0a; color: #f0e6d3; }
:root { --red: #8b1a1a; --gold: #c8a45c; }
.page {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.6s ease, transform 0.6s ease;
  opacity: 0; transform: translateX(100%); pointer-events: none;
  overflow-y: auto; overflow-x: hidden;
}
.page.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
.page.exit-left { opacity: 0; transform: translateX(-100%); }

#welcome { background: linear-gradient(180deg, #1a0a0a 0%, #2d1010 30%, #1a0a0a 100%); text-align: center; padding: 2rem 1.5rem; }
.welcome-border { position: absolute; top: 12px; left: 12px; right: 12px; bottom: 12px; border: 2px solid var(--gold); border-radius: 8px; pointer-events: none; }
.welcome-border::before { content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; border: 1px solid rgba(200,164,92,0.3); border-radius: 6px; }
.welcome-corner { position: absolute; width: 20px; height: 20px; border-color: var(--gold); border-style: solid; }
.welcome-corner.tl { top: 8px; left: 8px; border-width: 3px 0 0 3px; }
.welcome-corner.tr { top: 8px; right: 8px; border-width: 3px 3px 0 0; }
.welcome-corner.bl { bottom: 8px; left: 8px; border-width: 0 0 3px 3px; }
.welcome-corner.br { bottom: 8px; right: 8px; border-width: 0 3px 3px 0; }
.welcome-icon { width: 100px; height: 100px; margin: 0 auto 1.5rem; animation: floatUp 3s ease-in-out infinite; }
@keyframes floatUp { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.welcome-title { font-size: 1.8rem; color: var(--gold); margin-bottom: 0.5rem; text-shadow: 0 0 20px rgba(200,164,92,0.3); letter-spacing: 4px; }
.welcome-subtitle { font-size: 1rem; color: rgba(200,164,92,0.7); margin-bottom: 2rem; letter-spacing: 2px; line-height: 1.8; }
.welcome-desc { font-size: 0.85rem; color: rgba(240,230,211,0.6); line-height: 1.8; max-width: 300px; margin: 0 auto 2.5rem; padding: 1rem; border-top: 1px solid rgba(200,164,92,0.2); border-bottom: 1px solid rgba(200,164,92,0.2); }
.btn-start { display: inline-block; padding: 14px 48px; background: linear-gradient(135deg, var(--red), #a02020); color: var(--gold); font-size: 1.1rem; letter-spacing: 4px; border: 1px solid var(--gold); border-radius: 30px; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
.btn-start::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(200,164,92,0.15) 0%, transparent 70%); animation: shimmer 2s ease-in-out infinite; }
@keyframes shimmer { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }
.btn-start:active { transform: scale(0.95); }
.welcome-footer { position: absolute; bottom: 20px; font-size: 0.7rem; color: rgba(200,164,92,0.3); letter-spacing: 1px; }

#designer { background: linear-gradient(180deg, #1a0a0a 0%, #221212 100%); justify-content: flex-start; padding: 0; }
.designer-header { width: 100%; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; background: rgba(26,10,10,0.95); border-bottom: 1px solid rgba(200,164,92,0.2); flex-shrink: 0; z-index: 10; }
.header-title { font-size: 1rem; color: var(--gold); letter-spacing: 2px; }
.header-actions { display: flex; gap: 12px; }
.header-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(200,164,92,0.4); background: rgba(139,26,26,0.3); color: var(--gold); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; transition: all 0.2s; }
.header-btn:active { background: rgba(139,26,26,0.6); transform: scale(0.9); }
.clothing-selector { width: 100%; padding: 10px 12px; display: flex; gap: 10px; overflow-x: auto; flex-shrink: 0; background: rgba(26,10,10,0.8); border-bottom: 1px solid rgba(200,164,92,0.1); scrollbar-width: none; }
.clothing-selector::-webkit-scrollbar { display: none; }
.clothing-item { flex-shrink: 0; width: 70px; height: 70px; border: 2px solid rgba(200,164,92,0.2); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; background: rgba(62,39,35,0.3); }
.clothing-item.active { border-color: var(--gold); background: rgba(139,26,26,0.4); box-shadow: 0 0 12px rgba(200,164,92,0.2); }
.clothing-item:active { transform: scale(0.92); }
.clothing-item canvas { width: 40px; height: 40px; }
.clothing-item span { font-size: 0.65rem; color: rgba(240,230,211,0.6); margin-top: 2px; }
.canvas-container { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; min-height: 0; }
#designCanvas { background: rgba(30,15,15,0.5); border-radius: 8px; touch-action: none; }
.canvas-hint { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: rgba(200,164,92,0.4); pointer-events: none; white-space: nowrap; }
.pattern-panel { width: 100%; flex-shrink: 0; background: rgba(26,10,10,0.95); border-top: 1px solid rgba(200,164,92,0.2); padding: 8px 0; }
.pattern-label { font-size: 0.75rem; color: rgba(200,164,92,0.6); padding: 4px 16px 6px; letter-spacing: 1px; }
.pattern-list { display: flex; gap: 10px; padding: 0 12px 6px; overflow-x: auto; scrollbar-width: none; }
.pattern-list::-webkit-scrollbar { display: none; }
.pattern-item { flex-shrink: 0; width: 64px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.3s; }
.pattern-item:active { transform: scale(0.9); }
.pattern-icon { width: 56px; height: 56px; border-radius: 8px; border: 2px solid rgba(200,164,92,0.2); background: rgba(62,39,35,0.4); display: flex; align-items: center; justify-content: center; transition: all 0.3s; overflow: hidden; }
.pattern-item.selected .pattern-icon { border-color: var(--gold); background: rgba(139,26,26,0.5); box-shadow: 0 0 10px rgba(200,164,92,0.3); }
.pattern-icon canvas { width: 44px; height: 44px; }
.pattern-name { font-size: 0.6rem; color: rgba(240,230,211,0.5); margin-top: 3px; text-align: center; max-width: 64px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tool-bar { width: 100%; padding: 8px 16px 12px; display: flex; justify-content: center; gap: 16px; flex-shrink: 0; background: rgba(26,10,10,0.95); padding-bottom: max(12px, env(safe-area-inset-bottom)); }
.tool-btn { padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; border: 1px solid rgba(200,164,92,0.3); background: rgba(62,39,35,0.4); color: var(--gold); cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
.tool-btn:active { background: rgba(139,26,26,0.5); transform: scale(0.93); }
.tool-btn.primary { background: linear-gradient(135deg, var(--red), #a02020); border-color: var(--gold); }

#result { background: linear-gradient(180deg, #1a0a0a 0%, #2d1010 30%, #1a0a0a 100%); text-align: center; padding: 2rem 1.5rem; }
.result-title { font-size: 1.4rem; color: var(--gold); margin-bottom: 1rem; letter-spacing: 3px; }
.result-canvas-wrap { position: relative; display: inline-block; margin-bottom: 1.5rem; border: 3px solid var(--gold); border-radius: 10px; overflow: hidden; box-shadow: 0 0 30px rgba(200,164,92,0.15); }
#resultCanvas { display: block; max-width: 280px; height: auto; }
.result-info { font-size: 0.8rem; color: rgba(240,230,211,0.6); line-height: 1.8; margin-bottom: 2rem; max-width: 300px; margin-left: auto; margin-right: auto; }
.result-info strong { color: var(--gold); }
.result-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.result-btn { padding: 12px 32px; border-radius: 25px; font-size: 0.9rem; border: 1px solid var(--gold); cursor: pointer; transition: all 0.3s; letter-spacing: 2px; }
.result-btn.save { background: linear-gradient(135deg, var(--red), #a02020); color: var(--gold); }
.result-btn.restart { background: rgba(62,39,35,0.4); color: var(--gold); }
.result-btn:active { transform: scale(0.93); }
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: rgba(26,10,10,0.95); color: var(--gold); padding: 14px 28px; border-radius: 10px; border: 1px solid var(--gold); font-size: 0.85rem; letter-spacing: 1px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100; white-space: nowrap; }
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.anim-in { animation: fadeInUp 0.6s ease forwards; }
.anim-d1 { animation-delay: 0.1s; opacity: 0; }
.anim-d2 { animation-delay: 0.2s; opacity: 0; }
.anim-d3 { animation-delay: 0.3s; opacity: 0; }
.anim-d4 { animation-delay: 0.4s; opacity: 0; }
</style>
</head>
<body>

<!-- ===== WELCOME ===== -->
<div id="welcome" class="page active">
  <div class="welcome-border"></div>
  <div class="welcome-corner tl"></div><div class="welcome-corner tr"></div>
  <div class="welcome-corner bl"></div><div class="welcome-corner br"></div>
  <div class="welcome-icon anim-in">
    <svg viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="45" stroke="#c8a45c" stroke-width="1.5" stroke-dasharray="4 4"/><circle cx="50" cy="50" r="35" stroke="#c8a45c" stroke-width="1" opacity="0.5"/><path d="M50 15C55 15 65 20 60 30C70 25 75 35 65 40C75 40 75 55 60 55C65 65 55 70 50 65C45 70 35 65 40 55C25 55 25 40 35 40C25 35 30 25 40 30C35 20 45 15 50 15Z" stroke="#c8a45c" stroke-width="1.5" fill="rgba(200,164,92,0.1)"/><circle cx="50" cy="40" r="6" stroke="#c8a45c" stroke-width="1" fill="rgba(200,164,92,0.15)"/><path d="M10 10L25 10M10 10L10 25" stroke="#c8a45c" stroke-width="2"/><path d="M90 10L75 10M90 10L90 25" stroke="#c8a45c" stroke-width="2"/><path d="M10 90L25 90M10 90L10 75" stroke="#c8a45c" stroke-width="2"/><path d="M90 90L75 90M90 90L90 75" stroke="#c8a45c" stroke-width="2"/></svg>
  </div>
  <h1 class="welcome-title anim-in anim-d1">图腾纹样 · DIY坊</h1>
  <p class="welcome-subtitle anim-in anim-d2">指尖上的民族美学</p>
  <p class="welcome-desc anim-in anim-d3">选择一件服饰，将千年传承的民族图腾纹样<br>自由搭配、拼贴设计<br>创造属于你的纹样手工制品</p>
  <div class="btn-start anim-in anim-d4" id="btnStart">开始设计</div>
  <div class="welcome-footer">民族图腾纹样互动体验</div>
</div>

<!-- ===== DESIGNER ===== -->
<div id="designer" class="page">
  <div class="designer-header">
    <span class="header-title">纹样设计坊</span>
  </div>
  <div class="clothing-selector" id="clothingSelector"></div>
  <div class="canvas-container" id="canvasContainer">
    <canvas id="designCanvas"></canvas>
    <div class="canvas-hint" id="canvasHint">选择纹样，点击服饰区域放置</div>
  </div>
  <div class="pattern-panel">
    <div class="pattern-label">◆ 选择纹样（点击后在上方放置）</div>
    <div class="pattern-list" id="patternList"></div>
  </div>
  <div class="tool-bar">
    <div class="tool-btn" id="btnUndo">撤销</div>
    <div class="tool-btn" id="btnClearAll">清除</div>
    <div class="tool-btn primary" id="btnFinish">完成设计</div>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div id="result" class="page">
  <h2 class="result-title">✦ 你的纹样作品 ✦</h2>
  <div class="result-canvas-wrap"><canvas id="resultCanvas"></canvas></div>
  <div class="result-info" id="resultInfo"></div>
  <div class="result-btns">
    <div class="result-btn save" id="btnSave">保存图片</div>
    <div class="result-btn restart" id="btnRestart">重新设计</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== UTILITY ====================
function drawSmoothLine(ctx, points, closed) {
  if (points.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) {
    const xc = (points[i][0] + points[i - 1][0]) / 2;
    const yc = (points[i][1] + points[i - 1][1]) / 2;
    ctx.quadraticCurveTo(points[i - 1][0], points[i - 1][1], xc, yc);
  }
  const last = points[points.length - 1];
  ctx.lineTo(last[0], last[1]);
  if (closed) ctx.closePath();
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ==================== PATTERNS (纹样) ====================
const PATTERNS = [
  {
    name: '云纹', desc: '寓意高升、如意，象征吉祥绵延',
    draw: function(ctx, cx, cy, size) {
      ctx.save();
      const s = size * 0.45;
      ctx.strokeStyle = '#c8a45c';
      ctx.lineWidth = 1.8;
      ctx.fillStyle = 'rgba(200,164,92,0.08)';
      // Main cloud body
      const pts = [
        [cx - s*0.9, cy + s*0.05],
        [cx - s*0.85, cy - s*0.25],
        [cx - s*0.6, cy - s*0.5],
        [cx - s*0.3, cy - s*0.55],
        [cx, cy - s*0.45],
        [cx + s*0.25, cy - s*0.55],
        [cx + s*0.55, cy - s*0.45],
        [cx + s*0.75, cy - s*0.2],
        [cx + s*0.85, cy + s*0.05],
        [cx + s*0.7, cy + s*0.3],
        [cx + s*0.4, cy + s*0.4],
        [cx + s*0.1, cy + s*0.35],
        [cx - s*0.2, cy + s*0.45],
        [cx - s*0.5, cy + s*0.35],
        [cx - s*0.75, cy + s*0.2],
      ];
      drawSmoothLine(ctx, pts, true);
      ctx.fill(); ctx.stroke();
      // Inner swirls
      ctx.lineWidth = 1.2;
      ctx.strokeStyle = 'rgba(200,164,92,0.5)';
      ctx.beginPath();
      ctx.arc(cx - s*0.2, cy - s*0.1, s*0.18, Math.PI*0.8, Math.PI*2.2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx + s*0.3, cy - s*0.05, s*0.15, Math.PI*0.5, Math.PI*2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy + s*0.15, s*0.12, Math.PI*1.2, Math.PI*2.8);
      ctx.stroke();
      ctx.restore();
    }
  },
  {
    name: '回纹', desc: '寓意富贵连绵，象征永恒不断',
    draw: function(ctx, cx, cy, size) {
      ctx.save();
      const s = size * 0.4;
      ctx.strokeStyle = '#c8a45c';
      ctx.lineWidth = 2;
      ctx.fillStyle = 'rgba(200,164,92,0.06)';
      // Outer frame
      ctx.strokeRect(cx-s, cy-s, s*2, s*2);
      ctx.fillRect(cx-s, cy-s, s*2, s*2);
      // Layer 1 - 3 nested squares with connecting lines
      const g = s * 0.25;
      ctx.lineWidth = 1.8;
      // Top connection
      ctx.beginPath();
      ctx.moveTo(cx - s + g, cy - s + g);
      ctx.lineTo(cx + s - g, cy - s + g);
      ctx.lineTo(cx + s - g, cy + s - g);
      ctx.stroke();
      // Right connection
      ctx.beginPath();
      ctx.moveTo(cx + s - g*2, cy + s - g);
      ctx.lineTo(cx + s - g*2, cy - s + g*2);
      ctx.stroke();
      // Inner square
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx - s + g*2, cy + s - g);
      ctx.lineTo(cx - s + g*2, cy + s - g*2);
      ctx.lineTo(cx - s + g*3, cy + s - g*2);
      ctx.stroke();
      // Bottom connection
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(cx - s + g, cy + s - g);
      ctx.lineTo(cx - s + g, cy + s - g*2);
      ctx.stroke();
      // Decorative dots at corners
      const corners = [[cx-s+3,cy-s+3],[cx+s-3,cy-s+3],[cx+s-3,cy+s-3],[cx-s+3,cy+s-3]];
      corners.forEach(([x,y]) => { ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2); ctx.fillStyle='rgba(200,164,92,0.3)'; ctx.fill(); });
      ctx.restore();
    }
  },
  {
    name: '饕餮纹', desc: '青铜器经典纹饰，象征威严与力量',
    draw: function(ctx, cx, cy, size) {
      ctx.save();
      const s = size * 0.42;
      ctx.strokeStyle = '#c8a45c';
      ctx.lineWidth = 2;
      ctx.fillStyle = 'rgba(200,164,92,0.06)';
      // Outer frame (青铜器形)
      ctx.beginPath();
      ctx.moveTo(cx - s, cy - s*0.8);
      ctx.lineTo(cx - s*0.8, cy - s);
      ctx.lineTo(cx + s*0.8, cy - s);
      ctx.lineTo(cx + s, cy - s*0.8);
      ctx.lineTo(cx + s, cy + s*0.8);
      ctx.lineTo(cx + s*0.8, cy + s);
      ctx.lineTo(cx - s*0.8, cy + s);
      ctx.lineTo(cx - s, cy + s*0.8);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // Eyes (larger, more detailed)
      ctx.lineWidth = 1.8;
      [[-1, 1], [1, 1]].forEach(([dx]) => {
        ctx.beginPath();
        ctx.ellipse(cx + dx*s*0.38, cy - s*0.15, s*0.22, s*0.28, 0, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
        // Pupil
        ctx.beginPath();
        ctx.arc(cx + dx*s*0.38, cy - s*0.15, s*0.08, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(200,164,92,0.25)';
        ctx.fill();
        ctx.fillStyle = 'rgba(200,164,92,0.06)';
      });
      // Nose bridge
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx, cy - s*0.5);
      ctx.lineTo(cx - s*0.12, cy - s*0.1);
      ctx.lineTo(cx + s*0.12, cy - s*0.1);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // Nose tip
      ctx.beginPath();
      ctx.ellipse(cx, cy + s*0.05, s*0.1, s*0.06, 0, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
      // Mouth (grinning)
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(cx - s*0.55, cy + s*0.35);
      ctx.quadraticCurveTo(cx - s*0.3, cy + s*0.55, cx, cy + s*0.4);
      ctx.quadraticCurveTo(cx + s*0.3, cy + s*0.55, cx + s*0.55, cy + s*0.35);
      ctx.stroke();
      // Fangs
      ctx.lineWidth = 1.5;
      [[-1,1]].forEach(([dx]) => {
        ctx.beginPath();
        ctx.moveTo(cx + dx*s*0.35, cy + s*0.35);
        ctx.lineTo(cx + dx*s*0.3, cy + s*0.55);
        ctx.lineTo(cx + dx*s*0.25, cy + s*0.38);
        ctx.stroke();
      });
      // Horns (spiraling)
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - s*0.55, cy - s*0.6);
      ctx.bezierCurveTo(cx - s*0.85, cy - s*1.0, cx - s*0.5, cy - s*1.1, cx - s*0.2, cy - s*0.7);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + s*0.55, cy - s*0.6);
      ctx.bezierCurveTo(cx + s*0.85, cy - s*1.0, cx + s*0.5, cy - s*1.1, cx + s*0.2, cy - s*0.7);
      ctx.stroke();
      // Thunder pattern (雷纹) fills in corners
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(200,164,92,0.3)';
      [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(([dx,dy]) => {
        const ox = cx + dx*s*0.6, oy = cy + dy*s*0.6;
        ctx.strokeRect(ox-3, oy-3, 6, 6);
        ctx.strokeRect(ox-5, oy-5, 10, 10);
      });
      ctx.restore();
    }
  },
  {
    name: '莲花纹', desc: '佛教圣洁之花，寓意纯洁与超脱',
    draw: function(ctx, cx, cy, size) {
      ctx.save();
      const s = size * 0.45;
      ctx.strokeStyle = '#c8a45c';
      ctx.lineWidth = 1.5;
      // Outer petals (8, larger, more curved)
      for (let i = 0; i < 8; i++) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(i * Math.PI / 4);
        ctx.fillStyle = 'rgba(200,164,92,0.05)';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(-s*0.18, -s*0.3, -s*0.15, -s*0.8, 0, -s*0.9);
        ctx.bezierCurveTo(s*0.15, -s*0.8, s*0.18, -s*0.3, 0, 0);
        ctx.fill(); ctx.stroke();
        // Petal vein
        ctx.lineWidth = 0.8;
        ctx.strokeStyle = 'rgba(200,164,92,0.3)';

          const ox = cx + i * s * 0.8;
          const oy = cy + j * s * 0.8;
          ctx.fillStyle = `rgba(200,164,92,${(i+j)%2===0 ? 0.08 : 0.04})`;
          ctx.beginPath();
          ctx.moveTo(ox, oy - s*0.35);
          ctx.lineTo(ox + s*0.35, oy);
          ctx.lineTo(ox, oy + s*0.35);
          ctx.lineTo(ox - s*0.35, oy);
          ctx.closePath();
          ctx.fill(); ctx.stroke();
          // Inner flower
          if (Math.abs(i) + Math.abs(j) <= 1) {
            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(200,164,92,0.5)';
            for (let k = 0; k < 4; k++) {
              ctx.save();

              ctx.ellipse(0, -s*0.15, s*0.06, s*0.15, 0, 0, Math.PI*2);

        const oy = cy + i * s * 0.25;
        const alpha = 0.15 + 0.08 * (3 - Math.abs(i)) / 3;
        ctx.strokeStyle = `rgba(200,164,92,${alpha + 0.3})`;
        ctx.fillStyle = `rgba(200,164,92,${alpha * 0.15})`;
        ctx.beginPath();
        const wave = s * 0.08 * (1 + Math.abs(i) * 0.2);
        for (let x = -s; x <= s; x += 2) {
          const wx = cx + x;
          const wy = oy + Math.sin(x * 0.08 + i * 0.5) * wave;
          if (x === -s) ctx.moveTo(wx, wy);
          else ctx.lineTo(wx, wy);
        }
        ctx.stroke();

      ctx.strokeStyle = 'rgba(200,164,92,0.25)';

        ctx.beginPath();
        ctx.arc(cx, cy, r, Math.PI*0.1, Math.PI*0.9);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, r, Math.PI*1.1, Math.PI*1.9);
        ctx.stroke();
      });
      ctx.restore();
    }

      const towelGrad = ctx.createLinearGradient(lx, ly, lx + tw, ly + th);
      towelGrad.addColorStop(0, 'rgba(240,230,211,0.07)');
      towelGrad.addColorStop(0.5, 'rgba(240,230,211,0.05)');
      towelGrad.addColorStop(1, 'rgba(240,230,211,0.03)');
      ctx.fillStyle = towelGrad;
      ctx.strokeStyle = 'rgba(200,164,92,0.5)';
      ctx.lineWidth = 2;
      const r = 8;
      ctx.beginPath();
      ctx.moveTo(lx + r, ly);
      ctx.lineTo(lx + tw - r, ly);
      ctx.quadraticCurveTo(lx + tw, ly, lx + tw, ly + r);
      ctx.lineTo(lx + tw, ly + th - r);
      ctx.quadraticCurveTo(lx + tw, ly + th, lx + tw - r, ly + th);
      ctx.lineTo(lx + r, ly + th);
      ctx.quadraticCurveTo(lx, ly + th, lx, ly + th - r);
      ctx.lineTo(lx, ly + r);
      ctx.quadraticCurveTo(lx, ly, lx + r, ly);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // Terry cloth texture (small loops)
      ctx.lineWidth = 0.5;
      ctx.strokeStyle = 'rgba(200,164,92,0.08)';
      for (let row = 0; row < 15; row++) {
        for (let col = 0; col < 10; col++) {
          const px = lx + 12 + col * (tw - 24) / 9;
          const py = ly + 12 + row * (th - 24) / 14;
          if (px > lx + tw - 8 || py > ly + th - 8) continue;
          ctx.beginPath();
          ctx.arc(px, py, 3, 0, Math.PI, true);
          ctx.stroke();
        }
      }
      // Stripe bands
      ctx.lineWidth = 1.5;
      for (let i = 1; i <= 2; i++) {
        const y = ly + th * i / 3;
        ctx.strokeStyle = 'rgba(200,164,92,0.3)';
        ctx.beginPath(); ctx.moveTo(lx + 6, y); ctx.lineTo(lx + tw - 6, y); ctx.stroke();
        ctx.strokeStyle = 'rgba(200,164,92,0.15)';
        ctx.beginPath(); ctx.moveTo(lx + 6, y + 4); ctx.lineTo(lx + tw - 6, y + 4); ctx.stroke();
      }
      // Border decoration
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(200,164,92,0.2)';
      ctx.strokeRect(lx + 4, ly + 4, tw - 8, th - 8);
      // Fringe at bottom
      ctx.lineWidth = 1.2;
      ctx.strokeStyle = 'rgba(200,164,92,0.35)';
      for (let i = 0; i < 12; i++) {
        const x = lx + 8 + i * (tw - 16) / 11;
        ctx.beginPath();
        ctx.moveTo(x, ly + th);
        ctx.quadraticCurveTo(x + (i%2?2:-2), ly + th + 10, x + (i%2?1:-1), ly + th + 15);
        ctx.stroke();
      }
      // Label tag
      ctx.fillStyle = 'rgba(200,164,92,0.08)';
      ctx.strokeStyle = 'rgba(200,164,92,0.3)';
      ctx.lineWidth = 1;
      ctx.fillRect(lx + tw - 20, ly + 6, 14, 18);
      ctx.strokeRect(lx + tw - 20, ly + 6, 14, 18);
      ctx.restore();
    },
    bound: { x: 0.15, y: 0.12, w: 0.7, h: 0.72 }
  }
];

// ==================== STATE ====================
let currentCloth = 0;
let selectedPattern = -1;
let placedItems = [];
let redoStack = [];
let canvasW, canvasH;

// ==================== DOM ====================
const welcomePage = document.getElementById('welcome');
const designerPage = document.getElementById('designer');
const resultPage = document.getElementById('result');
const canvas = document.getElementById('designCanvas');
const ctx = canvas.getContext('2d');
const resultCanvas = document.getElementById('resultCanvas');
const rctx = resultCanvas.getContext('2d');
const toast = document.getElementById('toast');

// ==================== INIT ====================
function init() {
  buildClothingSelector();
  buildPatternList();
  setupCanvas();
}

function buildClothingSelector() {
  const container = document.getElementById('clothingSelector');
  container.innerHTML = '';
  CLOTHES.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'clothing-item' + (i === 0 ? ' active' : '');
    const miniCanvas = document.createElement('canvas');
    miniCanvas.width = 80; miniCanvas.height = 80;
    const mctx = miniCanvas.getContext('2d');
    c.draw(mctx, 80, 80);
    div.appendChild(miniCanvas);
    const span = document.createElement('span');
    span.textContent = c.name;
    div.appendChild(span);
    div.addEventListener('click', () => selectClothing(i));
    container.appendChild(div);
  });
}

function buildPatternList() {
  const container = document.getElementById('patternList');
  container.innerHTML = '';
  PATTERNS.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'pattern-item';
    const iconDiv = document.createElement('div');
    iconDiv.className = 'pattern-icon';
    const pc = document.createElement('canvas');
    pc.width = 88; pc.height = 88;
    const pctx = pc.getContext('2d');
    p.draw(pctx, 44, 44, 88);
    iconDiv.appendChild(pc);
    div.appendChild(iconDiv);
    const nameDiv = document.createElement('div');
    nameDiv.className = 'pattern-name';
    nameDiv.textContent = p.name;
    div.appendChild(nameDiv);
    div.addEventListener('click', () => selectPattern(i));
    container.appendChild(div);
  });
}

function setupCanvas() {
  const container = document.getElementById('canvasContainer');
  const rect = container.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvasW = Math.floor(rect.width);
  canvasH = Math.floor(rect.height);
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function selectClothing(idx) {
  currentCloth = idx;
  placedItems = [];
  redoStack = [];
  document.querySelectorAll('.clothing-item').forEach((el, i) => el.classList.toggle('active', i === idx));
  renderCanvas();
}

function selectPattern(idx) {
  selectedPattern = idx;
  document.querySelectorAll('.pattern-item').forEach((el, i) => el.classList.toggle('selected', i === idx));
  document.getElementById('canvasHint').textContent = '已选择：' + PATTERNS[idx].name + ' · 点击服饰区域放置';
}

// ==================== RENDER ====================
function renderCanvas() {
  ctx.clearRect(0, 0, canvasW, canvasH);
  // Background pattern (subtle grid)
  ctx.strokeStyle = 'rgba(200,164,92,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < canvasW; x += 20) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvasH); ctx.stroke();
  }
  for (let y = 0; y < canvasH; y += 20) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvasW, y); ctx.stroke();
  }
  // Draw clothing
  CLOTHES[currentCloth].draw(ctx, canvasW, canvasH);
  // Draw placed patterns
  placedItems.forEach(item => {
    ctx.save();
    ctx.globalAlpha = 0.85;
    PATTERNS[item.patternIdx].draw(ctx, item.x, item.y, item.size);
    ctx.restore();
  });
}

// ==================== CANVAS INTERACTION ====================
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function isInBounds(x, y) {
  const b = CLOTHES[currentCloth].bound;
  return x >= b.x*canvasW && x <= (b.x+b.w)*canvasW && y >= b.y*canvasH && y <= (b.y+b.h)*canvasH;
}

let dragItem = null, dragOffset = { x: 0, y: 0 };
let isDragging = false;

function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function handleCanvasDown(pos) {
  for (let i = placedItems.length - 1; i >= 0; i--) {
    const item = placedItems[i];
    if (Math.hypot(pos.x - item.x, pos.y - item.y) < item.size * 0.6) {
      dragItem = item;
      dragOffset = { x: pos.x - item.x, y: pos.y - item.y };
      isDragging = false;
      return;
    }
  }
  if (selectedPattern >= 0 && isInBounds(pos.x, pos.y)) {
    const item = { patternIdx: selectedPattern, x: pos.x, y: pos.y, size: 55 };
    placedItems.push(item);
    dragItem = item;
    dragOffset = { x: 0, y: 0 };
    isDragging = true;
    renderCanvas();
  }
}

function handleCanvasMove(pos) {
  if (!dragItem) return;
  isDragging = true;
  dragItem.x = pos.x - dragOffset.x;
  dragItem.y = pos.y - dragOffset.y;
  renderCanvas();
}

function handleCanvasUp() {
  dragItem = null;
  isDragging = false;
}

// Mouse events
canvas.addEventListener('mousedown', function(e) {
  handleCanvasDown(getMousePos(e));
});
canvas.addEventListener('mousemove', function(e) {
  handleCanvasMove(getMousePos(e));
});
canvas.addEventListener('mouseup', handleCanvasUp);
canvas.addEventListener('mouseleave', handleCanvasUp);

// Touch events (separate from mouse to avoid conflicts)
canvas.addEventListener('touchstart', function(e) {
  if (e.touches.length === 1) {
    handleCanvasDown(getCanvasPos(e));
  }
  // Pinch detection handled below
}, { passive: true });

canvas.addEventListener('touchmove', function(e) {
  if (e.touches.length === 1 && dragItem) {
    e.preventDefault();
    handleCanvasMove(getCanvasPos(e));
  }
  // Pinch handled below
}, { passive: false });

canvas.addEventListener('touchend', handleCanvasUp);
canvas.addEventListener('touchcancel', handleCanvasUp);

// Pinch to resize
let lastPinchDist = 0, pinchItem = null;
canvas.addEventListener('touchstart', function(e) {
  if (e.touches.length === 2) {
    const t1 = e.touches[0], t2 = e.touches[1];
    lastPinchDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
    const rect = canvas.getBoundingClientRect();
    const px = (t1.clientX + t2.clientX)/2 - rect.left;
    const py = (t1.clientY + t2.clientY)/2 - rect.top;
    pinchItem = null;
    for (let i = placedItems.length - 1; i >= 0; i--) {
      if (Math.hypot(px - placedItems[i].x, py - placedItems[i].y) < placedItems[i].size * 0.8) {
        pinchItem = placedItems[i]; break;
      }
    }
  }
}, { passive: true });

canvas.addEventListener('touchmove', function(e) {
  if (e.touches.length === 2 && pinchItem) {
    e.preventDefault();
    const dist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    pinchItem.size = Math.max(25, Math.min(120, pinchItem.size * dist / lastPinchDist));
    lastPinchDist = dist;
    renderCanvas();
  }
}, { passive: false });

canvas.addEventListener('touchend', () => { pinchItem = null; });

// ==================== ACTIONS ====================
document.getElementById('btnUndo').addEventListener('click', function() {
  if (placedItems.length > 0) {
    placedItems.pop();
    renderCanvas();
    showToast('已撤销 · 剩余' + placedItems.length + '个纹样');
  } else {
    showToast('没有可撤销的操作');
  }
});
document.getElementById('btnClearAll').addEventListener('click', function() {
  if (placedItems.length > 0) {
    placedItems = [];
    renderCanvas();
    showToast('已清除所有纹样');
  } else {
    showToast('画布上没有纹样');
  }
});
document.getElementById('btnFinish').addEventListener('click', function() {
  if (placedItems.length === 0) { showToast('请先放置至少一个纹样'); return; }
  showResult();
});

// ==================== NAVIGATION ====================
document.getElementById('btnStart').addEventListener('click', function() {
  navigateTo('designer');
  setTimeout(() => { setupCanvas(); renderCanvas(); }, 650);
});
document.getElementById('btnRestart').addEventListener('click', function() {
  placedItems = []; redoStack = []; selectedPattern = -1;
  document.querySelectorAll('.pattern-item').forEach(el => el.classList.remove('selected'));
  navigateTo('designer');
  setTimeout(() => { setupCanvas(); selectClothing(0); }, 650);
});
document.getElementById('btnSave').addEventListener('click', function() {
  const link = document.createElement('a');
  link.download = '我的图腾纹样设计.png';
  link.href = resultCanvas.toDataURL('image/png');
  link.click();
  showToast('图片已保存');
});

function navigateTo(pageId) {
  [welcomePage, designerPage, resultPage].forEach(p => {
    const isTarget = p.id === pageId;
    p.classList.toggle('active', isTarget);
    if (!isTarget && p.id === 'welcome' && pageId === 'designer') p.classList.add('exit-left');
    else if (!isTarget) p.classList.remove('exit-left');
  });
}

// ==================== RESULT ====================
function showResult() {
  const rw = 1200, rh = 1200;
  resultCanvas.width = rw; resultCanvas.height = rh;
  rctx.clearRect(0, 0, rw, rh);
  rctx.fillStyle = '#1a0a0a'; rctx.fillRect(0, 0, rw, rh);
  rctx.strokeStyle = '#c8a45c';
  rctx.lineWidth = 9; rctx.strokeRect(24, 24, rw-48, rh-48);
  rctx.lineWidth = 3; rctx.strokeRect(42, 42, rw-84, rh-84);
  rctx.save();
  rctx.translate(rw*0.05, rh*0.05);
  const scaleX = (rw*0.9)/canvasW;
  const scaleY = (rh*0.9)/canvasH;
  rctx.scale(scaleX, scaleY);
  CLOTHES[currentCloth].draw(rctx, canvasW, canvasH);
  placedItems.forEach(item => {
    PATTERNS[item.patternIdx].draw(rctx, item.x, item.y, item.size);
  });
  rctx.restore();
  rctx.fillStyle = '#c8a45c';
  rctx.font = '42px "PingFang SC","Microsoft YaHei",serif';
  rctx.textAlign = 'center';
  rctx.fillText('· 我的图腾纹样作品 ·', rw/2, rh-60);

  const used = [...new Set(placedItems.map(i => i.patternIdx))];
  let html = '使用纹样：';
  used.forEach((idx, i) => { html += `<strong>${PATTERNS[idx].name}</strong>`; if (i < used.length-1) html += '、'; });
  html += '<br><br>纹样寓意：<br>';
  used.forEach(idx => { html += `◆ ${PATTERNS[idx].name}：${PATTERNS[idx].desc}<br>`; });
  document.getElementById('resultInfo').innerHTML = html;
  navigateTo('result');
}

// ==================== TOAST ====================
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

// ==================== RESIZE ====================
window.addEventListener('resize', () => {
  if (designerPage.classList.contains('active')) { setupCanvas(); renderCanvas(); }
});

// ==================== START ====================
init();
</script>
</body>
</html>
