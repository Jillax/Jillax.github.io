    <link rel="stylesheet" href="css/main.css">
    <style>
        .page-header {
            padding: 100px 0 24px;
            position: relative;
            max-width: var(--container-text);
        }
        .page-header .back-home {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            color: var(--text-faint);
            margin-bottom: 16px;
            transition: color 0.3s ease;
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .page-header .back-home:hover { color: var(--purple); }
        .page-header h1 {
            font-family: var(--font-display);
            font-size: clamp(2rem, 3.5vw, 2.8rem);
            font-weight: 700;
            color: var(--text);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .page-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 6px;
            font-family: var(--font-mono);
        }

        .project-category {
            margin-bottom: 56px;
        }
        .project-category-title {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--neon-pink);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }
        .project-category-title::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 60px;
            height: 1px;
            background: var(--neon-pink);
            box-shadow: 0 0 8px var(--neon-pink-glow);
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .project-card {
            border: 2px solid var(--border);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.4s ease;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            background: var(--bg-card);
        }
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--purple);
            opacity: 0.4;
            transition: all 0.3s;
        }
        .project-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(155,89,255,0.03) 0%, transparent 50%);
            pointer-events: none;
        }
        .project-card:hover {
            border-color: var(--purple);
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(155,89,255,0.15);
        }
        .project-card:hover::before {
            opacity: 1;
            box-shadow: 0 0 12px var(--purple-glow);
        }

        .project-card-icon {
            font-size: 1.8rem;
            line-height: 1;
        }
        .project-card-name {
            font-family: var(--font-body);
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.5px;
        }
        .project-card-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.7;
            font-weight: 300;
        }
        .project-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: auto;
        }
        .project-card-tag {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            padding: 2px 10px;
            border: 1px solid var(--border);
            color: var(--text-faint);
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .project-card:hover .project-card-tag {
            border-color: var(--border-glow);
            color: var(--text-muted);
        }
        .project-card-tag.wip {
            border-color: rgba(255, 170, 64, 0.4);
            color: var(--amber);
            background: rgba(255, 170, 64, 0.08);
        }

        /* Locked/placeholder cards */
        .project-card.locked {
            opacity: 0.5;
            cursor: default;
        }
        .project-card.locked:hover {
            transform: none;
            border-color: var(--border);
            box-shadow: none;
        }
        .project-card.locked::before { opacity: 0.2; }

        @media (max-width: 768px) {
            .project-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body data-page="projects">

    <main>
    <div class="container">

            <h1>项 目</h1>

        </div>

        <!-- ===== GitHub 项目 ===== -->
        <div class="project-category reveal">
            <div class="project-category-title">// GITHUB</div>
            <div class="project-grid">
                <a href="https://github.com/Jillax/subtitle-translator" class="project-card" target="_blank">
                    <div class="project-card-icon">🎬</div>
                    <div class="project-card-name">AI 字幕翻译工具</div>
                    <div class="project-card-desc">基于 LLM 的 YouTube 字幕上下文翻译工具。全文理解、术语一致性、多轮审校，实现接近人工翻译质量。</div>
                    <div class="project-card-tags">
                        <span class="project-card-tag">Python</span>
                        <span class="project-card-tag">LLM</span>
                        <span class="project-card-tag">Streamlit</span>
                        <span class="project-card-tag">字幕翻译</span>
                    </div>
                </a>

            </div>
        </div>
    </div>
    </main>

</body>
</html>
